h":0,"stats":{"Line":3}},{"line":358,"address":[],"length":0,"stats":{"Line":3}},{"line":359,"address":[],"length":0,"stats":{"Line":3}},{"line":365,"address":[],"length":0,"stats":{"Line":8}},{"line":366,"address":[],"length":0,"stats":{"Line":32}},{"line":367,"address":[],"length":0,"stats":{"Line":8}},{"line":372,"address":[],"length":0,"stats":{"Line":4}},{"line":373,"address":[],"length":0,"stats":{"Line":16}},{"line":374,"address":[],"length":0,"stats":{"Line":4}},{"line":375,"address":[],"length":0,"stats":{"Line":4}}],"covered":116,"coverable":120},{"path":["/","Users","nextstop","projects","walkie-talkie","core","src","ratelimit","mod.rs"],"content":"//! Rate Limiter — Walkie Talkie v4 Platform Layer\n//!\n//! Token-bucket rate limiter keyed by (tenant_id, agent_id).\n\nuse std::collections::HashMap;\nuse std::sync::RwLock;\nuse std::time::Instant;\n\n// ─── Token Bucket ───────────────────────────────────────────────\n\n#[derive(Debug)]\nstruct Bucket {\n    tokens: f64,\n    max_tokens: f64,\n    rate: f64,\n    last_refill: Instant,\n}\n\nimpl Bucket {\n    fn new(rate: u32, burst: u32) -\u003e Self {\n        Self { tokens: burst as f64, max_tokens: burst as f64, rate: rate as f64, last_refill: Instant::now() }\n    }\n\n    fn try_acquire(\u0026mut self, cost: u32) -\u003e bool {\n        self.refill();\n        let cost = cost as f64;\n        if self.tokens \u003e= cost { self.tokens -= cost; true } else { false }\n    }\n\n    fn refill(\u0026mut self) {\n        let elapsed = self.last_refill.elapsed().as_secs_f64();\n        self.tokens = (self.tokens + elapsed * self.rate).min(self.max_tokens);\n        self.last_refill = Instant::now();\n    }\n\n    fn available(\u0026self) -\u003e f64 {\n        let elapsed = self.last_refill.elapsed().as_secs_f64();\n        (self.tokens + elapsed * self.rate).min(self.max_tokens)\n    }\n}\n\n// ─── Rate Limiter ───────────────────────────────────────────────\n\n#[derive(Debug)]\npub struct RateLimiter {\n    buckets: RwLock\u003cHashMap\u003cString, Bucket\u003e\u003e,\n    default_rate: u32,\n    default_burst: u32,\n}\n\nimpl RateLimiter {\n    pub fn new(rate: u32, burst: u32) -\u003e Self {\n        Self { buckets: RwLock::new(HashMap::new()), default_rate: rate, default_burst: burst }\n    }\n\n    pub fn make_key(tenant_id: \u0026str, agent_id: \u0026str) -\u003e String {\n        format!(\"{}:{}\", tenant_id, agent_id)\n    }\n\n    pub fn try_acquire(\u0026self, tenant_id: \u0026str, agent_id: \u0026str, cost: u32) -\u003e bool {\n        let key = Self::make_key(tenant_id, agent_id);\n        let mut buckets = self.buckets.write().unwrap();\n        let bucket = buckets.entry(key).or_insert_with(|| Bucket::new(self.default_rate, self.default_burst));\n        bucket.try_acquire(cost)\n    }\n\n    pub fn set_rate(\u0026self, tenant_id: \u0026str, agent_id: \u0026str, rate: u32, burst: u32) {\n        let key = Self::make_key(tenant_id, agent_id);\n        self.buckets.write().unwrap().insert(key, Bucket::new(rate, burst));\n    }\n\n    pub fn set_tenant_rate(\u0026self, tenant_id: \u0026str, rate: u32, burst: u32) {\n        let prefix = format!(\"{}:\", tenant_id);\n        let mut buckets = self.buckets.write().unwrap();\n        for (key, bucket) in buckets.iter_mut() {\n            if key.starts_with(\u0026prefix) {\n                bucket.rate = rate as f64;\n                bucket.max_tokens = burst as f64;\n            }\n        }\n    }\n\n    pub fn available_tokens(\u0026self, tenant_id: \u0026str, agent_id: \u0026str) -\u003e f64 {\n        let key = Self::make_key(tenant_id, agent_id);\n        let buckets = self.buckets.read().unwrap();\n        match buckets.get(\u0026key) {\n            Some(b) =\u003e b.available(),\n            None =\u003e self.default_burst as f64,\n        }\n    }\n\n    pub fn reset(\u0026self, tenant_id: \u0026str, agent_id: \u0026str) {\n        let key = Self::make_key(tenant_id, agent_id);\n        self.buckets.write().unwrap().remove(\u0026key);\n    }\n\n    pub fn bucket_count(\u0026self) -\u003e usize {\n        self.buckets.read().unwrap().len()\n    }\n}\n\n// ─── Tests ──────────────────────────────────────────────────────\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_basic_acquire() {\n        let limiter = RateLimiter::new(5, 10);\n        for _ in 0..10 { assert!(limiter.try_acquire(\"t1\", \"a1\", 1)); }\n        assert!(!limiter.try_acquire(\"t1\", \"a1\", 1));\n    }\n\n    #[test]\n    fn test_separate_keys() {\n        let limiter = RateLimiter::new(5, 10);\n        for _ in 0..10 { limiter.try_acquire(\"t1\", \"a1\", 1); }\n        assert!(!limiter.try_acquire(\"t1\", \"a1\", 1));\n        assert!(limiter.try_acquire(\"t1\", \"a2\", 1)); // different key\n    }\n\n    #[test]\n    fn test_cost() {\n        let limiter = RateLimiter::new(5, 10);\n        assert!(limiter.try_acquire(\"t1\", \"a1\", 10));\n        assert!(!limiter.try_acquire(\"t1\", \"a1\", 1));\n    }\n\n    #[test]\n    fn test_available_tokens() {\n        let limiter = RateLimiter::new(5, 10);\n        let avail = limiter.available_tokens(\"t1\", \"a1\");\n        assert!((avail - 10.0).abs() \u003c 0.01);\n        limiter.try_acquire(\"t1\", \"a1\", 1);\n        let avail = limiter.available_tokens(\"t1\", \"a1\");\n        assert!((avail - 9.0).abs() \u003c 0.1);\n    }\n\n    #[test]\n    fn test_available_tokens_default() {\n        let limiter = RateLimiter::new(5, 10);\n        assert!((limiter.available_tokens(\"nope\", \"nope\") - 10.0).abs() \u003c 0.01);\n    }\n\n    #[test]\n    fn test_set_rate() {\n        let limiter = RateLimiter::new(100, 100);\n        limiter.set_rate(\"t1\", \"a1\", 0, 0);\n        assert!(!limiter.try_acquire(\"t1\", \"a1\", 1));\n    }\n\n    #[test]\n    fn test_tenant_rate_override() {\n        let limiter = RateLimiter::new(100, 100);\n        limiter.try_acquire(\"t1\", \"a1\", 1);\n        limiter.try_acquire(\"t1\", \"a2\", 1);\n        limiter.set_tenant_rate(\"t1\", 0, 0);\n        assert!(!limiter.try_acquire(\"t1\", \"a1\", 1));\n        assert!(!limiter.try_acquire(\"t1\", \"a2\", 1));\n    }\n\n    #[test]\n    fn test_reset() {\n        let limiter = RateLimiter::new(5, 10);\n        for _ in 0..10 { limiter.try_acquire(\"t1\", \"a1\", 1); }\n        assert!(!limiter.try_acquire(\"t1\", \"a1\", 1));\n        limiter.reset(\"t1\", \"a1\");\n        assert!(limiter.try_acquire(\"t1\", \"a1\", 1));\n    }\n\n    #[test]\n    fn test_bucket_count() {\n        let limiter = RateLimiter::new(5, 10);\n        assert_eq!(limiter.bucket_count(), 0);\n        limiter.try_acquire(\"t1\", \"a1\", 1);\n        limiter.try_acquire(\"t1\", \"a2\", 1);\n        limiter.try_acquire(\"t2\", \"a1\", 1);\n        assert_eq!(limiter.bucket_count(), 3);\n        limiter.reset(\"t1\", \"a1\");\n        assert_eq!(limiter.bucket_count(), 2);\n    }\n\n    #[test]\n    fn test_make_key() {\n        assert_eq!(RateLimiter::make_key(\"org\", \"agent\"), \"org:agent\");\n    }\n}\n","traces":[{"line":20,"address":[],"length":0,"stats":{"Line":19}},{"line":21,"address":[],"length":0,"stats":{"Line":57}},{"line":24,"address":[],"length":0,"stats":{"Line":68}},{"line":25,"address":[],"length":0,"stats":{"Line":136}},{"line":26,"address":[],"length":0,"stats":{"Line":136}},{"line":27,"address":[],"length":0,"stats":{"Line":196}},{"line":30,"address":[],"length":0,"stats":{"Line":68}},{"line":31,"address":[],"length":0,"stats":{"Line":204}},{"line":32,"address":[],"length":0,"stats":{"Line":204}},{"line":33,"address":[],"length":0,"stats":{"Line":68}},{"line":36,"address":[],"length":0,"stats":{"Line":1}},{"line":37,"address":[],"length":0,"stats":{"Line":3}},{"line":38,"address":[],"length":0,"stats":{"Line":4}},{"line":52,"address":[],"length":0,"stats":{"Line":38}},{"line":53,"address":[],"length":0,"stats":{"Line":114}},{"line":56,"address":[],"length":0,"stats":{"Line":75}},{"line":57,"address":[],"length":0,"stats":{"Line":75}},{"line":60,"address":[],"length":0,"stats":{"Line":68}},{"line":61,"address":[],"length":0,"stats":{"Line":272}},{"line":62,"address":[],"length":0,"stats":{"Line":272}},{"line":63,"address":[],"length":0,"stats":{"Line":326}},{"line":64,"address":[],"length":0,"stats":{"Line":204}},{"line":67,"address":[],"length":0,"stats":{"Line":1}},{"line":68,"address":[],"length":0,"stats":{"Line":4}},{"line":69,"address":[],"length":0,"stats":{"Line":6}},{"line":72,"address":[],"length":0,"stats":{"Line":1}},{"line":73,"address":[],"length":0,"stats":{"Line":2}},{"line":74,"address":[],"length":0,"stats":{"Line":4}},{"line":75,"address":[],"length":0,"stats":{"Line":5}},{"line":76,"address":[],"length":0,"stats":{"Line":6}},{"line":77,"address":[],"length":0,"stats":{"Line":2}},{"line":78,"address":[],"length":0,"stats":{"Line":2}},{"line":83,"address":[],"length":0,"stats":{"Line":3}},{"line":84,"address":[],"length":0,"stats":{"Line":12}},{"line":85,"address":[],"length":0,"stats":{"Line":12}},{"line":86,"address":[],"length":0,"stats":{"Line":6}},{"line":87,"address":[],"length":0,"stats":{"Line":3}},{"line":88,"address":[],"length":0,"stats":{"Line":2}},{"line":92,"address":[],"length":0,"stats":{"Line":2}},{"line":93,"address":[],"length":0,"stats":{"Line":8}},{"line":94,"address":[],"length":0,"stats":{"Line":6}},{"line":97,"address":[],"length":0,"stats":{"Line":3}},{"line":98,"address":[],"length":0,"stats":{"Line":6}}],"covered":43,"coverable":43},{"path":["/","Users","nextstop","projects","walkie-talkie","core","src","registry","mod.rs"],"content":"//! Agent Registry — Walkie Talkie v4 Platform Layer\n//!\n//! Thread-safe tenant/agent registry.\n\nuse crate::identity::AgentIdentity;\nuse crate::tenant::{Tenant, TenantConfig, TenantError};\nuse std::collections::HashMap;\nuse std::sync::{Arc, RwLock};\n\n// ─── Registry ───────────────────────────────────────────────────\n\n#[derive(Debug, Clone)]\npub struct AgentRegistry {\n    inner: Arc\u003cRwLock\u003cHashMap\u003cString, Tenant\u003e\u003e\u003e,\n}\n\nimpl Default for AgentRegistry {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\nimpl AgentRegistry {\n    pub fn new() -\u003e Self {\n        Self { inner: Arc::new(RwLock::new(HashMap::new())) }\n    }\n\n    // ── Tenant ──\n\n    pub fn create_tenant(\u0026self, tenant_id: \u0026str, name: \u0026str) -\u003e Result\u003cTenant, RegistryError\u003e {\n        let mut map = self.inner.write().unwrap();\n        if map.contains_key(tenant_id) {\n            return Err(RegistryError::TenantExists { tenant_id: tenant_id.to_string() });\n        }\n        let tenant = Tenant::new(tenant_id, name);\n        map.insert(tenant_id.to_string(), tenant.clone());\n        Ok(tenant)\n    }\n\n    pub fn create_tenant_with_config(\n        \u0026self, tenant_id: \u0026str, name: \u0026str, config: TenantConfig,\n    ) -\u003e Result\u003cTenant, RegistryError\u003e {\n        let mut map = self.inner.write().unwrap();\n        if map.contains_key(tenant_id) {\n            return Err(RegistryError::TenantExists { tenant_id: tenant_id.to_string() });\n        }\n        let tenant = Tenant::new(tenant_id, name).with_config(config);\n        map.insert(tenant_id.to_string(), tenant.clone());\n        Ok(tenant)\n    }\n\n    pub fn get_tenant(\u0026self, tenant_id: \u0026str) -\u003e Option\u003cTenant\u003e {\n        self.inner.read().unwrap().get(tenant_id).cloned()\n    }\n\n    pub fn list_tenants(\u0026self) -\u003e Vec\u003cTenantSummary\u003e {\n        self.inner.read().unwrap().values().map(|t| t.summary()).collect()\n    }\n\n    pub fn remove_tenant(\u0026self, tenant_id: \u0026str) -\u003e bool {\n        self.inner.write().unwrap().remove(tenant_id).is_some()\n    }\n\n    pub fn update_tenant(\n        \u0026self, tenant_id: \u0026str,\n        name: Option\u003c\u0026str\u003e, active: Option\u003cbool\u003e, config: Option\u003cTenantConfig\u003e,\n    ) -\u003e Option\u003cTenant\u003e {\n        let mut map = self.inner.write().unwrap();\n        let tenant = map.get_mut(tenant_id)?;\n        if let Some(n) = name { tenant.name = n.to_string(); }\n        if let Some(a) = active { tenant.active = a; }\n        if let Some(cfg) = config { tenant.config = cfg; }\n        Some(tenant.clone())\n    }\n\n    pub fn has_tenant(\u0026self, tenant_id: \u0026str) -\u003e bool {\n        self.inner.read().unwrap().contains_key(tenant_id)\n    }\n\n    // ── Agent ──\n\n    pub fn register_agent(\u0026self, tenant_id: \u0026str, agent: AgentIdentity) -\u003e Result\u003cAgentIdentity, RegistryError\u003e {\n        let mut map = self.inner.write().unwrap();\n        let tenant = map.get_mut(tenant_id)\n            .ok_or_else(|| RegistryError::TenantNotFound { tenant_id: tenant_id.to_string() })?;\n        tenant.register_agent(agent.clone()).map_err(RegistryError::Tenant)?;\n        Ok(agent)\n    }\n\n    pub fn deregister_agent(\u0026self, tenant_id: \u0026str, agent_id: \u0026str) -\u003e Result\u003cAgentIdentity, RegistryError\u003e {\n        let mut map = self.inner.write().unwrap();\n        let tenant = map.get_mut(tenant_id)\n            .ok_or_else(|| RegistryError::TenantNotFound { tenant_id: tenant_id.to_string() })?;\n        tenant.deregister_agent(agent_id)\n            .ok_or_else(|| RegistryError::AgentNotFound { agent_id: agent_id.to_string() })\n    }\n\n    pub fn list_agents(\u0026self, tenant_id: \u0026str) -\u003e Result\u003cVec\u003cAgentIdentity\u003e, RegistryError\u003e {\n        let map = self.inner.read().unwrap();\n        let tenant = map.get(tenant_id)\n            .ok_or_else(|| RegistryError::TenantNotFound { tenant_id: tenant_id.to_string() })?;\n        Ok(tenant.agents.clone())\n    }\n\n    pub fn find_agent(\u0026self, tenant_id: \u0026str, agent_id: \u0026str) -\u003e Result\u003cAgentIdentity, RegistryError\u003e {\n        let map = self.inner.read().unwrap();\n        let tenant = map.get(tenant_id)\n            .ok_or_else(|| RegistryError::TenantNotFound { tenant_id: tenant_id.to_string() })?;\n        tenant.find_agent(agent_id).cloned()\n            .ok_or_else(|| RegistryError::AgentNotFound { agent_id: agent_id.to_string() })\n    }\n\n    pub fn tenant_has_agent(\u0026self, tenant_id: \u0026str, agent_id: \u0026str) -\u003e bool {\n        self.inner.read().unwrap().get(tenant_id)\n            .map(|t| t.has_agent(agent_id)).unwrap_or(false)\n    }\n}\n\n// ─── Error \u0026 Types ──────────────────────────────────────────────\n\n#[derive(Debug, thiserror::Error)]\npub enum RegistryError {\n    #[error(\"Tenant '{tenant_id}' not found\")]\n    TenantNotFound { tenant_id: String },\n    #[error(\"Agent '{agent_id}' not found\")]\n    AgentNotFound { agent_id: String },\n    #[error(\"Tenant '{tenant_id}' already exists\")]\n    TenantExists { tenant_id: String },\n    #[error(\"Tenant error: {0}\")]\n    Tenant(#[from] TenantError),\n}\n\npub use crate::tenant::TenantSummary;\n\n// ─── Tests ──────────────────────────────────────────────────────\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::identity::IdentityBuilder;\n\n    fn make_agent(name: \u0026str, caps: \u0026[\u0026str]) -\u003e AgentIdentity {\n        let seed = { let mut b = name.as_bytes().to_vec(); b.resize(32, 0); b };\n        let sk = ed25519_dalek::SigningKey::from_bytes(\u0026seed.try_into().unwrap());\n        IdentityBuilder::new(name).capabilities(caps).build_with_key(\u0026sk).unwrap()\n    }\n\n    #[test]\n    fn test_create_tenant() {\n        let reg = AgentRegistry::new();\n        let t = reg.create_tenant(\"org-1\", \"Acme\").unwrap();\n        assert_eq!(t.tenant_id, \"org-1\");\n        assert!(reg.has_tenant(\"org-1\"));\n    }\n\n    #[test]\n    fn test_duplicate_tenant() {\n        let reg = AgentRegistry::new();\n        reg.create_tenant(\"org-1\", \"A\").unwrap();\n        let err = reg.create_tenant(\"org-1\", \"B\").unwrap_err();\n        assert!(matches!(err, RegistryError::TenantExists { .. }));\n    }\n\n    #[test]\n    fn test_remove_tenant() {\n        let reg = AgentRegistry::new();\n        reg.create_tenant(\"org-1\", \"A\").unwrap();\n        assert!(reg.remove_tenant(\"org-1\"));\n        assert!(!reg.has_tenant(\"org-1\"));\n        assert!(!reg.remove_tenant(\"org-1\"));\n    }\n\n    #[test]\n    fn test_list_tenants() {\n        let reg = AgentRegistry::new();\n        reg.create_tenant(\"org-1\", \"A\").unwrap();\n        reg.create_tenant(\"org-2\", \"B\").unwrap();\n        assert_eq!(reg.list_tenants().len(), 2);\n    }\n\n    #[test]\n    fn test_register_agent() {\n        let reg = AgentRegistry::new();\n        reg.create_tenant(\"org-1\", \"Test\").unwrap();\n        reg.register_agent(\"org-1\", make_agent(\"Alice\", \u0026[\"crypto\"])).unwrap();\n        assert_eq!(reg.list_agents(\"org-1\").unwrap().len(), 1);\n    }\n\n    #[test]\n    fn test_register_nonexistent_tenant() {\n        let reg = AgentRegistry::new();\n        let err = reg.register_agent(\"nope\", make_agent(\"A\", \u0026[])).unwrap_err();\n        assert!(matches!(err, RegistryError::TenantNotFound { .. }));\n    }\n\n    #[test]\n    fn test_deregister_agent() {\n        let reg = AgentRegistry::new();\n        reg.create_tenant(\"org-1\", \"Test\").unwrap();\n        let agent = make_agent(\"Alice\", \u0026[\"crypto\"]);\n        let aid = agent.agent_id.clone();\n        reg.register_agent(\"org-1\", agent).unwrap();\n        let removed = reg.deregister_agent(\"org-1\", \u0026aid).unwrap();\n        assert_eq!(removed.display_name, \"Alice\");\n        assert_eq!(reg.list_agents(\"org-1\").unwrap().len(), 0);\n    }\n\n    #[test]\n    fn test_deregister_nonexistent() {\n        let reg = AgentRegistry::new();\n        reg.create_tenant(\"org-1\", \"Test\").unwrap();\n        let err = reg.deregister_agent(\"org-1\", \"fake-id\").unwrap_err();\n        assert!(matches!(err, RegistryError::AgentNotFound { .. }));\n    }\n\n    #[test]\n    fn test_find_agent() {\n        let reg = AgentRegistry::new();\n        reg.create_tenant(\"org-1\", \"Test\").unwrap();\n        let agent = make_agent(\"Alice\", \u0026[\"crypto\"]);\n        let aid = agent.agent_id.clone();\n        reg.register_agent(\"org-1\", agent).unwrap();\n        assert_eq!(reg.find_agent(\"org-1\", \u0026aid).unwrap().display_name, \"Alice\");\n    }\n\n    #[test]\n    fn test_find_agent_wrong_tenant() {\n        let reg = AgentRegistry::new();\n        reg.create_tenant(\"org-1\", \"A\").unwrap();\n        reg.create_tenant(\"org-2\", \"B\").unwrap();\n        let agent = make_agent(\"Alice\", \u0026[]);\n        let aid = agent.agent_id.clone();\n        reg.register_agent(\"org-1\", agent).unwrap();\n        let err = reg.find_agent(\"org-2\", \u0026aid).unwrap_err();\n        assert!(matches!(err, RegistryError::AgentNotFound { .. }));\n    }\n\n    #[test]\n    fn test_tenant_has_agent() {\n        let reg = AgentRegistry::new();\n        reg.create_tenant(\"org-1\", \"Test\").unwrap();\n        let agent = make_agent(\"Alice\", \u0026[]);\n        let aid = agent.agent_id.clone();\n        reg.register_agent(\"org-1\", agent).unwrap();\n        assert!(reg.tenant_has_agent(\"org-1\", \u0026aid));\n        assert!(!reg.tenant_has_agent(\"org-2\", \u0026aid));\n    }\n\n    #[test]\n    fn test_create_tenant_with_config() {\n        let reg = AgentRegistry::new();\n        let config = TenantConfig { max_agents: 2, ..Default::default() };\n        reg.create_tenant_with_config(\"org-1\", \"Strict\", config).unwrap();\n        assert_eq!(reg.get_tenant(\"org-1\").unwrap().config.max_agents, 2);\n    }\n\n    #[test]\n    fn test_update_tenant_name() {\n        let reg = AgentRegistry::new();\n        reg.create_tenant(\"org-1\", \"Old Name\").unwrap();\n        let t = reg.update_tenant(\"org-1\", Some(\"New Name\"), None, None).unwrap();\n        assert_eq!(t.name, \"New Name\");\n        assert_eq!(reg.get_tenant(\"org-1\").unwrap().name, \"New Name\");\n    }\n\n    #[test]\n    fn test_update_tenant_deactivate() {\n        let reg = AgentRegistry::new();\n        reg.create_tenant(\"org-1\", \"Test\").unwrap();\n        let t = reg.update_tenant(\"org-1\", None, Some(false), None).unwrap();\n        assert!(!t.active);\n        // Should not be able to register agents\n        let err = reg.register_agent(\"org-1\", make_agent(\"A\", \u0026[])).unwrap_err();\n        assert!(matches!(err, RegistryError::Tenant(_)));\n    }\n\n    #[test]\n    fn test_update_tenant_config() {\n        let reg = AgentRegistry::new();\n        reg.create_tenant(\"org-1\", \"Test\").unwrap();\n        let config = TenantConfig { max_agents: 1, ..Default::default() };\n        let t = reg.update_tenant(\"org-1\", None, None, Some(config)).unwrap();\n        assert_eq!(t.config.max_agents, 1);\n    }\n\n    #[test]\n    fn test_update_tenant_not_found() {\n        let reg = AgentRegistry::new();\n        assert!(reg.update_tenant(\"nope\", None, None, None).is_none());\n    }\n\n    #[test]\n    fn test_update_tenant_preserves_agents() {\n        let reg = AgentRegistry::new();\n        reg.create_tenant(\"org-1\", \"Test\").unwrap();\n        reg.register_agent(\"org-1\", make_agent(\"Alice\", \u0026[\"chat\"])).unwrap();\n        reg.update_tenant(\"org-1\", Some(\"Updated\"), None, None).unwrap();\n        assert_eq!(reg.list_agents(\"org-1\").unwrap().len(), 1);\n    }\n}\n","traces":[{"line":18,"address":[],"length":0,"stats":{"Line":0}},{"line":19,"address":[],"length":0,"stats":{"Line":0}},{"line":24,"address":[],"length":0,"stats":{"Line":46}},{"line":25,"address":[],"length":0,"stats":{"Line":92}},{"line":30,"address":[],"length":0,"stats":{"Line":40}},{"line":31,"address":[],"length":0,"stats":{"Line":120}},{"line":32,"address":[],"length":0,"stats":{"Line":80}},{"line":33,"address":[],"length":0,"stats":{"Line":2}},{"line":35,"address":[],"length":0,"stats":{"Line
