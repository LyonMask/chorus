Users","nextstop","projects","walkie-talkie","core","src","ffi","node.rs"],"content":"//! FFI Bindings for Node.js (napi-rs)\n\nuse crate::crypto::CryptoLayer;\nuse crate::p2p::P2PNetwork;\nuse napi_derive::napi;\n\n#[napi]\npub struct P2PClient {\n    inner: P2PNetwork,\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","Users","nextstop","projects","walkie-talkie","core","src","gateway","mod.rs"],"content":"//! API Gateway — Walkie Talkie v4 Platform Layer\n//!\n//! HTTP API for tenant/agent management and message routing.\n\nuse crate::identity::AgentIdentity;\nuse crate::ratelimit::RateLimiter;\nuse crate::registry::{AgentRegistry, RegistryError};\nuse crate::tenant::TenantConfig;\nuse axum::extract::{Path, State};\nuse axum::http::StatusCode;\nuse axum::routing::{delete, get, post};\nuse axum::{Json, Router};\nuse serde::{Deserialize, Serialize};\nuse std::sync::Arc;\n\npub type ApiResult = (StatusCode, Json\u003cserde_json::Value\u003e);\n\n// ─── App State ──────────────────────────────────────────────────\n\n#[derive(Clone)]\npub struct AppState {\n    pub registry: Arc\u003cAgentRegistry\u003e,\n    pub rate_limiter: Arc\u003cRateLimiter\u003e,\n}\n\nimpl Default for AppState {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\nimpl AppState {\n    pub fn new() -\u003e Self {\n        Self {\n            registry: Arc::new(AgentRegistry::new()),\n            rate_limiter: Arc::new(RateLimiter::new(5, 10)),\n        }\n    }\n}\n\n// ─── Request / Response Types ───────────────────────────────────\n\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct CreateTenantRequest {\n    pub tenant_id: String,\n    pub name: String,\n    #[serde(default)]\n    pub config: Option\u003cTenantConfig\u003e,\n}\n\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct UpdateTenantRequest {\n    pub name: Option\u003cString\u003e,\n    pub active: Option\u003cbool\u003e,\n    pub config: Option\u003cTenantConfig\u003e,\n}\n\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct SendMessageRequest {\n    pub from_agent: String,\n    pub to_agent: String,\n    pub tenant_id: String,\n    pub protocol: String,\n    #[serde(default)]\n    pub payload: serde_json::Value,\n}\n\n// ─── Response helpers ───────────────────────────────────────────\n\nfn ok_json(data: serde_json::Value) -\u003e ApiResult {\n    (StatusCode::OK, Json(serde_json::json!({ \"ok\": true, \"data\": data })))\n}\n\nfn created_json(data: serde_json::Value) -\u003e ApiResult {\n    (StatusCode::CREATED, Json(serde_json::json!({ \"ok\": true, \"data\": data })))\n}\n\nfn err_json(status: StatusCode, msg: \u0026str) -\u003e ApiResult {\n    (status, Json(serde_json::json!({ \"ok\": false, \"error\": msg })))\n}\n\nfn registry_error(e: RegistryError) -\u003e ApiResult {\n    match \u0026e {\n        RegistryError::TenantNotFound { .. } | RegistryError::AgentNotFound { .. } =\u003e\n            err_json(StatusCode::NOT_FOUND, \u0026e.to_string()),\n        RegistryError::TenantExists { .. } =\u003e\n            err_json(StatusCode::CONFLICT, \u0026e.to_string()),\n        RegistryError::Tenant(_) =\u003e\n            err_json(StatusCode::BAD_REQUEST, \u0026e.to_string()),\n    }\n}\n\n// ─── Handlers ───────────────────────────────────────────────────\n\npub async fn health() -\u003e ApiResult {\n    ok_json(serde_json::json!({ \"status\": \"healthy\", \"version\": \"0.2.0\" }))\n}\n\n// ── Tenant CRUD ──\n\npub async fn create_tenant(\n    State(state): State\u003cAppState\u003e,\n    Json(req): Json\u003cCreateTenantRequest\u003e,\n) -\u003e ApiResult {\n    let result = if let Some(config) = req.config {\n        state.registry.create_tenant_with_config(\u0026req.tenant_id, \u0026req.name, config)\n    } else {\n        state.registry.create_tenant(\u0026req.tenant_id, \u0026req.name)\n    };\n    match result {\n        Ok(t) =\u003e created_json(serde_json::json!({\n            \"tenant_id\": t.tenant_id, \"name\": t.name,\n            \"agent_count\": 0, \"active\": t.active, \"created_at\": t.created_at,\n        })),\n        Err(e) =\u003e registry_error(e),\n    }\n}\n\npub async fn list_tenants(State(state): State\u003cAppState\u003e) -\u003e ApiResult {\n    let tenants = state.registry.list_tenants();\n    let data: Vec\u003cserde_json::Value\u003e = tenants.iter().map(|t| {\n        serde_json::json!({\n            \"tenant_id\": \u0026t.tenant_id, \"name\": \u0026t.name,\n            \"agent_count\": t.agent_count, \"active\": t.active, \"created_at\": t.created_at,\n        })\n    }).collect();\n    ok_json(serde_json::json!(data))\n}\n\npub async fn get_tenant(State(state): State\u003cAppState\u003e, Path(tenant_id): Path\u003cString\u003e) -\u003e ApiResult {\n    match state.registry.get_tenant(\u0026tenant_id) {\n        Some(t) =\u003e ok_json(serde_json::json!({\n            \"tenant_id\": t.tenant_id, \"name\": t.name,\n            \"agent_count\": t.agent_count(), \"active\": t.active, \"created_at\": t.created_at,\n        })),\n        None =\u003e err_json(StatusCode::NOT_FOUND, \"Tenant not found\"),\n    }\n}\n\npub async fn update_tenant(\n    State(state): State\u003cAppState\u003e,\n    Path(tenant_id): Path\u003cString\u003e,\n    Json(req): Json\u003cUpdateTenantRequest\u003e,\n) -\u003e ApiResult {\n    let name = req.name.as_deref();\n    let active = req.active;\n    let config = req.config;\n\n    match state.registry.update_tenant(\u0026tenant_id, name, active, config) {\n        Some(t) =\u003e ok_json(serde_json::json!({\n            \"tenant_id\": \u0026t.tenant_id, \"name\": \u0026t.name, \"active\": t.active,\n        })),\n        None =\u003e err_json(StatusCode::NOT_FOUND, \"Tenant not found\"),\n    }\n}\n\npub async fn delete_tenant(\n    State(state): State\u003cAppState\u003e,\n    Path(tenant_id): Path\u003cString\u003e,\n) -\u003e ApiResult {\n    if state.registry.remove_tenant(\u0026tenant_id) {\n        ok_json(serde_json::json!({ \"deleted\": true, \"tenant_id\": tenant_id }))\n    } else {\n        err_json(StatusCode::NOT_FOUND, \"Tenant not found\")\n    }\n}\n\n// ── Agent Management ──\n\npub async fn register_agent(\n    State(state): State\u003cAppState\u003e,\n    Path(tenant_id): Path\u003cString\u003e,\n    Json(agent): Json\u003cAgentIdentity\u003e,\n) -\u003e ApiResult {\n    match state.registry.register_agent(\u0026tenant_id, agent) {\n        Ok(a) =\u003e created_json(serde_json::json!({\n            \"agent_id\": a.agent_id, \"display_name\": a.display_name,\n            \"capabilities\": a.capabilities,\n        })),\n        Err(e) =\u003e registry_error(e),\n    }\n}\n\npub async fn list_agents(State(state): State\u003cAppState\u003e, Path(tenant_id): Path\u003cString\u003e) -\u003e ApiResult {\n    match state.registry.list_agents(\u0026tenant_id) {\n        Ok(agents) =\u003e {\n            let data: Vec\u003cserde_json::Value\u003e = agents.iter().map(|a| {\n                serde_json::json!({\n                    \"agent_id\": \u0026a.agent_id, \"display_name\": \u0026a.display_name,\n                    \"capabilities\": \u0026a.capabilities,\n                })\n            }).collect();\n            ok_json(serde_json::json!(data))\n        },\n        Err(e) =\u003e registry_error(e),\n    }\n}\n\npub async fn deregister_agent(\n    State(state): State\u003cAppState\u003e,\n    Path((tenant_id, agent_id)): Path\u003c(String, String)\u003e,\n) -\u003e ApiResult {\n    match state.registry.deregister_agent(\u0026tenant_id, \u0026agent_id) {\n        Ok(a) =\u003e ok_json(serde_json::json!({ \"agent_id\": a.agent_id, \"display_name\": a.display_name })),\n        Err(e) =\u003e registry_error(e),\n    }\n}\n\n// ── Message Routing ──\n\npub async fn send_message(State(state): State\u003cAppState\u003e, Json(req): Json\u003cSendMessageRequest\u003e) -\u003e ApiResult {\n    // Validate sender\n    if let Err(e) = state.registry.find_agent(\u0026req.tenant_id, \u0026req.from_agent) {\n        return registry_error(e);\n    }\n    // Rate limit\n    if !state.rate_limiter.try_acquire(\u0026req.tenant_id, \u0026req.from_agent, 1) {\n        return err_json(StatusCode::TOO_MANY_REQUESTS, \"Rate limit exceeded\");\n    }\n    // Validate protocol\n    let valid_protocols = [\"task_assignment\", \"status_report\", \"data_exchange\",\n                           \"intent_negotiation\", \"human_handoff\", \"heartbeat\", \"text\"];\n    if !valid_protocols.contains(\u0026req.protocol.as_str()) {\n        return err_json(StatusCode::BAD_REQUEST, \u0026format!(\"Invalid protocol: {}\", req.protocol));\n    }\n    // In production: route to P2P network via the from_agent's connection\n    ok_json(serde_json::json!({\n        \"status\": \"delivered\",\n        \"from\": req.from_agent,\n        \"to\": req.to_agent,\n        \"protocol\": req.protocol,\n        \"timestamp\": std::time::SystemTime::now()\n            .duration_since(std::time::UNIX_EPOCH)\n            .unwrap_or_default().as_millis(),\n    }))\n}\n\npub async fn query_messages(\n    State(state): State\u003cAppState\u003e,\n    Path(tenant_id): Path\u003cString\u003e,\n) -\u003e ApiResult {\n    if !state.registry.has_tenant(\u0026tenant_id) {\n        return err_json(StatusCode::NOT_FOUND, \"Tenant not found\");\n    }\n    // In production: query persistent message store\n    ok_json(serde_json::json!({\n        \"messages\": [],\n        \"total\": 0,\n        \"tenant_id\": tenant_id,\n    }))\n}\n\n// ─── Router ─────────────────────────────────────────────────────\n\npub fn create_router(state: AppState) -\u003e Router {\n    Router::new()\n        .route(\"/health\", get(health))\n        .route(\"/tenants\", post(create_tenant).get(list_tenants))\n        .route(\"/tenants/{tenant_id}\", get(get_tenant).put(update_tenant).delete(delete_tenant))\n        .route(\"/tenants/{tenant_id}/agents\", post(register_agent).get(list_agents))\n        .route(\"/tenants/{tenant_id}/agents/{agent_id}\", delete(deregister_agent))\n        .route(\"/messages\", post(send_message))\n        .route(\"/messages/{tenant_id}\", get(query_messages))\n        .with_state(state)\n}\n\n// ─── Tests ──────────────────────────────────────────────────────\n\n#[cfg(test)]\n#[allow(unused)]\nmod tests {\n    use super::*;\n    use crate::identity::IdentityBuilder;\n\n    fn make_agent(name: \u0026str, caps: \u0026[\u0026str]) -\u003e AgentIdentity {\n        let seed = { let mut b = name.as_bytes().to_vec(); b.resize(32, 0); b };\n        let sk = ed25519_dalek::SigningKey::from_bytes(\u0026seed.try_into().unwrap());\n        IdentityBuilder::new(name).capabilities(caps).build_with_key(\u0026sk).unwrap()\n    }\n\n    fn state() -\u003e AppState { AppState::new() }\n    fn s(r: \u0026ApiResult) -\u003e StatusCode { r.0 }\n\n    #[tokio::test]\n    async fn test_health() {\n        assert_eq!(s(\u0026health().await), StatusCode::OK);\n    }\n\n    // ── Tenant CRUD ──\n\n    #[tokio::test]\n    async fn test_create_and_get_tenant() {\n        let st = state();\n        create_tenant(State(st.clone()), Json(CreateTenantRequest {\n            tenant_id: \"org-1\".into(), name: \"Test Corp\".into(), config: None,\n        })).await;\n        let r = get_tenant(State(st), Path(\"org-1\".into())).await;\n        assert_eq!(s(\u0026r), StatusCode::OK);\n        assert_eq!(r.1 .0[\"data\"][\"name\"], \"Test Corp\");\n    }\n\n    #[tokio::test]\n    async fn test_create_tenant_with_config() {\n        let st = state();\n        let r = create_tenant(State(st), Json(CreateTenantRequest {\n            tenant_id: \"strict\".into(), name: \"S\".into(),\n            config: Some(TenantConfig { max_agents: 5, require_approval: true, ..Default::default() }),\n        })).await;\n        assert_eq!(s(\u0026r), StatusCode::CREATED);\n    }\n\n    #[tokio::test]\n    async fn test_duplicate_tenant() {\n        let st = state();\n        let req = CreateTenantRequest { tenant_id: \"dup\".into(), name: \"D\".into(), config: None };\n        assert_eq!(s(\u0026create_tenant(State(st.clone()), Json(req.clone())).await), StatusCode::CREATED);\n        assert_eq!(s(\u0026create_tenant(State(st), Json(req)).await), StatusCode::CONFLICT);\n    }\n\n    #[tokio::test]\n    async fn test_list_tenants() {\n        let st = state();\n        for id in \u0026[\"org-1\", \"org-2\"] {\n            create_tenant(State(st.clone()), Json(CreateTenantRequest {\n                tenant_id: id.to_string(), name: \"T\".into(), config: None,\n            })).await;\n        }\n        let r = list_tenants(State(st)).await;\n        assert_eq!(s(\u0026r), StatusCode::OK);\n        assert_eq!(r.1 .0[\"data\"].as_array().unwrap().len(), 2);\n    }\n\n    #[tokio::test]\n    async fn test_get_tenant_not_found() {\n        let r = get_tenant(State(state()), Path(\"nope\".into())).await;\n        assert_eq!(s(\u0026r), StatusCode::NOT_FOUND);\n    }\n\n    #[tokio::test]\n    async fn test_update_tenant_name() {\n        let st = state();\n        create_tenant(State(st.clone()), Json(CreateTenantRequest {\n            tenant_id: \"org-1\".into(), name: \"Old\".into(), config: None,\n        })).await;\n        let r = update_tenant(State(st.clone()), Path(\"org-1\".into()), Json(UpdateTenantRequest {\n            name: Some(\"New Name\".into()), active: None, config: None,\n        })).await;\n        assert_eq!(s(\u0026r), StatusCode::OK);\n        assert_eq!(r.1 .0[\"data\"][\"name\"], \"New Name\");\n    }\n\n    #[tokio::test]\n    async fn test_update_tenant_not_found() {\n        let r = update_tenant(State(state()), Path(\"nope\".into()), Json(UpdateTenantRequest {\n            name: Some(\"X\".into()), active: None, config: None,\n        })).await;\n        assert_eq!(s(\u0026r), StatusCode::NOT_FOUND);\n    }\n\n    #[tokio::test]\n    async fn test_delete_tenant() {\n        let st = state();\n        create_tenant(State(st.clone()), Json(CreateTenantRequest {\n            tenant_id: \"org-1\".into(), name: \"T\".into(), config: None,\n        })).await;\n        let r = delete_tenant(State(st.clone()), Path(\"org-1\".into())).await;\n        assert_eq!(s(\u0026r), StatusCode::OK);\n        assert_eq!(r.1 .0[\"data\"][\"deleted\"], true);\n        // Verify gone\n        let r2 = get_tenant(State(st), Path(\"org-1\".into())).await;\n        assert_eq!(s(\u0026r2), StatusCode::NOT_FOUND);\n    }\n\n    #[tokio::test]\n    async fn test_delete_tenant_not_found() {\n        let r = delete_tenant(State(state()), Path(\"nope\".into())).await;\n        assert_eq!(s(\u0026r), StatusCode::NOT_FOUND);\n    }\n\n    // ── Agent Management ──\n\n    #[tokio::test]\n    async fn test_register_agent() {\n        let st = state();\n        create_tenant(State(st.clone()), Json(CreateTenantRequest {\n            tenant_id: \"org-1\".into(), name: \"T\".into(), config: None,\n        })).await;\n        let r = register_agent(State(st), Path(\"org-1\".into()), Json(make_agent(\"Alice\", \u0026[\"crypto\"]))).await;\n        assert_eq!(s(\u0026r), StatusCode::CREATED);\n        assert_eq!(r.1 .0[\"data\"][\"display_name\"], \"Alice\");\n    }\n\n    #[tokio::test]\n    async fn test_register_agent_nonexistent_tenant() {\n        let r = register_agent(State(state()), Path(\"nope\".into()), Json(make_agent(\"A\", \u0026[]))).await;\n        assert_eq!(s(\u0026r), StatusCode::NOT_FOUND);\n    }\n\n    #[tokio::test]\n    async fn test_register_agent_max_limit() {\n        let st = state();\n        create_tenant(State(st.clone()), Json(CreateTenantRequest {\n            tenant_id: \"strict\".into(), name: \"S\".into(),\n            config: Some(TenantConfig { max_agents: 1, ..Default::default() }),\n        })).await;\n        let r1 = register_agent(State(st.clone()), Path(\"strict\".into()), Json(make_agent(\"A\", \u0026[]))).await;\n        assert_eq!(s(\u0026r1), StatusCode::CREATED);\n        let r2 = register_agent(State(st), Path(\"strict\".into()), Json(make_agent(\"B\", \u0026[]))).await;\n        assert_eq!(s(\u0026r2), StatusCode::BAD_REQUEST);\n    }\n\n    #[tokio::test]\n    async fn test_list_agents() {\n        let st = state();\n        create_tenant(State(st.clone()), Json(CreateTenantRequest {\n            tenant_id: \"org-1\".into(), name: \"T\".into(), config: None,\n        })).await;\n        register_agent(State(st.clone()), Path(\"org-1\".into()), Json(make_agent(\"Alice\", \u0026[\"crypto\"]))).await;\n        let r = list_agents(State(st), Path(\"org-1\".into())).await;\n        assert_eq!(s(\u0026r), StatusCode::OK);\n        assert_eq!(r.1 .0[\"data\"].as_array().unwrap().len(), 1);\n    }\n\n    #[tokio::test]\n    async fn test_deregister_agent() {\n        let st = state();\n        create_tenant(State(st.clone()), Json(CreateTenantRequest {\n            tenant_id: \"org-1\".into(), name: \"T\".into(), config: None,\n        })).await;\n        let agent = make_agent(\"Alice\", \u0026[]);\n        let aid = agent.agent_id.clone();\n        register_agent(State(st.clone()), Path(\"org-1\".into()), Json(agent)).await;\n        let r = deregister_agent(State(st), Path((\"org-1\".into(), aid))).await;\n        assert_eq!(s(\u0026r), StatusCode::OK);\n    }\n\n    #[tokio::test]\n    async fn test_deregister_agent_not_found() {\n        let st = state();\n        create_tenant(State(st.clone()), Json(CreateTenantRequest {\n            tenant_id: \"org-1\".into(), name: \"T\".into(), config: None,\n        })).await;\n        let r = deregister_agent(State(st), Path((\"org-1\".into(), \"did:walkie:nope\".into()))).await;\n        assert_eq!(s(\u0026r), StatusCode::NOT_FOUND);\n    }\n\n    // ── Messaging ──\n\n    #[tokio::test]\n    async fn test_send_message() {\n        let st = state();\n        create_tenant(State(st.clone()), Json(CreateTenantRequest {\n            tenant_id: \"org-1\".into(), name: \"T\".into(), config: None,\n        })).await;\n        let agent = make_agent(\"Sender\", \u0026[\"chat\"]);\n        let aid = agent.agent_id.clone();\n        register_agent(State(st.clone()), Path(\"org-1\".into()), Json(agent)).await;\n        let r = send_message(State(st), Json(SendMessageRequest {\n            from_agent: aid, to_agent: String::new(),\n            tenant_id: \"org-1\".into(), protocol: \"data_exchange\".into(),\n            payload: serde_json::json!({\"text\": \"hello\"}),\n        })).await;\n        assert_eq!(s(\u0026r), StatusCode::OK);\n        assert_eq!(r.1 .0[\"data\"][\"status\"], \"delivered\");\n    }\n\n    #[tokio::test]\n    async fn test_send_message_invalid_protocol() {\n        let st = state();\n        create_tenant(State(st.clone()), Json(CreateTenantRequest {\n            tenant_id: \"org-1\".into(), name: \"T\".into(), config: None,\n        })).await;\n        let agent = make_agent(\"Sender\", \u0026[]);\n        let aid = agent.agent_id.clone();\n        register_agent(State(st.clone()), Path(\"org-1\".into()), Json(agent)).await;\n        let r = send_message(State(st), Json(SendMessageRequest {\n            from_agent: aid, to_agent: String::new(),\n            tenant_id: \"org-1\".into(), protocol: \"evil_protocol\".into(),\n            payload: serde_json::json!({}),\n        })).await;\n        assert_eq!(s(\u0026r), StatusCode::BAD_REQUEST);\n    }\n\n    #[tokio::test]\n    async fn test_send_message_nonexistent_agent() {\n        let r = send_message(State(state()), Json(SendMessageRequest {\n            from_agent: \"did:walkie:nope\".into(), to_agent: String::new(),\n            tenant_id: \"nope\".into(), protocol: \"text\".into(), payload: serde_json::json!({}),\n        })).await;\n        assert_eq!(s(\u0026r), StatusCode::NOT_FOUND);\n    }\n\n    #[tokio::test]\n    async fn test_rate_limiting() {\n        let st = state();\n        create_tenant(State(st.clone()), Json(CreateTenantRequest {\n            tenant_id: \"org-1\".into(), name: \"T\".into(), config: None,\n        })).await;\n        let agent = make_agent(\"Sender\", \u0026[]);\n        let aid = agent.agent_id.clone();\n        register_agent(State(st.clone()), Path(\"org-1\".into()), Json(agent)).await;\n        for _ in 0..10 {\n            let r = send_message(State(st.clone()), Json(SendMessageRequest {\n                from_agent: aid.clone(), to_agent: String::new(),\n                tenant_id: \"org-1\".into(), protocol: \"text\".into(), payload: serde_json::json!({}),\n            })).await;\n            assert_eq!(s(\u0026r), StatusCode::OK);\n        }\n        let r = send_message(State(st), Json(SendMessageRequest {\n            from_agent: aid, to_agent: String::new(),\n            tenant_id: \"org-1\".into(), protocol: \"text\".into(), payload: serde_json::json!({}),\n        })).await;\n        assert_eq!(s(\u0026r), StatusCode::TOO_MANY_REQUESTS);\n    }\n\n    #[tokio::test]\n    async fn test_query_messages() {\n        let st = state();\n        create_tenant(State(st.clone()), Json(CreateTenantRequest {\n            tenant_id: \"org-1\".into(), name: \"T\".into(), config: None,\n        })).await;\n        let r = query_messages(State(st), Path(\"org-1\".into())).await;\n        assert_eq!(s(\u0026r), StatusCode::OK);\n    }\n\n    #[tokio::test]\n    async fn test_query_messages_not_found() {\n        let r = query_messages(State(state()), Path(\"nope\".into())).await;\n        assert_eq!(s(\u0026r), StatusCode::NOT_FOUND);\n    }\n\n    // ── Edge Cases \u0026 Integration ──\n\n    #[tokio::test]\n    async fn test_list_tenants_empty() {\n        let r = list_tenants(State(state())).await;\n        assert_eq!(s(\u0026r), StatusCode::OK);\n        assert_eq!(r.1 .0[\"data\"].as_array().unwrap().len(), 0);\n    }\n\n    #[tokio::test]\n    async fn test_update_tenant_config() {\n        let st = state();\n        create_tenant(State(st.clone()), Json(CreateTenantRequest {\n            tenant_id: \"org-1\".into(), name: \"Acme\".into(), config: None,\n        })).await;\n        let r = update_tenant(State(st.clone()), Path(\"org-1\".into()), Json(UpdateTenantRequest {\n            name: None, active: None,\n            config: Some(TenantConfig {\n                max_agents: 3,\n                require_approval: true,\n                allowed_capabilities: vec![\"chat\".into()],\n                ..Default::default()\n            }),\n        })).await;\n        assert_eq!(s(\u0026r), StatusCode::OK);\n        // Verify config applied: should now reject \u003e 3 agents\n        create_tenant(State(st.clone()), Json(CreateTenantRequest {\n            tenant_id: \"org-1b\".into(), name: \"dummy\".into(), config: None,\n        })).await;\n        for name in \u0026[\"A\", \"B\", \"C\"] {\n            let rr = register_agent(State(st.clone()), Path(\"org-1\".into()), Json(make_agent(name, \u0026[\"chat\"]))).await;\n            assert_eq!(s(\u0026rr), StatusCode::CREATED, \"Agent {} should register\", name);\n        }\n        let r_fail = register_agent(State(st), Path(\"org-1\".into()), Json(make_agent(\"D\", \u0026[\"chat\"]))).await;\n        assert_eq!(s(\u0026r_fail), StatusCode::BAD_REQUEST);\n    }\n\n    #[tokio::test]\n    async fn test_update_tenant_deactivate() {\n        let st = state();\n        create_tenant(State(st.clone()), Json(CreateTenantRequest {\n            tenant_id: \"org-1\".into(), name: \"Acme\".into(), config: None,\n        })).await;\n        register_agent(State(st.clone()), Path(\"org-1\".into()), Json(make_agent(\"A\", \u0026[]))).await;\n        // Deactivate\n        let r = update_tenant(State(st.clone()), Path(\"org-1\".into()), Json(UpdateTenantRequest {\n            name: None, active: Some(false), config: None,\n        })).await;\n        assert_eq!(s(\u0026r), StatusCode::OK);\n        assert_eq!(r.1 .0[\"data\"][\"active\"], false);\n        // Should not be able to register new agents\n        let r2 = register_agent(State(st.clone()), Path(\"org-1\".into()), Json(make_agent(\"B\", \u0026[]))).await;\n        assert_eq!(s(\u0026r2), StatusCode::BAD_REQUEST);\n    }\n\n    #[tokio::test]\n    async fn test_send_message_multiple_protocols() {\n        let st = state();\n        create_tenant(State(st.clone()), Json(CreateTenantRequest {\n            tenant_id: \"org-1\".into(), name: \"T\".into(), config: None,\n        })).await;\n        let agent = make_agent(\"Sender\", \u0026[]);\n        let aid = agent.agent_id.clone();\n        register_agent(State(st.clone()), Path(\"org-1\".into()), Json(agent)).await;\n        for proto in \u0026[\"text\", \"task_assignment\", \"status_report\", \"data_exchange\", \"intent_negotiation\", \"human_handoff\", \"heartbeat\"] {\n            let r = send_message(State(st.clone()), Json(SendMessageRequest {\n                from_agent: aid.clone(), to_agent: String::new(),\n                tenant_id: \"org-1\".into(), protocol: proto.to_string(),\n                payload: serde_json::json!({\"test\": true}),\n            })).await;\n            assert_eq!(s(\u0026r), StatusCode::OK, \"Protocol {} should succeed\", proto);\n        }\n    }\n\n    #[tokio::test]\n    async fn test_send_message_missing_from_agent() {\n        let st = state();\n        create_tenant(State(st.clone()), Json(CreateTenantRequest {\n            tenant_id: \"org-1\".into(), name: \"T\".into(), config: None,\n        })).await;\n        let r = send_message(State(st), Json(SendMessageRequest {\n            from_agent: \"did:walkie:notregistered\".into(), to_agent: String::new(),\n            tenant_id: \"org-1\".into(), protocol: \"text\".into(),\n            payload: serde_json::json!({}),\n        })).await;\n        assert_eq!(s(\u0026r), StatusCode::NOT_FOUND);\n    }\n\n    #[tokio::test]\n    async fn test_full_workflow() {\n        let st = state();\n\n        // 1. Create tenant\n        let r = create_tenant(State(st.clone()), Json(CreateTenantRequest {\n            tenant_id: \"workflow-org\".into(), name: \"Workflow Test\".into(),\n            config: Some(TenantConfig { max_agents: 3, ..Default::default() }),\n        })).await;\n        assert_eq!(s(\u0026r), StatusCode::CREATED);\n\n        // 2. Get tenant\n        let r2 = get_tenant(State(st.clone()), Path(\"workflow-org\".into())).await;\n        assert_eq!(s(\u0026r2), StatusCode::OK);\n        assert_eq!(r2.1 .0[\"data\"][\"name\"], \"Workflow Test\");\n\n        // 3. Register two agents\n        let alice = make_agent(\"Alice\", \u0026[\"chat\", \"crypto\"]);\n        let bob = make_agent(\"Bob\", \u0026[\"chat\"]);\n        let alice_id = alice.agent_id.clone();\n        let bob_id = bob.agent_id.clone();\n        assert_eq!(s(\u0026register_agent(State(st.clone()), Path(\"workflow-org\".into()), Json(alice)).await), StatusCode::CREATED);\n        assert_eq!(s(\u0026register_agent(State(st.clone()), Path(\"workflow-org\".into()), Json(bob)).await), StatusCode::CREATED);\n\n        // 4. List agents\n        let r3 = list_agents(State(st.clone()), Path(\"workflow-org\".into())).await;\n        assert_eq!(r3.1 .0[\"data\"].as_array().unwrap().len(), 2);\n\n        // 5. Alice sends task to Bob\n        let r4 = send_message(State(st.clone()), Json(SendMessageRequest {\n            from_agent: alice_id.clone(), to_agent: bob_id.clone(),\n            tenant_id: \"workflow-org\".into(), protocol: \"task_assignment\".into(),\n            payload: serde_json::json!({\"title\": \"Analyze data\", \"priority\": \"high\"}),\n        })).await;\n        assert_eq!(s(\u0026r4), StatusCode::OK);\n        assert_eq!(r4.1 .0[\"data\"][\"from\"], alice_id);\n\n        // 6. Bob reports status\n        let r5 = send_message(State(st.clone()), Json(SendMessageRequest {\n            from_agent: bob_id.clone(), to_agent: alice_id,\n            tenant_id: \"workflow-org\".into(), protocol: \"status_report\".into(),\n            payload: serde_json::json!({\"status\": \"completed\", \"progress\": 1.0}),\n        })).await;\n        assert_eq!(s(\u0026r5), StatusCode::OK);\n\n        // 7. Query messages\n        let r6 = query_messages(State(st.clone()), Path(\"workflow-org\".into())).await;\n        assert_eq!(s(\u0026r6), StatusCode::OK);\n\n        // 8. Update tenant name\n        let r7 = update_tenant(State(st.clone()), Path(\"workflow-org\".into()), Json(UpdateTenantRequest {\n            name: Some(\"Updated Workflow\".into()), active: None, config: None,\n        })).await;\n        assert_eq!(s(\u0026r7), StatusCode::OK);\n\n        // 9. Deregister Bob\n        let r8 = deregister_agent(State(st.clone()), Path((\"workflow-org\".into(), bob_id))).await;\n        assert_eq!(s(\u0026r8), StatusCode::OK);\n\n        // 10. Delete tenant\n        let r9 = delete_tenant(State(st), Path(\"workflow-org\".into())).await;\n        assert_eq!(s(\u0026r9), StatusCode::OK);\n    }\n\n    #[tokio::test]\n    async fn test_create_tenant_minimal() {\n        let r = create_tenant(State(state()), Json(CreateTenantRequest {\n            tenant_id: \"minimal\".into(), name: \"M\".into(), config: None,\n        })).await;\n        assert_eq!(s(\u0026r), StatusCode::CREATED);\n        // Verify defaults\n        assert_eq!(r.1 .0[\"data\"][\"active\"], true);\n        assert_eq!(r.1 .0[\"data\"][\"agent_count\"], 0);\n    }\n\n    #[tokio::test]\n    async fn test_register_agent_duplicate_different_tenant() {\n        let st = state();\n        create_tenant(State(st.clone()), Json(CreateTenantRequest {\n            tenant_id: \"org-1\".into(), name: \"T1\".into(), config: None,\n        })).await;\n        create_tenant(State(st.clone()), Json(CreateTenantRequest {\n            tenant_id: \"org-2\".into(), name: \"T2\".into(), config: None,\n        })).await;\n        let agent = make_agent(\"Alice\", \u0026[]);\n        assert_eq!(s(\u0026register_agent(State(st.clone()), Path(\"org-1\".into()), Json(agent.clone())).await), StatusCode::CREATED);\n        // Same agent in different tenant should succeed\n        let r2 = register_agent(State(st), Path(\"org-2\".into()), Json(agent)).await;\n        assert_eq!(s(\u0026r2), StatusCode::CREATED);\n    }\n\n}\n","traces":[{"line":27,"address":[],"length":0,"stats":{"Line":0}},{"line":28,"address":[],"length":0,"stats":{"Line":0}},{"line":33,"address":[],"length":0,"stats":{"Line":29}},{"line":35,"address":[],"length":0,"stats":{"Line":87}},{"line":36,"address":[],"length":0,"stats":{"Line":29}},{"line":70,"address":[],"length":0,"stats":{"Line":37}},{"line":71,"address":[],"length":0,"stats":{"Line":74}},{"line":74,"address":[],"length":0,"stats":{"Line":41}},{"line":75,"address":[],"length":0,"stats":{"Line":82}},{"line":78,"address":[],"length":0,"stats":{"Line":15}},{"line":79,"address":[],"length":0,"stats":{"Line":45}},{"line":82,"address":[],"length":0,"stats":{"Line":8}},{"line":83,"address":[],"length":0,"stats":{"Line":8}},{"line":85,"address":[],"length":0,"stats":{"Line":8}},{"line":87,"address":[],"length":0,"stats":{"Line":2}},{"line":89,"address":[],"length":0,"stats":{"Line":6}},{"line":95,"address":[],"length":0,"stats":{"Line":2}},{"line":96,"address":[],"length":0,"stats":{"Line":4}},{"line":101,"address":[],"length":0,"stats":{"Line":26}},{"line":105,"address":[],"length":0,"stats":{"Line":55}},{"line":106,"address":[],"length":0,"stats":{"Line":12}},{"line":108,"address":[],"length":0,"stats":{"Line":69}},{"line":110,"address":[],"length":0,"stats":{"Line":26}},{"line":111,"address":[],"length":0,"stats":{"Line":75}},{"line":112,"address":[],"length":0,"stats":{"Line":50}},{"line":113,"address":[],"length":0,"stats":{"Line":75}},{"line":115,"address":[],"length":0,"stats":{"Line":3}},{"line":119,"address":[],"length":0,"stats":{"Line":4}},{"line":120,"address":[],"length":0,"stats":{"Line":4}},{"line":121,"address":[],"length":0,"stats":{"Line":10}},{"line":122,"address":[],"length":0,"stats":{"Line":2}},{"line":123,"address":[],"length":0,"stats":{"Line":8}},{"line":124,"address":[],"l :[],"length":0,"stats":{"Line":0}},{"line":262,"address":[],"length":0,"stats":{"Line":0}},{"line":263,"address":[],"length":0,"stats":{"Line":0}},{"line":264,"address":[],"length":0,"stats":{"Line":0}}],"covered":94,"coverable":107},{"path":["/","Users","nextstop","projects","walkie-talkie","core","src","identity","mod.rs"],"content":"//! Agent Identity Protocol — Walkie Talkie v4\n//!\n//! Each Agent has a cryptographically-verifiable identity:\n//!   - **agent_id**: `did:walkie:\u003ced25519-pubkey-base64url\u003e` — globally unique\n//!   - **signing keypair**: Ed25519 — signs identity claims + messages\n//!   - **capabilities**: declared abilities (e.g. \"code-review\", \"translate\")\n//!\n//! Wire exchange happens via a dedicated Gossipsub topic\n//! (`/walkie-talkie/identity/1.0.0`) after the E2EE session is established.\n\nuse ed25519_dalek::{SigningKey, VerifyingKey, Signer, Verifier, Signature};\nuse rand::rngs::OsRng;\nuse serde::{Serialize, Deserialize};\nuse thiserror::Error;\n\n// ─── DID Format ──────────────────────────────────────────────────\n\n/// DID method prefix for Walkie Talkie agents.\npub const DID_PREFIX: \u0026str = \"did:walkie\";\n\n/// Identity exchange Gossipsub topic.\npub const IDENTITY_TOPIC: \u0026str = \"/walkie-talkie/identity/1.0.0\";\n\n/// Convert a raw Ed25519 public key (32 bytes) to a did:walkie string.\npub fn did_from_pubkey(pubkey_bytes: \u0026[u8]) -\u003e String {\n    let encoded = base64_url_encode(pubkey_bytes);\n    format!(\"{DID_PREFIX}:{encoded}\")\n}\n\n/// Extract the raw public key bytes from a did:walkie string.\n/// Returns None if the format is invalid.\npub fn pubkey_from_did(did: \u0026str) -\u003e Option\u003cVec\u003cu8\u003e\u003e {\n    let rest = did.strip_prefix(DID_PREFIX)?.strip_prefix(':')?;\n    base64_url_decode_inner(rest).ok()\n}\n\nfn base64_url_encode(data: \u0026[u8]) -\u003e String {\n    use base64::Engine;\n    base64::engine::general_purpose::URL_SAFE_NO_PAD.encode(data)\n}\n\nfn base64_url_decode_inner(data: \u0026str) -\u003e std::result::Result\u003cVec\u003cu8\u003e, base64::DecodeError\u003e {\n    use base64::Engine;\n    base64::engine::general_purpose::URL_SAFE_NO_PAD.decode(data)\n}\n\n// ─── Agent Identity ─────────────────────────────────────────────\n\n/// Cryptographic identity for an AI Agent.\n///\n/// Serialized as JSON for wire exchange. The `signature` field is an\n/// Ed25519 signature over the canonical JSON of all other fields.\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct AgentIdentity {\n    /// Globally unique identifier: `did:walkie:\u003cbase64url-pubkey\u003e`\n    pub agent_id: String,\n\n    /// Human-readable name (e.g. \"Rustacean\", \"CodeReview Bot\")\n    pub display_name: String,\n\n    /// Declared capabilities (e.g. [\"code-review\", \"p2p-routing\", \"translate\"])\n    pub capabilities: Vec\u003cString\u003e,\n\n    /// Ed25519 public key (raw 32 bytes, used for verification)\n    #[serde(with = \"bytes_base64\")]\n    pub public_key: Vec\u003cu8\u003e,\n\n    /// DID of the human/organization that created this Agent\n    pub owner_id: String,\n\n    /// Software version string (e.g. \"walkie-talkie-core/0.2.0\")\n    pub version: String,\n\n    /// Unix timestamp (ms) when this identity was created\n    pub created_at: u64,\n\n    /// Ed25519 signature over all other fields (base64url)\n    #[serde(with = \"bytes_base64\")]\n    pub signature: Vec\u003cu8\u003e,\n}\n\npub mod bytes_base64 {\n    use base64::Engine;\n    use serde::{self, Deserialize, Serializer, Deserializer};\n\n    pub fn serialize\u003cS: Serializer\u003e(data: \u0026Vec\u003cu8\u003e, s: S) -\u003e Result\u003cS::Ok, S::Error\u003e {\n        let encoded = base64::engine::general_purpose::URL_SAFE_NO_PAD.encode(data);\n        s.serialize_str(\u0026encoded)\n    }\n\n    pub fn deserialize\u003c'de, D: Deserializer\u003c'de\u003e\u003e(d: D) -\u003e Result\u003cVec\u003cu8\u003e, D::Error\u003e {\n        let s = String::deserialize(d)?;\n        base64::engine::general_purpose::URL_SAFE_NO_PAD\n            .decode(\u0026s)\n            .map_err(serde::de::Error::custom)\n    }\n}\n\n#[derive(Debug, Error)]\npub enum IdentityError {\n    #[error(\"Invalid DID format: {0}\")]\n    InvalidDID(String),\n    #[error(\"Signature verification failed\")]\n    InvalidSignature,\n    #[error(\"Public key does not match agent_id\")]\n    PublicKeyMismatch,\n    #[error(\"Serialization failed: {0}\")]\n    Serialization(String),\n    #[error(\"Key generation failed: {0}\")]\n    KeyGeneration(String),\n    #[error(\"Identity expired (created_at={created_at})\")]\n    Expired { created_at: u64 },\n    #[error(\"Missing required field: {0}\")]\n    MissingField(String),\n}\n\npub type Result\u003cT\u003e = std::result::Result\u003cT, IdentityError\u003e;\n\nimpl AgentIdentity {\n    /// The data that gets signed (everything except `signature`).\n    fn signing_payload(\u0026self) -\u003e Result\u003cVec\u003cu8\u003e\u003e {\n        #[derive(Serialize)]\n        struct Payload\u003c'a\u003e {\n            agent_id: \u0026'a str,\n            display_name: \u0026'a str,\n            capabilities: \u0026'a [String],\n            public_key: \u0026'a [u8],\n            owner_id: \u0026'a str,\n            version: \u0026'a str,\n            created_at: u64,\n        }\n        let payload = Payload {\n            agent_id: \u0026self.agent_id,\n            display_name: \u0026self.display_name,\n            capabilities: \u0026self.capabilities,\n            public_key: \u0026self.public_key,\n            owner_id: \u0026self.owner_id,\n            version: \u0026self.version,\n            created_at: self.created_at,\n        };\n        serde_json::to_vec(\u0026payload)\n            .map_err(|e| IdentityError::Serialization(e.to_string()))\n    }\n\n    /// Verify that the identity is self-signed and the public key matches the agent_id.\n    pub fn verify(\u0026self) -\u003e Result\u003c()\u003e {\n        // 1. Check agent_id matches public_key\n        let expected_did = did_from_pubkey(\u0026self.public_key);\n        if expected_did != self.agent_id {\n            return Err(IdentityError::PublicKeyMismatch);\n        }\n\n        // 2. Reconstruct the signing payload\n        let payload = self.signing_payload()?;\n\n        // 3. Verify Ed25519 signature\n        let pubkey_bytes: [u8; 32] = self.public_key.clone().try_into()\n            .map_err(|_| IdentityError::InvalidDID(\"public_key must be 32 bytes\".into()))?;\n\n        let verifying_key = VerifyingKey::from_bytes(\u0026pubkey_bytes)\n            .map_err(|_| IdentityError::InvalidDID(\"invalid Ed25519 public key\".into()))?;\n\n        let signature_bytes: [u8; 64] = self.signature.clone().try_into()\n            .map_err(|_| IdentityError::InvalidSignature)?;\n\n        let signature = Signature::from_bytes(\u0026signature_bytes);\n\n        verifying_key.verify(\u0026payload, \u0026signature)\n            .map_err(|_| IdentityError::InvalidSignature)?;\n\n        Ok(())\n    }\n\n    /// Check if this agent declares a specific capability.\n    pub fn has_capability(\u0026self, cap: \u0026str) -\u003e bool {\n        self.capabilities.iter().any(|c| c.eq_ignore_ascii_case(cap))\n    }\n\n    /// A short display string for logging.\n    pub fn short_id(\u0026self) -\u003e String {\n        self.agent_id.chars().take(24).collect()\n    }\n}\n\n// ─── Identity Builder ───────────────────────────────────────────\n\n/// Creates and signs AgentIdentity documents.\npub struct IdentityBuilder {\n    display_name: String,\n    capabilities: Vec\u003cString\u003e,\n    owner_id: String,\n    version: String,\n}\n\nimpl IdentityBuilder {\n    pub fn new(display_name: \u0026str) -\u003e Self {\n        Self {\n            display_name: display_name.to_string(),\n            capabilities: Vec::new(),\n            owner_id: String::new(),\n            version: \"walkie-talkie-core/0.2.0\".to_string(),\n        }\n    }\n\n    pub fn capability(mut self, cap: \u0026str) -\u003e Self {\n        self.capabilities.push(cap.to_string());\n        self\n    }\n\n    pub fn capabilities(mut self, caps: \u0026[\u0026str]) -\u003e Self {\n        self.capabilities.extend(caps.iter().map(|s| s.to_string()));\n        self\n    }\n\n    pub fn owner_id(mut self, id: \u0026str) -\u003e Self {\n        self.owner_id = id.to_string();\n        self\n    }\n\n    pub fn version(mut self, v: \u0026str) -\u003e Self {\n        self.version = v.to_string();\n        self\n    }\n\n    /// Generate a new Ed25519 keypair and sign the identity document.\n    /// Returns the signed identity and the signing key (keep secret!).\n    pub fn build(self) -\u003e Result\u003c(AgentIdentity, SigningKey)\u003e {\n        let signing_key = SigningKey::generate(\u0026mut OsRng);\n        let verifying_key = signing_key.verifying_key();\n        let pubkey_bytes = verifying_key.to_bytes();\n\n        let agent_id = did_from_pubkey(\u0026pubkey_bytes);\n        let created_at = std::time::SystemTime::now()\n            .duration_since(std::time::UNIX_EPOCH)\n            .unwrap_or_default()\n            .as_millis() as u64;\n\n        let identity = AgentIdentity {\n            agent_id,\n            display_name: self.display_name,\n            capabilities: self.capabilities,\n            public_key: pubkey_bytes.to_vec(),\n            owner_id: self.owner_id,\n            version: self.version,\n            created_at,\n            signature: Vec::new(), // placeholder, filled below\n        };\n\n        let payload = identity.signing_payload()?;\n        let signature = signing_key.sign(\u0026payload);\n\n        let signed = AgentIdentity {\n            signature: signature.to_bytes().to_vec(),\n            ..identity\n        };\n\n        Ok((signed, signing_key))\n    }\n\n    /// Build with a pre-existing signing key (for deterministic testing).\n    #[cfg(test)]\n    pub fn build_with_key(self, signing_key: \u0026SigningKey) -\u003e Result\u003cAgentIdentity\u003e {\n        let verifying_key = signing_key.verifying_key();\n        let pubkey_bytes = verifying_key.to_bytes();\n\n        let agent_id = did_from_pubkey(\u0026pubkey_bytes);\n        let created_at = 1700000000000u64; // deterministic for tests\n\n        let identity = AgentIdentity {\n            agent_id,\n            display_name: self.display_name,\n            capabilities: self.capabilities,\n            public_key: pubkey_bytes.to_vec(),\n            owner_id: self.owner_id,\n            version: self.version,\n            created_at,\n            signature: Vec::new(),\n        };\n\n        let payload = identity.signing_payload()?;\n        let signature = signing_key.sign(\u0026payload);\n\n        let signed = AgentIdentity {\n            signature: signature.to_bytes().to_vec(),\n            ..identity\n        };\n\n        Ok(signed)\n    }\n}\n\n// ─── Identity Document for Wire Exchange ────────────────────────\n\n/// Wrapper for exchanging identities over Gossipsub.\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct IdentityEnvelope {\n    /// The signed agent identity.\n    pub identity: AgentIdentity,\n    /// PeerId of the sender (for routing).\n    pub peer_id: String,\n}\n\nimpl IdentityEnvelope {\n    /// Create a new envelope with the given identity and peer_id.\n    pub fn new(identity: AgentIdentity, peer_id: \u0026str) -\u003e Self {\n        Self {\n            identity,\n            peer_id: peer_id.to_string(),\n        }\n    }\n\n    /// Verify the contained identity.\n    pub fn verify(\u0026self) -\u003e Result\u003c()\u003e {\n        self.identity.verify()\n    }\n}\n\n// ─── Tests ──────────────────────────────────────────────────────\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    // ── DID format ──\n\n    #[test]\n    fn test_did_roundtrip() {\n        let pubkey = [0xABu8; 32];\n        let did = did_from_pubkey(\u0026pubkey);\n        assert!(did.starts_with(\"did:walkie:\"));\n        assert_eq!(did.len(), 11 + 43); // prefix + base64url(32 bytes) ≈ 43\n\n        let recovered = pubkey_from_did(\u0026did).unwrap();\n        assert_eq!(recovered, pubkey.to_vec());\n    }\n\n    #[test]\n    fn test_pubkey_from_invalid_did() {\n        assert!(pubkey_from_did(\"not-a-did\").is_none());\n        assert!(pubkey_from_did(\"did:walkie:!!!invalid-base64\").is_none());\n        assert!(pubkey_from_did(\"did:other:abc\").is_none());\n    }\n\n    // ── Identity creation \u0026 verification ──\n\n    #[test]\n    fn test_create_and_verify_identity() {\n        let (identity, _signing_key) = IdentityBuilder::new(\"Rustacean\")\n            .capabilities(\u0026[\"p2p-routing\", \"crypto\"])\n            .owner_id(\"did:walkie:owner123\")\n            .version(\"0.2.0\")\n            .build()\n            .unwrap();\n\n        assert!(identity.agent_id.starts_with(\"did:walkie:\"));\n        assert_eq!(identity.display_name, \"Rustacean\");\n        assert_eq!(identity.capabilities, vec![\"p2p-routing\", \"crypto\"]);\n        assert_eq!(identity.owner_id, \"did:walkie:owner123\");\n        assert_eq!(identity.version, \"0.2.0\");\n        assert_eq!(identity.public_key.len(), 32);\n        assert_eq!(identity.signature.len(), 64);\n        assert!(identity.created_at \u003e 1700000000000);\n        assert!(identity.verify().is_ok());\n    }\n\n    #[test]\n    fn test_identity_has_capability() {\n        let (identity, _) = IdentityBuilder::new(\"TestBot\")\n            .capabilities(\u0026[\"translate\", \"summarize\"])\n            .build()\n            .unwrap();\n\n        assert!(identity.has_capability(\"translate\"));\n        assert!(identity.has_capability(\"TRANSLATE\")); // case insensitive\n        assert!(!identity.has_capability(\"code-review\"));\n    }\n\n    #[test]\n    fn test_deterministic_identity() {\n        let seed = [42u8; 32];\n        let signing_key = SigningKey::from_bytes(\u0026seed);\n\n        let a = IdentityBuilder::new(\"Agent\")\n            .build_with_key(\u0026signing_key)\n            .unwrap();\n        let b = IdentityBuilder::new(\"Agent\")\n            .build_with_key(\u0026signing_key)\n            .unwrap();\n\n        assert_eq!(a.agent_id, b.agent_id);\n        assert_eq!(a.signature, b.signature);\n        assert_eq!(a.created_at, b.created_at);\n    }\n\n    // ── Tamper detection ──\n\n    #[test]\n    fn test_tampered_display_name_fails() {\n        let (mut identity, _) = IdentityBuilder::new(\"Honest\")\n            .build()\n            .unwrap();\n\n        identity.display_name = \"Impostor\".to_string();\n        assert!(identity.verify().is_err());\n    }\n\n    #[test]\n    fn test_tampered_capabilities_fails() {\n        let (mut identity, _) = IdentityBuilder::new(\"Limited\")\n            .capabilities(\u0026[\"read\"])\n            .build()\n            .unwrap();\n\n        identity.capabilities.push(\"admin\".to_string());\n        assert!(identity.verify().is_err());\n    }\n\n    #[test]\n    fn test_tampered_public_key_fails() {\n        let (mut identity, _) = IdentityBuilder::new(\"Agent\")\n            .build()\n            .unwrap();\n\n        identity.public_key[0] ^= 0xFF;\n        assert!(matches!(\n            identity.verify(),\n            Err(IdentityError::PublicKeyMismatch)\n        ));\n    }\n\n    #[test]\n    fn test_tampered_signature_fails() {\n        let (mut identity, _) = IdentityBuilder::new(\"Agent\")\n            .build()\n            .unwrap();\n\n        identity.signature[10] ^= 0xFF;\n        assert!(matches!(\n            identity.verify(),\n            Err(IdentityError::InvalidSignature)\n        ));\n    }\n\n    #[test]\n    fn test_tampered_owner_fails() {\n        let (mut identity, _) = IdentityBuilder::new(\"Agent\")\n            .owner_id(\"alice\")\n            .build()\n            .unwrap();\n\n        identity.owner_id = \"eve\".to_string();\n        assert!(identity.verify().is_err());\n    }\n\n    // ── Serialization roundtrip ──\n\n    #[test]\n    fn test_identity_serialization_roundtrip() {\n        let (identity, _) = IdentityBuilder::new(\"TestBot\")\n            .capabilities(\u0026[\"code-review\"])\n            .owner_id(\"did:walkie:org\")\n            .build()\n            .unwrap();\n\n        let json = serde_json::to_vec(\u0026identity).unwrap();\n        let decoded: AgentIdentity = serde_json::from_slice(\u0026json).unwrap();\n\n        assert_eq!(decoded.agent_id, identity.agent_id);\n        assert_eq!(decoded.display_name, identity.display_name);\n        assert_eq!(decoded.capabilities, identity.capabilities);\n        assert_eq!(decoded.public_key, identity.public_key);\n        assert_eq!(decoded.owner_id, identity.owner_id);\n        assert_eq!(decoded.version, identity.version);\n        assert_eq!(decoded.signature, identity.signature);\n        // Verify the deserialized identity is still valid\n        assert!(decoded.verify().is_ok());\n    }\n\n    #[test]\n    fn test_identity_envelope_roundtrip() {\n        let (identity, _) = IdentityBuilder::new(\"Agent\")\n            .build()\n            .unwrap();\n\n        let envelope = IdentityEnvelope::new(identity, \"12D3KooWTest\");\n        let json = serde_json::to_vec(\u0026envelope).unwrap();\n        let decoded: IdentityEnvelope = serde_json::from_slice(\u0026json).unwrap();\n\n        assert_eq!(decoded.peer_id, \"12D3KooWTest\");\n        assert_eq!(decoded.identity.display_name, \"Agent\");\n        assert!(decoded.verify().is_ok());\n    }\n\n    #[test]\n    fn test_short_id() {\n        let (identity, _) = IdentityBuilder::new(\"LongNameAgent\")\n            .build()\n            .unwrap();\n        let short = identity.short_id();\n        assert_eq!(short.len(), 24);\n        assert!(short.starts_with(\"did:walkie:\"));\n    }\n\n    #[test]\n    fn test_identity_without_owner() {\n        let (identity, _) = IdentityBuilder::new(\"Standalone\")\n            .build()\n            .unwrap();\n        assert!(identity.owner_id.is_empty());\n        assert!(identity.verify().is_ok());\n    }\n}\n","traces":[{"line":25,"address":[],"length":0,"stats":{"Line":104}},{"line":26,"address":[],"length":0,"stats":{"Line":312}},{"line":27,"address":[],"length":0,"stats":{"Line":104}},{"line":32,"address":[],"length":0,"stats":{"Line":4}},{"line":33,"address":[],"length":0,"stats":{"Line":14}},{"line":34,"address":[],"length":0,"stats":{"Line":6}},{"line":37,"address":[],"length":0,"stats":{"Line":104}},{"line":39,"address":[],"length":0,"stats":{"Line":312}},{"line":42,"address":[],"length":0,"stats":{"Line":2}},{"line":44,"address":[],"length":0,"stats":{"Line":6}},{"line":86,"address":[],"length":0,"stats":{"Line":8}},{"line":87,"address":[],"length":0,"stats":{"Line":32}},{"line":88,"address":[],"length":0,"stats":{"Line":24}},{"line":91,"address":[],"length":0,"stats":{"Line":8}},{"line":92,"address":[],"length":0,"stats":{"Line":24}},{"line":93,"address":[],"length":0,"stats":{"Line":8}},{"line":94,"address":[],"length":0,"stats":{"Line":16}},{"line":95,"address":[],"length":0,"stats":{"Line":8}},{"line":121,"address":[],"length":0,"stats":{"Line":102}},{"line":133,"address":[],"length":0,"stats":{"Line":204}},{"line":134,"address":[],"length":0,"stats":{"Line":204}},{"line":135,"address":[],"length":0,"stats":{"Line":204}},{"line":136,"address":[],"length":0,"stats":{"Line":204}},{"line":137,"address":[],"length":0,"stats":{"Line":204}},{"line":138,"address":[],"length":0,"stats":{"Line":102}},{"line":139,"address":[],"length":0,"stats":{"Line":102}},{"line":141,"address":[],"length":0,"stats":{"Line":204}},{"line":142,"address":[],"length":0,"stats":{"Line":102}},{"line":146,"address":[],"length":0,"stats":{"Line":10}},{"line":148,"address":[],"length":0,"stats":{"Line":30}},{"line":149,"address":[],"length":0,"stats":{"Line":10}},{"line":150,"address":[],"length":0,"stats":
