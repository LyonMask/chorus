ne":2}}],"covered":99,"coverable":102},{"path":["/","Users","nextstop","projects","walkie-talkie","core","src","lib.rs"],"content":"pub mod crypto;\npub mod gateway;\npub mod identity;\npub mod p2p;\npub mod protocol;\npub mod ratelimit;\npub mod registry;\npub mod tenant;\n\n#[cfg(feature = \"tui\")]\npub mod tui;\n\n#[cfg(feature = \"napi-binding\")]\npub mod ffi;\n","traces":[],"covered":0,"coverable":0},{"path":["/","Users","nextstop","projects","walkie-talkie","core","src","p2p","mod.rs"],"content":"//! P2P Network Module — Walkie Talkie Core (Phase D: E2EE Integrated)\n//!\n//! Gossipsub + mDNS + Identify + Ping + **built-in CryptoLayer**.\n//!\n//! Key exchange is automatic: on peer connect → KeyOffer → DH → session.\n//! All `send_encrypted()` calls transparently encrypt; incoming messages\n//! are automatically decrypted before emitting `EncryptedMessage` events.\n\nuse libp2p::{\n    gossipsub, identify, mdns, ping,\n    swarm::{NetworkBehaviour, SwarmEvent},\n    Multiaddr, PeerId,\n};\nuse std::{collections::HashMap, time::Duration};\nuse tokio::sync::{mpsc, oneshot};\n\nuse futures::StreamExt;\n\nuse crate::crypto::CryptoLayer;\nuse crate::identity::AgentIdentity;\nuse crate::protocol::AgentMessage;\n\n/// Gossipsub topic for walkie-talkie messages.\npub const WT_TOPIC: \u0026str = \"/walkie-talkie/1.0.0\";\n\nfn wt_topic() -\u003e gossipsub::IdentTopic {\n    gossipsub::IdentTopic::new(WT_TOPIC)\n}\n\n// ─── Wire Protocol (Crypto Envelope) ────────────────────────────\n// Serialized as JSON over Gossipsub. All encrypted traffic uses this.\n\n#[derive(Debug, Clone, serde::Serialize, serde::Deserialize)]\npub enum CryptoEnvelope {\n    /// Offer our X25519 public key to start a session.\n    KeyOffer {\n        public_key: Vec\u003cu8\u003e,\n    },\n    /// Accept a key offer + send our own public key.\n    KeyAccept {\n        public_key: Vec\u003cu8\u003e,\n    },\n    /// Encrypted payload (ChaCha20-Poly1305: nonce(12) || ct+tag).\n    Encrypted {\n        ciphertext: Vec\u003cu8\u003e,\n    },\n    /// Agent identity claim (sent over encrypted channel after session established).\n    IdentityClaim {\n        #[serde(with = \"crate::identity::bytes_base64\")]\n        identity_json: Vec\u003cu8\u003e,\n    },\n}\n\n// ─── Events ──────────────────────────────────────────────────────\n\n#[derive(Debug, Clone)]\npub enum P2PEvent {\n    /// Raw (non-crypto) gossipsub message. Emits when the envelope\n    /// is not a recognised CryptoEnvelope or has no session.\n    RawMessage {\n        from: PeerId,\n        data: Vec\u003cu8\u003e,\n    },\n    /// Decrypted message from an established E2EE session.\n    EncryptedMessage {\n        from: PeerId,\n        plaintext: Vec\u003cu8\u003e,\n    },\n    /// Decrypted structured AgentMessage (parsed from EncryptedMessage).\n    StructuredMessage {\n        from: PeerId,\n        message: AgentMessage,\n    },\n    /// An encrypted session was established with a peer.\n    SessionEstablished {\n        peer_id: PeerId,\n    },\n    /// Key exchange failed.\n    SessionFailed {\n        peer_id: PeerId,\n        reason: String,\n    },\n    /// Received a verified Agent identity from a peer.\n    AgentIdentified {\n        peer_id: PeerId,\n        identity: AgentIdentity,\n    },\n    /// Identity verification failed.\n    IdentityVerificationFailed {\n        peer_id: PeerId,\n        reason: String,\n    },\n    /// A peer connected (transport level).\n    PeerConnected {\n        peer_id: PeerId,\n    },\n    /// A peer disconnected.\n    PeerDisconnected {\n        peer_id: PeerId,\n    },\n    /// mDNS discovered a peer on the local network.\n    PeerDiscovered {\n        peer_id: PeerId,\n        addresses: Vec\u003cMultiaddr\u003e,\n    },\n    /// mDNS expired a peer.\n    PeerExpired {\n        peer_id: PeerId,\n    },\n    /// Started listening on an address.\n    Listening {\n        address: Multiaddr,\n    },\n    /// Received Identify info from a peer.\n    Identify {\n        peer_id: PeerId,\n        info: Box\u003cidentify::Info\u003e,\n    },\n    /// Ping round-trip succeeded.\n    PingSuccess {\n        peer_id: PeerId,\n        rtt: Duration,\n    },\n    /// Ping failed.\n    PingFailure {\n        peer_id: PeerId,\n        error: String,\n    },\n}\n\n// Backwards compat alias\npub use P2PEvent::RawMessage as Message;\n\n// ─── Configuration ───────────────────────────────────────────────\n\n#[derive(Debug, Clone)]\npub struct P2PConfig {\n    pub listen_on: Vec\u003cString\u003e,\n    pub bootstrap_peers: Vec\u003cString\u003e,\n    pub enable_mdns: bool,\n    pub agent_version: Option\u003cString\u003e,\n    pub idle_timeout_secs: u64,\n    pub ping_interval_secs: u64,\n    pub ping_timeout_secs: u64,\n    /// Auto-initiate key exchange when a peer connects.\n    pub auto_key_exchange: bool,\n    /// Our AgentIdentity (signed). If set, broadcast on session established.\n    pub agent_identity: Option\u003cAgentIdentity\u003e,\n}\n\nimpl Default for P2PConfig {\n    fn default() -\u003e Self {\n        Self {\n            listen_on: vec![\"/ip4/0.0.0.0/tcp/0\".to_string()],\n            bootstrap_peers: vec![],\n            enable_mdns: true,\n            agent_version: Some(\"walkie-talkie-core/0.2.0\".to_string()),\n            idle_timeout_secs: 60,\n            ping_interval_secs: 15,\n            ping_timeout_secs: 20,\n            auto_key_exchange: true,\n            agent_identity: None,\n        }\n    }\n}\n\n// ─── Internal Commands ──────────────────────────────────────────\n\nenum P2PCommand {\n    Listen {\n        addr: String,\n        reply: oneshot::Sender\u003canyhow::Result\u003c()\u003e\u003e,\n    },\n    Dial {\n        addr: String,\n        reply: oneshot::Sender\u003canyhow::Result\u003c()\u003e\u003e,\n    },\n    DialPeer {\n        peer_id: PeerId,\n        reply: oneshot::Sender\u003canyhow::Result\u003c()\u003e\u003e,\n    },\n    Broadcast {\n        data: Vec\u003cu8\u003e,\n        reply: oneshot::Sender\u003canyhow::Result\u003cgossipsub::MessageId\u003e\u003e,\n    },\n    /// Encrypt plaintext for a specific peer and send via Gossipsub.\n    SendEncrypted {\n        peer_id: PeerId,\n        plaintext: Vec\u003cu8\u003e,\n        reply: oneshot::Sender\u003canyhow::Result\u003c()\u003e\u003e,\n    },\n    /// Manually trigger key exchange with a peer.\n    InitKeyExchange {\n        peer_id: PeerId,\n        reply: oneshot::Sender\u003canyhow::Result\u003c()\u003e\u003e,\n    },\n    /// Send a structured AgentMessage (encrypted) to a peer.\n    #[allow(dead_code)]\n    #[allow(dead_code)]    SendStructured {\n        peer_id: PeerId,\n        message: AgentMessage,\n        reply: oneshot::Sender\u003canyhow::Result\u003c()\u003e\u003e,\n    },\n    /// Broadcast a structured AgentMessage (encrypted) to all peers.\n    #[allow(dead_code)]\n    #[allow(dead_code)]    BroadcastStructured {\n        message: AgentMessage,\n        reply: oneshot::Sender\u003canyhow::Result\u003c()\u003e\u003e,\n    },\n    /// Check if we have an encrypted session with a peer.\n    HasSession {\n        peer_id: PeerId,\n        reply: oneshot::Sender\u003cbool\u003e,\n    },\n    ListPeers {\n        reply: oneshot::Sender\u003cVec\u003cPeerId\u003e\u003e,\n    },\n    ExternalAddresses {\n        reply: oneshot::Sender\u003cVec\u003cMultiaddr\u003e\u003e,\n    },\n    Shutdown,\n}\n\n// ─── Network Behaviour ──────────────────────────────────────────\n\n#[derive(NetworkBehaviour)]\npub struct WalkieBehaviour {\n    pub gossipsub: gossipsub::Behaviour,\n    pub identify: identify::Behaviour,\n    pub ping: ping::Behaviour,\n    pub mdns: mdns::tokio::Behaviour,\n}\n\n// ─── P2PNetwork Handle ──────────────────────────────────────────\n\n#[derive(Clone)]\npub struct P2PNetwork {\n    peer_id: PeerId,\n    cmd_tx: mpsc::UnboundedSender\u003cP2PCommand\u003e,\n}\n\nimpl P2PNetwork {\n    /// Create a new P2P network node with integrated E2EE.\n    ///\n    /// Generates an X25519 keypair for this node. Key exchange is\n    /// automatically initiated when peers connect (configurable).\n    pub fn new(\n        config: P2PConfig,\n    ) -\u003e anyhow::Result\u003c(Self, mpsc::UnboundedReceiver\u003cP2PEvent\u003e)\u003e {\n        let (event_tx, event_rx) = mpsc::unbounded_channel();\n        let (cmd_tx, mut cmd_rx) = mpsc::unbounded_channel::\u003cP2PCommand\u003e();\n\n        // Generate our X25519 keypair\n        let crypto = CryptoLayer::new();\n        let my_keys = crypto.generate_keypair()\n            .map_err(|e| anyhow::anyhow!(\"keypair generation: {e}\"))?;\n\n        // ── Transport: TCP + Noise + Yamux ──\n        let mut swarm = libp2p::SwarmBuilder::with_new_identity()\n            .with_tokio()\n            .with_tcp(\n                libp2p::tcp::Config::default(),\n                libp2p::noise::Config::new,\n                libp2p::yamux::Config::default,\n            )?\n            .with_behaviour(|key: \u0026libp2p::identity::Keypair| {\n                let local_peer_id = key.public().to_peer_id();\n\n                let gossipsub = gossipsub::Behaviour::new(\n                    gossipsub::MessageAuthenticity::Signed(key.clone()),\n                    gossipsub::ConfigBuilder::default()\n                        .validation_mode(gossipsub::ValidationMode::Strict)\n                        .build()\n                        .map_err(|e| anyhow::anyhow!(\"gossipsub: {e}\"))?,\n                )?;\n\n                let agent_version = config\n                    .agent_version\n                    .clone()\n                    .unwrap_or_else(|| \"walkie-talkie-core/0.2.0\".into());\n                let identify = identify::Behaviour::new(\n                    identify::Config::new(\"/walkie-talkie/id/1.0.0\".into(), key.public())\n                        .with_agent_version(agent_version),\n                );\n\n                let ping = ping::Behaviour::new(\n                    ping::Config::new()\n                        .with_interval(Duration::from_secs(config.ping_interval_secs))\n                        .with_timeout(Duration::from_secs(config.ping_timeout_secs)),\n                );\n\n                let mdns = mdns::tokio::Behaviour::new(\n                    mdns::Config::default(),\n                    local_peer_id,\n                )?;\n\n                Ok(WalkieBehaviour { gossipsub, identify, ping, mdns })\n            })?\n            .with_swarm_config(|cfg: libp2p::swarm::Config| {\n                cfg.with_idle_connection_timeout(Duration::from_secs(config.idle_timeout_secs))\n            })\n            .build();\n\n        let peer_id = *swarm.local_peer_id();\n\n        swarm.behaviour_mut().gossipsub\n            .subscribe(\u0026wt_topic())\n            .expect(\"valid topic\");\n\n        for addr_str in \u0026config.listen_on {\n            if let Ok(addr) = addr_str.parse::\u003cMultiaddr\u003e() {\n                swarm.listen_on(addr)\n                    .map_err(|e| anyhow::anyhow!(\"listen_on {addr_str}: {e}\"))?;\n            }\n        }\n\n        // Bootstrap\n        let bootstrap = config.bootstrap_peers.clone();\n        let bootstrap_cmd_tx = cmd_tx.clone();\n        if !bootstrap.is_empty() {\n            tokio::spawn(async move {\n                tokio::time::sleep(Duration::from_secs(1)).await;\n                for addr_str in bootstrap {\n                    tracing::info!(target: \"p2p\", \"dialing bootstrap: {addr_str}\");\n                    let _ = bootstrap_cmd_tx.send(P2PCommand::Dial {\n                        addr: addr_str,\n                        reply: oneshot::channel().0,\n                    });\n                }\n            });\n        }\n\n        let our_peer_id = peer_id;\n        let swarm_cmd_tx = cmd_tx.clone();        let auto_kx = config.auto_key_exchange;\n        let agent_identity = config.agent_identity.clone();\n\n        // ── Swarm event loop (owns CryptoLayer) ──\n        tokio::spawn(async move {\n            let mut crypto = crypto;\n            let mut mdns_peer_addrs: HashMap\u003cPeerId, Vec\u003cMultiaddr\u003e\u003e = HashMap::new();\n\n            loop {\n                tokio::select! {\n                    event = swarm.select_next_some() =\u003e {\n                        match event {\n                            // ── Connection lifecycle ──\n                            SwarmEvent::ConnectionEstablished {\n                                peer_id, endpoint, num_established, ..\n                            } =\u003e {\n                                tracing::info!(\n                                    target: \"p2p\",\n                                    \"✓ connected to {peer_id} ({} conns, via {:?})\",\n                                    num_established,\n                                    endpoint.get_remote_address(),\n                                );\n                                let _ = event_tx.send(P2PEvent::PeerConnected { peer_id });\n\n                                // Auto key exchange with delayed retry.\n                                // Gossipsub mesh needs a heartbeat cycle (~1s) before\n                                // messages are reliably delivered between new peers.\n                                if auto_kx {\n                                    send_key_offer(\u0026mut swarm, \u0026my_keys, \u0026peer_id);\n                                    // Retry after mesh settles\n                                    let cmd_tx_retry = swarm_cmd_tx.clone();\n                                    let peer_retry = peer_id;\n                                    tokio::spawn(async move {\n                                        tokio::time::sleep(Duration::from_millis(800)).await;\n                                        let _ = cmd_tx_retry.send(P2PCommand::InitKeyExchange {\n                                            peer_id: peer_retry,\n                                            reply: oneshot::channel().0,\n                                        });\n                                    });\n                                }\n                            }\n                            SwarmEvent::ConnectionClosed { peer_id, cause, .. } =\u003e {\n                                tracing::info!(target: \"p2p\", \"✗ disconnected from {peer_id}: {cause:?}\");\n                                let _ = event_tx.send(P2PEvent::PeerDisconnected { peer_id });\n                            }\n                            SwarmEvent::NewListenAddr { address, .. } =\u003e {\n                                tracing::info!(target: \"p2p\", \"🎧 listening on {address}\");\n                                let _ = event_tx.send(P2PEvent::Listening { address });\n                            }\n                            SwarmEvent::ExpiredListenAddr { .. } =\u003e {}\n                            SwarmEvent::OutgoingConnectionError {\n                                peer_id: Some(peer_id), error, ..\n                            } =\u003e {\n                                tracing::warn!(target: \"p2p\", \"dial error to {peer_id}: {error}\");\n                            }\n                            SwarmEvent::IncomingConnectionError { error, .. } =\u003e {\n                                tracing::warn!(target: \"p2p\", \"incoming error: {error}\");\n                            }\n\n                            // ── Gossipsub ──\n                            SwarmEvent::Behaviour(WalkieBehaviourEvent::Gossipsub(\n                                gossipsub::Event::Message {\n                                    propagation_source, message, ..\n                                },\n                            )) =\u003e {\n                                let from = message.source.unwrap_or(propagation_source);\n                                if from == our_peer_id { return; }\n\n                                // Try to parse as CryptoEnvelope\n                                tracing::trace!(\n                                    target: \"crypto\",\n                                    \"📨 gossipsub msg from {from}, {} bytes\",\n                                    message.data.len()\n                                );\n                                if let Ok(envelope) = serde_json::from_slice::\u003cCryptoEnvelope\u003e(\u0026message.data) {\n                                    handle_crypto_envelope(\n                                        from,\n                                        envelope,\n                                        \u0026mut crypto,\n                                        \u0026my_keys,\n                                        \u0026mut swarm,\n                                        \u0026event_tx,\n                                        \u0026agent_identity,\n                                    );\n                                } else {\n                                    // Not a crypto envelope → raw message\n                                    let _ = event_tx.send(P2PEvent::RawMessage {\n                                        from,\n                                        data: message.data,\n                                    });\n                                }\n                            }\n                            SwarmEvent::Behaviour(WalkieBehaviourEvent::Gossipsub(\n                                gossipsub::Event::Subscribed { peer_id, topic },\n                            )) =\u003e {\n                                tracing::debug!(target: \"p2p\", \"{peer_id} subscribed {topic}\");\n                            }\n                            SwarmEvent::Behaviour(WalkieBehaviourEvent::Gossipsub(\n                                gossipsub::Event::Unsubscribed { peer_id, topic },\n                            )) =\u003e {\n                                tracing::debug!(target: \"p2p\", \"{peer_id} unsubscribed {topic}\");\n                            }\n\n                            // ── Identify ──\n                            SwarmEvent::Behaviour(WalkieBehaviourEvent::Identify(\n                                identify::Event::Received { peer_id, info, .. },\n                            )) =\u003e {\n                                tracing::info!(\n                                    target: \"p2p\",\n                                    \"🔐 identified {peer_id}: agent={}\",\n                                    info.agent_version,\n                                );\n                                let _ = event_tx.send(P2PEvent::Identify {\n                                    peer_id, info: Box::new(info),\n                                });\n                            }\n                            SwarmEvent::Behaviour(WalkieBehaviourEvent::Identify(\n                                identify::Event::Pushed { .. },\n                            )) | SwarmEvent::Behaviour(WalkieBehaviourEvent::Identify(\n                                identify::Event::Sent { .. },\n                            )) =\u003e {}\n\n                            // ── Ping ──\n                            SwarmEvent::Behaviour(WalkieBehaviourEvent::Ping(\n                                ping::Event { peer, result: Ok(rtt), .. },\n                            )) =\u003e {\n                                tracing::trace!(target: \"p2p\", \"🏓 ping {peer}: {rtt:?}\");\n                                let _ = event_tx.send(P2PEvent::PingSuccess { peer_id: peer, rtt });\n                            }\n                            SwarmEvent::Behaviour(WalkieBehaviourEvent::Ping(\n                                ping::Event { peer, result: Err(error), .. },\n                            )) =\u003e {\n                                tracing::warn!(target: \"p2p\", \"🏓 ping FAIL {peer}: {error}\");\n                                let _ = event_tx.send(P2PEvent::PingFailure {\n                                    peer_id: peer, error: error.to_string(),\n                                });\n                            }\n\n                            // ── mDNS ──\n                            SwarmEvent::Behaviour(WalkieBehaviourEvent::Mdns(\n                                mdns::Event::Discovered(list),\n                            )) =\u003e {\n                                for (pid, addr) in list {\n                                    mdns_peer_addrs.entry(pid).or_default().push(addr.clone());\n                                    let addrs = mdns_peer_addrs.get(\u0026pid).cloned().unwrap_or_default();\n                                    let _ = event_tx.send(P2PEvent::PeerDiscovered { peer_id: pid, addresses: addrs });\n                                }\n                            }\n                            SwarmEvent::Behaviour(WalkieBehaviourEvent::Mdns(\n                                mdns::Event::Expired(list),\n                            )) =\u003e {\n                                for (pid, _addr) in list {\n                                    mdns_peer_addrs.remove(\u0026pid);\n                                    let _ = event_tx.send(P2PEvent::PeerExpired { peer_id: pid });\n                                }\n                            }\n\n                            _ =\u003e {}\n                        }\n                    }\n\n                    cmd = cmd_rx.recv() =\u003e {\n                        match cmd {\n                            Some(P2PCommand::Listen { addr, reply }) =\u003e {\n                                let result = match addr.parse::\u003cMultiaddr\u003e() {\n                                    Ok(a) =\u003e swarm.listen_on(a).map_err(|e| anyhow::anyhow!(\"{e}\")),\n                                    Err(e) =\u003e Err(anyhow::anyhow!(\"parse: {e}\")),\n                                };\n                                let _ = reply.send(result.map(|_| ()));\n                            }\n                            Some(P2PCommand::Dial { addr, reply }) =\u003e {\n                                let result = match addr.parse::\u003cMultiaddr\u003e() {\n                                    Ok(a) =\u003e swarm.dial(a).map_err(|e| anyhow::anyhow!(\"{e}\")),\n                                    Err(e) =\u003e Err(anyhow::anyhow!(\"parse: {e}\")),\n                                };\n                                let _ = reply.send(result);\n                            }\n                            Some(P2PCommand::DialPeer { peer_id: target, reply }) =\u003e {\n                                let result = mdns_peer_addrs.get(\u0026target)\n                                    .and_then(|addrs| addrs.first())\n                                    .ok_or_else(|| anyhow::anyhow!(\"no mdns addr for {target}\"))\n                                    .and_then(|addr| swarm.dial(addr.clone()).map_err(|e| anyhow::anyhow!(\"{e}\")));\n                                let _ = reply.send(result);\n                            }\n                            Some(P2PCommand::Broadcast { data, reply }) =\u003e {\n                                let result = swarm.behaviour_mut().gossipsub.publish(wt_topic(), data);\n                                let _ = reply.send(result.map_err(|e| anyhow::anyhow!(\"{e}\")));\n                            }\n                            Some(P2PCommand::SendEncrypted { peer_id: target, plaintext, reply }) =\u003e {\n                                let peer_str = target.to_string();\n                                let result = crypto.encrypt_for(\u0026peer_str, \u0026plaintext)\n                                    .map_err(|e| anyhow::anyhow!(\"{e}\"))\n                                    .and_then(|ciphertext| {\n                                        let envelope = CryptoEnvelope::Encrypted { ciphertext };\n                                        serde_json::to_vec(\u0026envelope)\n                                            .map_err(|e| anyhow::anyhow!(\"serialize: {e}\"))\n                                    })\n                                    .and_then(|bytes| {\n                                        swarm.behaviour_mut().gossipsub.publish(wt_topic(), bytes)\n                                            .map_err(|e| anyhow::anyhow!(\"{e}\"))\n                                    });\n                                let _ = reply.send(result.map(|_| ()));\n                            }\n                            Some(P2PCommand::InitKeyExchange { peer_id: _target, reply }) =\u003e {\n                                let envelope = CryptoEnvelope::KeyOffer {\n                                    public_key: my_keys.public.clone(),\n                                };\n                                let result = serde_json::to_vec(\u0026envelope)\n                                    .map_err(|e| anyhow::anyhow!(\"serialize: {e}\"))\n                                    .and_then(|bytes| {\n                                        swarm.behaviour_mut().gossipsub.publish(wt_topic(), bytes)\n                                            .map_err(|e| anyhow::anyhow!(\"{e}\"))\n                                    });\n                                let _ = reply.send(result.map(|_| ()));\n                            }\n    #[allow(dead_code)]                            Some(P2PCommand::SendStructured { peer_id: target, message, reply }) =\u003e {\n                                let result = (|| -\u003e anyhow::Result\u003c()\u003e {\n                                    let plaintext = message.to_json_bytes()?;\n                                    let peer_str = target.to_string();\n                                    let ciphertext = crypto.encrypt_for(\u0026peer_str, \u0026plaintext)\n                                        .map_err(|e| anyhow::anyhow!(\"{e}\"))?;\n                                    let envelope = CryptoEnvelope::Encrypted { ciphertext };\n                                    let bytes = serde_json::to_vec(\u0026envelope)?;\n                                    swarm.behaviour_mut().gossipsub.publish(wt_topic(), bytes)\n                                        .map_err(|e| anyhow::anyhow!(\"{e}\"))?;\n                                    Ok(())\n                                })();\n                                let _ = reply.send(result);\n                            }\n    #[allow(dead_code)]                            Some(P2PCommand::BroadcastStructured { message, reply }) =\u003e {\n                                let result = (|| -\u003e anyhow::Result\u003c()\u003e {\n                                    let plaintext = message.to_json_bytes()?;\n                                    let peers: Vec\u003cPeerId\u003e = swarm.connected_peers().copied().collect();\n                                    for peer in \u0026peers {\n                                        if peer == \u0026our_peer_id { continue; }\n                                        let peer_str = peer.to_string();\n                                        if crypto.has_session(\u0026peer_str) {\n                                            if let Ok(ciphertext) = crypto.encrypt_for(\u0026peer_str, \u0026plaintext) {\n                                                let envelope = CryptoEnvelope::Encrypted { ciphertext };\n                                                if let Ok(bytes) = serde_json::to_vec(\u0026envelope) {\n                                                    let _ = swarm.behaviour_mut().gossipsub.publish(wt_topic(), bytes);\n                                                }\n                                            }\n                                        }\n                                    }\n                                    Ok(())\n                                })();\n                                let _ = reply.send(result);\n                            }\n                            Some(P2PCommand::HasSession { peer_id: target, reply }) =\u003e {\n                                let _ = reply.send(crypto.has_session(\u0026target.to_string()));\n                            }\n                            Some(P2PCommand::ListPeers { reply }) =\u003e {\n                                let peers: Vec\u003cPeerId\u003e = swarm.connected_peers().copied().collect();\n                                let _ = reply.send(peers);\n                            }\n                            Some(P2PCommand::ExternalAddresses { reply }) =\u003e {\n                                let addrs: Vec\u003cMultiaddr\u003e = swarm.external_addresses().cloned().collect();\n                                let _ = reply.send(addrs);\n                            }\n                            Some(P2PCommand::Shutdown) | None =\u003e {\n                                tracing::info!(target: \"p2p\", \"swarm shutdown\");\n                                break;\n                            }\n                        }\n                    }\n                }\n            }\n        });\n\n        Ok((Self { peer_id, cmd_tx }, event_rx))\n    }\n\n    /// Create with default config.\n    pub fn new_default() -\u003e anyhow::Result\u003c(Self, mpsc::UnboundedReceiver\u003cP2PEvent\u003e)\u003e {\n        Self::new(P2PConfig::default())\n    }\n\n    // ── Public async API ──\n\n    pub async fn listen(\u0026self, addr: \u0026str) -\u003e anyhow::Result\u003c()\u003e {\n        let (reply, rx) = oneshot::channel();\n        self.cmd_tx.send(P2PCommand::Listen { addr: addr.to_string(), reply })?;\n        rx.await?\n    }\n\n    pub async fn dial(\u0026self, addr: \u0026str) -\u003e anyhow::Result\u003c()\u003e {\n        let (reply, rx) = oneshot::channel();\n        self.cmd_tx.send(P2PCommand::Dial { addr: addr.to_string(), reply })?;\n        rx.await?\n    }\n\n    pub async fn dial_peer(\u0026self, peer_id: PeerId) -\u003e anyhow::Result\u003c()\u003e {\n        let (reply, rx) = oneshot::channel();\n        self.cmd_tx.send(P2PCommand::DialPeer { peer_id, reply })?;\n        rx.await?\n    }\n\n    /// Broadcast raw bytes (no encryption).\n    pub async fn broadcast(\u0026self, data: Vec\u003cu8\u003e) -\u003e anyhow::Result\u003cgossipsub::MessageId\u003e {\n        let (reply, rx) = oneshot::channel();\n        self.cmd_tx.send(P2PCommand::Broadcast { data, reply })?;\n        rx.await?\n    }\n\n    /// Encrypt and send a plaintext message to a specific peer.\n    /// Requires an established E2EE session (auto via auto_key_exchange).\n    pub async fn send_encrypted(\u0026self, peer_id: PeerId, plaintext: Vec\u003cu8\u003e) -\u003e anyhow::Result\u003c()\u003e {\n        let (reply, rx) = oneshot::channel();\n        self.cmd_tx.send(P2PCommand::SendEncrypted { peer_id, plaintext, reply })?;\n        rx.await?\n    }\n\n    /// Manually trigger key exchange with a peer.\n    pub async fn init_key_exchange(\u0026self, peer_id: PeerId) -\u003e anyhow::Result\u003c()\u003e {\n        let (reply, rx) = oneshot::channel();\n        self.cmd_tx.send(P2PCommand::InitKeyExchange { peer_id, reply })?;\n        rx.await?\n    }\n\n    /// Check if an encrypted session exists with a peer.\n    pub async fn has_session(\u0026self, peer_id: \u0026PeerId) -\u003e anyhow::Result\u003cbool\u003e {\n        let (reply, rx) = oneshot::channel();\n        self.cmd_tx.send(P2PCommand::HasSession { peer_id: *peer_id, reply })?;\n        Ok(rx.await?)\n    }\n\n    pub async fn list_peers(\u0026self) -\u003e anyhow::Result\u003cVec\u003cPeerId\u003e\u003e {\n        let (reply, rx) = oneshot::channel();\n        self.cmd_tx.send(P2PCommand::ListPeers { reply })?;\n        Ok(rx.await?)\n    }\n\n    pub async fn external_addresses(\u0026self) -\u003e anyhow::Result\u003cVec\u003cMultiaddr\u003e\u003e {\n        let (reply, rx) = oneshot::channel();\n        self.cmd_tx.send(P2PCommand::ExternalAddresses { reply })?;\n        Ok(rx.await?)\n    }\n\n    pub fn shutdown(\u0026self) -\u003e anyhow::Result\u003c()\u003e {\n        self.cmd_tx.send(P2PCommand::Shutdown)?;\n        Ok(())\n    }\n\n    pub fn local_peer_id(\u0026self) -\u003e \u0026PeerId {\n        \u0026self.peer_id\n    }\n}\n\n\n// Send a KeyOffer to a peer via Gossipsub.\nfn send_key_offer(\n    swarm: \u0026mut libp2p::Swarm\u003cWalkieBehaviour\u003e,\n    my_keys: \u0026crate::crypto::KeyPair,\n    peer_id: \u0026PeerId,\n) {\n    if let Ok(envelope_bytes) = serde_json::to_vec(\n        \u0026CryptoEnvelope::KeyOffer {\n            public_key: my_keys.public.clone(),\n        },\n    ) {\n        if swarm.behaviour_mut().gossipsub.publish(wt_topic(), envelope_bytes).is_ok() {\n            tracing::info!(target: \"crypto\", \"🔑 sent KeyOffer to {peer_id}\");\n        }\n    }\n}\n\n// ─── Crypto Envelope Handler ────────────────────────────────────\n// Runs inside the swarm loop. Handles key exchange and decryption.\n\nfn handle_crypto_envelope(\n    from: PeerId,\n    envelope: CryptoEnvelope,\n    crypto: \u0026mut CryptoLayer,\n    my_keys: \u0026crate::crypto::KeyPair,\n    swarm: \u0026mut libp2p::Swarm\u003cWalkieBehaviour\u003e,\n    event_tx: \u0026mpsc::UnboundedSender\u003cP2PEvent\u003e,\n    agent_identity: \u0026Option\u003cAgentIdentity\u003e,\n) {\n    let peer_str = from.to_string();\n\n    match envelope {\n        CryptoEnvelope::KeyOffer { public_key } =\u003e {\n            tracing::info!(target: \"crypto\", \"🔑 KeyOffer from {from}\");\n            match CryptoLayer::diffie_hellman(\u0026my_keys.private, \u0026public_key) {\n                Ok(shared) =\u003e {\n                    let already = crypto.has_session(\u0026peer_str);\n                    crypto.create_session(\u0026peer_str, \u0026shared);\n                    tracing::info!(target: \"crypto\", \"🔒 session with {from} {}\", if already { \"refreshed\" } else { \"created\" });\n                    let _ = event_tx.send(P2PEvent::SessionEstablished { peer_id: from });\n\n                    // Send our AgentIdentity if configured\n                    if let Some(ref our_identity) = agent_identity {\n                        if let Ok(id_json) = serde_json::to_vec(our_identity) {\n                            let claim = CryptoEnvelope::Encrypted { ciphertext: id_json };\n                            if let Ok(bytes) = serde_json::to_vec(\u0026claim) {\n                                let _ = swarm.behaviour_mut().gossipsub.publish(wt_topic(), bytes);\n                                tracing::info!(target: \"identity\", \"🪪 sent our identity to {from}\");\n                            }\n                        }\n                    }\n\n                    // Send KeyAccept (our public key back) to establish bidirectional session\n                    let accept = CryptoEnvelope::KeyAccept {\n                        public_key: my_keys.public.clone(),\n                    };\n                    if let Ok(bytes) = serde_json::to_vec(\u0026accept) {\n                        let _ = swarm.behaviour_mut().gossipsub.publish(wt_topic(), bytes);\n                    }\n                }\n                Err(e) =\u003e {\n                    tracing::error!(target: \"crypto\", \"DH failed with {from}: {e}\");\n                    let _ = event_tx.send(P2PEvent::SessionFailed {\n                        peer_id: from,\n                        reason: format!(\"DH failed: {e}\"),\n                    });\n                }\n            }\n        }\n\n        CryptoEnvelope::KeyAccept { public_key } =\u003e {\n            tracing::info!(target: \"crypto\", \"🔑 KeyAccept from {from}\");\n            match CryptoLayer::diffie_hellman(\u0026my_keys.private, \u0026public_key) {\n                Ok(shared) =\u003e {\n                    let already = crypto.has_session(\u0026peer_str);\n                    crypto.create_session(\u0026peer_str, \u0026shared);\n                    tracing::info!(target: \"crypto\", \"🔒 session with {from} {}\", if already { \"refreshed\" } else { \"established\" });\n                    let _ = event_tx.send(P2PEvent::SessionEstablished { peer_id: from });\n                }\n                Err(e) =\u003e {\n                    tracing::error!(target: \"crypto\", \"DH failed with {from}: {e}\");\n                    let _ = event_tx.send(P2PEvent::SessionFailed {\n                        peer_id: from,\n                        reason: format!(\"DH failed: {e}\"),\n                    });\n                }\n            }\n        }\n\n        CryptoEnvelope::Encrypted { ciphertext } =\u003e {\n            match crypto.decrypt_from(\u0026peer_str, \u0026ciphertext) {\n                Ok(plaintext) =\u003e {\n                    tracing::trace!(target: \"crypto\", \"🔓 decrypted {} bytes from {from}\", plaintext.len());\n                    // Check if plaintext is an identity claim\n                    if let Ok(identity) = serde_json::from_slice::\u003cAgentIdentity\u003e(\u0026plaintext) {\n                        match identity.verify() {\n                            Ok(()) =\u003e {\n                                tracing::info!(target: \"identity\", \"🪪 verified agent '{}' from {from}\", identity.display_name);\n                                let _ = event_tx.send(P2PEvent::AgentIdentified {\n                                    peer_id: from,\n                                    identity,\n                                });\n                            }\n                            Err(e) =\u003e {\n                                tracing::warn!(target: \"identity\", \"🪪 identity verification failed from {from}: {e}\");\n                                let _ = event_tx.send(P2PEvent::IdentityVerificationFailed {\n                                    peer_id: from,\n                                    reason: e.to_string(),\n                                });\n                            }\n                        }\n                    } else if let Ok(agent_msg) = serde_json::from_slice::\u003cAgentMessage\u003e(\u0026plaintext) {\n                        tracing::info!(target: \"protocol\", \"📋 structured [{}] from {}\", agent_msg.protocol.tag(), agent_msg.from_agent.display_name);\n                        let _ = event_tx.send(P2PEvent::StructuredMessage {\n                            from,\n                            message: agent_msg,\n                        });\n                    } else {\n                        let _ = event_tx.send(P2PEvent::EncryptedMessage { from, plaintext });\n                    }\n                }\n                Err(e) =\u003e {\n                    tracing::warn!(target: \"crypto\", \"🔓 decrypt failed from {from}: {e}\");\n                    let _ = event_tx.send(P2PEvent::SessionFailed {\n                        peer_id: from,\n                        reason: format!(\"decrypt: {e}\"),\n                    });\n                }\n            }\n        }\n\n        CryptoEnvelope::IdentityClaim { identity_json } =\u003e {\n            // Standalone identity claim (not encrypted — for future use when\n            // identity exchange happens before E2EE is established).\n            match serde_json::from_slice::\u003cAgentIdentity\u003e(\u0026identity_json) {\n                Ok(identity) =\u003e match identity.verify() {\n                    Ok(()) =\u003e {\n                        tracing::info!(target: \"identity\", \"🪪 verified agent '{}' from {from}\", identity.display_name);\n                        let _ = event_tx.send(P2PEvent::AgentIdentified {\n                            peer_id: from,\n                            identity,\n                        });\n                    }\n                    Err(e) =\u003e {\n                        tracing::warn!(target: \"identity\", \"🪪 identity verification failed from {from}: {e}\");\n                        let _ = event_tx.send(P2PEvent::IdentityVerificationFailed {\n                            peer_id: from,\n                            reason: e.to_string(),\n                        });\n                    }\n                },\n                Err(e) =\u003e {\n                    tracing::warn!(target: \"identity\", \"🪪 invalid identity JSON from {from}: {e}\");\n                }\n            }\n        }\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_default_config() {\n        let config = P2PConfig::default();\n        assert!(config.enable_mdns);\n        assert!(config.auto_key_exchange);\n        assert_eq!(config.listen_on.len(), 1);\n    }\n\n    #[test]\n    fn test_crypto_envelope_serialization() {\n        let offer = CryptoEnvelope::KeyOffer {\n            public_key: vec![1u8; 32],\n        };\n        let bytes = serde_json::to_vec(\u0026offer).unwrap();\n        let decoded: CryptoEnvelope = serde_json::from_slice(\u0026bytes).unwrap();\n        match decoded {\n            CryptoEnvelope::KeyOffer { public_key } =\u003e assert_eq!(public_key.len(), 32),\n            _ =\u003e panic!(\"wrong variant\"),\n        }\n\n        let enc = CryptoEnvelope::Encrypted {\n            ciphertext: vec![0u8; 28], // nonce(12) + tag(16)\n        };\n        let bytes = serde_json::to_vec(\u0026enc).unwrap();\n        let decoded: CryptoEnvelope = serde_json::from_slice(\u0026bytes).unwrap();\n        match decoded {\n            CryptoEnvelope::Encrypted { ciphertext } =\u003e assert_eq!(ciphertext.len(), 28),\n            _ =\u003e panic!(\"wrong variant\"),\n        }\n    }\n}\n","traces":[{"line":26,"address":[],"length":0,"stats":{"Line":0}},{"line":27,"address":[],"length":0,"stats":{"Line":0}},{"line":152,"address":[],"length":0,"stats":{"Line":1}},{"line":154,"address":[],"length":0,"stats":{"Line":4}},{"line":155,"address":[],"length":0,"stats":{"Line":2}},{"line":157,"address":[],"length":0,"stats":{"Line":1}},{"line":247,"address":[],"length":0,"stats":{"Line":0}},{"line":250,"address":[],"length":0,"stats":{"Line":0}},{"line":251,"address":[],"length":0,"stats":{"Line":0}},{"line":254,"address":[],"length":0,"stats":{"Line":0}},{"line":255,"address":[],"length":0,"stats":{"Line":0}},{" length":0,"stats":{"Line":0}},{"line":830,"address":[],"length":0,"stats":{"Line":0}},{"line":831,"address":[],"length":0,"stats":{"Line":0}},{"line":835,"address":[],"length":0,"stats":{"Line":0}},{"line":836,"address":[],"length":0,"stats":{"Line":0}}],"covered":4,"coverable":337},{"path":["/","Users","nextstop","projects","walkie-talkie","core","src","protocol","mod.rs"],"content":"//! Agent Structured Messaging Protocol — Walkie Talkie v4 Layer 2\n//!\n//! Agents don't just send bytes. They send structured messages with\n//! intent, priority, reply chains, and human-handoff flags.\n//!\n//! Wire format: JSON-encoded `AgentMessage`, wrapped in `CryptoEnvelope::Encrypted`\n//! for E2EE delivery over Gossipsub.\n\nuse serde::{Serialize, Deserialize};\nuse crate::identity::AgentIdentity;\n\n// ─── Message ID ─────────────────────────────────────────────────\n\n/// Globally unique message identifier.\n///\n/// Format: `\u003csender-agent-id-segment\u003e_\u003cunix-ms\u003e_\u003crandom-6hex\u003e`\n/// e.g. `a1b2c3d4_1711000000000_f3a9c1`\n#[derive(Debug, Clone, PartialEq, Eq, Hash, Serialize, Deserialize)]\npub struct MessageId(String);\n\nimpl MessageId {\n    /// Generate a new unique message ID.\n    pub fn generate(sender_agent_id: \u0026str) -\u003e Self {\n        use std::time::{SystemTime, UNIX_EPOCH};\n        let ts = SystemTime::now()\n            .duration_since(UNIX_EPOCH)\n            .unwrap_or_default()\n            .as_millis();\n\n        // Take last 8 chars of agent_id for brevity\n        let short_agent = if sender_agent_id.len() \u003e= 8 {\n            \u0026sender_agent_id[sender_agent_id.len()-8..]\n        } else {\n            sender_agent_id\n        };\n\n        let rand_hex: String = {\n            let mut bytes = [0u8; 3];\n            rand::RngCore::fill_bytes(\u0026mut rand::thread_rng(), \u0026mut bytes);\n            bytes.iter().map(|b| format!(\"{b:02x}\")).collect()\n        };\n\n        Self(format!(\"{short_agent}_{ts}_{rand_hex}\"))\n    }\n\n    pub fn as_str(\u0026self) -\u003e \u0026str {\n        \u0026self.0\n    }\n}\n\nimpl std::fmt::Display for MessageId {\n    fn fmt(\u0026self, f: \u0026mut std::fmt::Formatter\u003c'_\u003e) -\u003e std::fmt::Result {\n        write!(f, \"{}\", self.0)\n    }\n}\n\n// ─── Message Protocol Types ─────────────────────────────────────\n\n/// The intent / purpose of a structured message.\n///\n/// This is the core of the Agent interaction model — not just \"text\"\n/// but structured intents that programs can act on.\n#[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]\n#[serde(rename_all = \"snake_case\")]\npub enum MessageProtocol {\n    /// \"Can you do X?\" — negotiate capabilities before committing.\n    /// Example: `{\"action\":\"code-review\",\"language\":\"rust\"}`\n    IntentNegotiation,\n\n    /// \"Do X.\" — assign a task to another agent.\n    /// Example: `{\"task\":\"analyze\",\"target\":\"file.rs\",\"deadline_ms\":60000}`\n    TaskAssignment,\n\n    /// \"Here's how it's going.\" — periodic progress update.\n    /// Example: `{\"status\":\"in_progress\",\"percent\":45,\"note\":\"compiling...\"}`\n    StatusReport,\n\n    /// \"Here's the data.\" — structured data exchange between agents.\n    /// Example: `{\"format\":\"json\",\"schema\":\"analysis-result\",\"data\":{...}}`\n    DataExchange,\n\n    /// \"Human, you need to look at this.\" — escalate to human operator.\n    /// Example: `{\"reason\":\"approval_required\",\"summary\":\"Budget exceeded\",\"data\":{...}}`\n    HumanHandoff,\n\n    /// \"I'm alive.\" — periodic heartbeat for presence tracking.\n    /// Example: `{\"status\":\"online\",\"load\":0.3,\"agents_online\":5}`\n    Heartbeat,\n}\n\nimpl MessageProtocol {\n    /// Short string tag for logging.\n    pub fn tag(\u0026self) -\u003e \u0026'static str {\n        match self {\n            Self::IntentNegotiation =\u003e \"INTENT\",\n            Self::TaskAssignment =\u003e \"TASK\",\n            Self::StatusReport =\u003e \"STATUS\",\n            Self::DataExchange =\u003e \"DATA\",\n            Self::HumanHandoff =\u003e \"HUMAN\",\n            Self::Heartbeat =\u003e \"PING\",\n        }\n    }\n}\n\nimpl std::fmt::Display for MessageProtocol {\n    fn fmt(\u0026self, f: \u0026mut std::fmt::Formatter\u003c'_\u003e) -\u003e std::fmt::Result {\n        match self {\n            Self::IntentNegotiation =\u003e write!(f, \"IntentNegotiation\"),\n            Self::TaskAssignment =\u003e write!(f, \"TaskAssignment\"),\n            Self::StatusReport =\u003e write!(f, \"StatusReport\"),\n            Self::DataExchange =\u003e write!(f, \"DataExchange\"),\n            Self::HumanHandoff =\u003e write!(f, \"HumanHandoff\"),\n            Self::Heartbeat =\u003e write!(f, \"Heartbeat\"),\n        }\n    }\n}\n\n// ─── Priority ───────────────────────────────────────────────────\n\n/// Message priority levels (0 = lowest, 255 = highest).\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Serialize, Deserialize)]\npub struct Priority(pub u8);\n\nimpl Priority {\n    pub const LOW: Priority = Priority(25);\n    pub const NORMAL: Priority = Priority(75);\n    pub const HIGH: Priority = Priority(125);\n    pub const URGENT: Priority = Priority(175);\n    pub const CRITICAL: Priority = Priority(255);\n\n    pub fn level(\u0026self) -\u003e u8 {\n        self.0\n    }\n\n    pub fn label(\u0026self) -\u003e \u0026'static str {\n        match self.0 {\n            0..=49 =\u003e \"LOW\",\n            50..=99 =\u003e \"NORMAL\",\n            100..=149 =\u003e \"HIGH\",\n            150..=219 =\u003e \"URGENT\",\n            220..=255 =\u003e \"CRITICAL\",\n        }\n    }\n}\n\n// ─── Agent Message ──────────────────────────────────────────────\n\n/// A structured message between two AI Agents.\n///\n/// Wire format: JSON. Transport: encrypted Gossipsub.\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct AgentMessage {\n    /// Unique message identifier.\n    pub id: MessageId,\n\n    /// Sender's verified AgentIdentity (the full signed identity document).\n    pub from_agent: AgentIdentity,\n\n    /// Recipient's agent_id (did:walkie:...). Empty string = broadcast.\n    #[serde(default)]\n    pub to_agent: String,\n\n    /// What kind of interaction this is.\n    pub protocol: MessageProtocol,\n\n    /// Structured payload. Schema depends on `protocol`.\n    pub payload: serde_json::Value,\n\n    /// Message priority (0-255). Higher = more important.\n    #[serde(default = \"default_priority\")]\n    pub priority: Priority,\n\n    /// Whether this message requires a human to take action.\n    #[serde(default)]\n    pub requires_human: bool,\n\n    /// If this is a reply, the ID of the original message.\n    #[serde(default, skip_serializing_if = \"Option::is_none\")]\n    pub reply_to: Option\u003cMessageId\u003e,\n\n    /// Unix timestamp (ms) when sent.\n    #[serde(default = \"default_timestamp\")]\n    pub timestamp: u64,\n}\n\nfn default_priority() -\u003e Priority {\n    Priority::NORMAL\n}\n\nfn default_timestamp() -\u003e u64 {\n    std::time::SystemTime::now()\n        .duration_since(std::time::UNIX_EPOCH)\n        .unwrap_or_default()\n        .as_millis() as u64\n}\n\nimpl AgentMessage {\n    /// Create a new message. Generates a unique ID automatically.\n    pub fn new(\n        from_agent: \u0026AgentIdentity,\n        protocol: MessageProtocol,\n        payload: serde_json::Value,\n    ) -\u003e Self {\n        let id = MessageId::generate(\u0026from_agent.agent_id);\n        Self {\n            id,\n            from_agent: from_agent.clone(),\n            to_agent: String::new(),\n            protocol,\n            payload,\n            priority: Priority::NORMAL,\n            requires_human: false,\n            reply_to: None,\n            timestamp: default_timestamp(),\n        }\n    }\n\n    /// Set the recipient.\n    pub fn to(mut self, agent_id: \u0026str) -\u003e Self {\n        self.to_agent = agent_id.to_string();\n        self\n    }\n\n    /// Set priority.\n    pub fn priority(mut self, p: Priority) -\u003e Self {\n        self.priority = p;\n        self\n    }\n\n    /// Mark as requiring human attention.\n    pub fn requires_human(mut self) -\u003e Self {\n        self.requires_human = true;\n        self\n    }\n\n    /// Set as a reply to another message.\n    pub fn reply_to(mut self, msg_id: \u0026MessageId) -\u003e Self {\n        self.reply_to = Some(msg_id.clone());\n        self\n    }\n\n    /// Create a reply message with the same to/from swapped.\n    pub fn make_reply(\u0026self, reply_payload: serde_json::Value) -\u003e Self {\n        let mut reply = Self::new(\n            // Note: in practice the caller would set the correct from_agent\n            // for the replying agent. We use the original's to_agent as a hint.\n            \u0026self.from_agent,\n            self.protocol.clone(),\n            reply_payload,\n        );\n        reply.to_agent = self.from_agent.agent_id.clone();\n        reply.reply_to = Some(self.id.clone());\n        reply.timestamp = default_timestamp();\n        reply\n    }\n\n    /// Serialize to JSON bytes for wire transport.\n    pub fn to_json_bytes(\u0026self) -\u003e anyhow::Result\u003cVec\u003cu8\u003e\u003e {\n        serde_json::to_vec(self)\n            .map_err(|e| anyhow::anyhow!(\"serialize AgentMessage: {e}\"))\n    }\n\n    /// Deserialize from JSON bytes.\n    pub fn from_json_bytes(data: \u0026[u8]) -\u003e anyhow::Result\u003cSelf\u003e {\n        serde_json::from_slice(data)\n            .map_err(|e| anyhow::anyhow!(\"parse AgentMessage: {e}\"))\n    }\n\n    /// Quick payload accessor helpers.\n    pub fn payload_str(\u0026self, key: \u0026str) -\u003e Option\u003c\u0026str\u003e {\n        self.payload.get(key).and_then(|v| v.as_str())\n    }\n\n    pub fn payload_i64(\u0026self, key: \u0026str) -\u003e Option\u003ci64\u003e {\n        self.payload.get(key).and_then(|v| v.as_i64())\n    }\n\n    pub fn payload_object(\u0026self) -\u003e Option\u003c\u0026serde_json::Map\u003cString, serde_json::Value\u003e\u003e {\n        self.payload.as_object()\n    }\n\n    /// Compact display string for logging.\n    pub fn summary(\u0026self) -\u003e String {\n        let from = \u0026self.from_agent.display_name;\n        let proto = self.protocol.tag();\n        let prio = self.priority.label();\n        if self.to_agent.is_empty() {\n            format!(\"[{proto}|{prio}] {from}: broadcast\")\n        } else {\n            format!(\"[{proto}|{prio}] {from} → {}\", self.to_agent)\n        }\n    }\n}\n\n// ─── Convenience Builders ────────────────────────────────────────\n\n/// Helper methods for creating common message types.\nimpl AgentMessage {\n    /// \"Can you do X?\" — intent negotiation.\n    pub fn intent(\n        from: \u0026AgentIdentity,\n        action: \u0026str,\n        params: serde_json::Value,\n    ) -\u003e Self {\n        Self::new(from, MessageProtocol::IntentNegotiation, serde_json::json!({\n            \"action\": action,\n            \"params\": params,\n        }))\n    }\n\n    /// \"Do X.\" — task assignment.\n    pub fn task(\n        from: \u0026AgentIdentity,\n        task: \u0026str,\n        payload: serde_json::Value,\n    ) -\u003e Self {\n        Self::new(from, MessageProtocol::TaskAssignment, serde_json::json!({\n            \"task\": task,\n            \"data\": payload,\n        }))\n    }\n\n    /// \"Here's how it's going.\" — status report.\n    pub fn status(\n        from: \u0026AgentIdentity,\n        status: \u0026str,\n        percent: u8,\n        note: \u0026str,\n    ) -\u003e Self {\n        Self::new(from, MessageProtocol::StatusReport, serde_json::json!({\n            \"status\": status,\n            \"percent\": percent,\n            \"note\": note,\n        }))\n    }\n\n    /// \"Here's the data.\" — data exchange.\n    pub fn data(\n        from: \u0026AgentIdentity,\n        format: \u0026str,\n        data: serde_json::Value,\n    ) -\u003e Self {\n        Self::new(from, MessageProtocol::DataExchange, serde_json::json!({\n            \"format\": format,\n            \"data\": data,\n        }))\n    }\n\n    /// \"Human, look at this.\" — escalate to human.\n    pub fn human_handoff(\n        from: \u0026AgentIdentity,\n        reason: \u0026str,\n        summary: \u0026str,\n        context: serde_json::Value,\n    ) -\u003e Self {\n        Self::new(from, MessageProtocol::HumanHandoff, serde_json::json!({\n            \"reason\": reason,\n            \"summary\": summary,\n            \"context\": context,\n        }))\n        .requires_human()\n    }\n\n    /// Simple text message (uses DataExchange under the hood).\n    pub fn text(from: \u0026AgentIdentity, text: \u0026str) -\u003e Self {\n        Self::new(from, MessageProtocol::DataExchange, serde_json::json!({\n            \"text\": text,\n        }))\n    }\n\n    /// \"I'm alive.\" — heartbeat for presence.\n    pub fn heartbeat(from: \u0026AgentIdentity, status: \u0026str, load: f32) -\u003e AgentMessage {\n        AgentMessage::new(from, MessageProtocol::Heartbeat, serde_json::json!({\n            \"status\": status,\n            \"load\": load,\n        }))\n    }\n}\n\n// ─── Tests ──────────────────────────────────────────────────────\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::identity::IdentityBuilder;\n\n    /// Create a test agent identity.\n    fn make_test_agent(name: \u0026str) -\u003e AgentIdentity {\n        let seed = {\n            let mut bytes = name.as_bytes().to_vec();\n            bytes.resize(32, 0);\n            bytes\n        };\n        let signing_key = ed25519_dalek::SigningKey::from_bytes(\u0026seed.try_into().unwrap());\n        IdentityBuilder::new(name)\n            .capabilities(\u0026[\"test\"])\n            .owner_id(\"did:walkie:test-owner\")\n            .build_with_key(\u0026signing_key)\n            .unwrap()\n    }\n\n    // ── MessageId ──\n\n    #[test]\n    fn test_message_id_generate() {\n        let id = MessageId::generate(\"did:walkie:abcdef1234567890\");\n        assert!(id.as_str().contains('_'));\n        // Format: \u003c8chars\u003e_\u003ctimestamp\u003e_\u003c6hex\u003e\n        let parts: Vec\u003c\u0026str\u003e = id.as_str().split('_').collect();\n        assert_eq!(parts.len(), 3);\n        assert_eq!(parts[0].len(), 8);\n        assert!(parts[2].len() == 6);\n        assert!(parts[2].chars().all(|c| c.is_ascii_hexdigit()));\n    }\n\n    #[test]\n    fn test_message_id_display() {\n        let id = MessageId(\"test_123_abc\".to_string());\n        assert_eq!(format!(\"{id}\"), \"test_123_abc\");\n    }\n\n    #[test]\n    fn test_message_id_uniqueness() {\n        let a = MessageId::generate(\"agent1\");\n        let b = MessageId::generate(\"agent1\");\n        // Even with same sender, different timestamps or random ensure uniqueness\n        // (statistically — in practice the random part differs)\n        // Just check they're valid format\n        assert!(!a.as_str().is_empty());\n        assert!(!b.as_str().is_empty());\n    }\n\n    // ── MessageProtocol ──\n\n    #[test]\n    fn test_protocol_display() {\n        assert_eq!(format!(\"{}\", MessageProtocol::IntentNegotiation), \"IntentNegotiation\");\n        assert_eq!(format!(\"{}\", MessageProtocol::TaskAssignment), \"TaskAssignment\");\n        assert_eq!(format!(\"{}\", MessageProtocol::StatusReport), \"StatusReport\");\n        assert_eq!(format!(\"{}\", MessageProtocol::DataExchange), \"DataExchange\");\n        assert_eq!(format!(\"{}\", MessageProtocol::HumanHandoff), \"HumanHandoff\");\n    }\n\n    #[test]\n    fn test_protocol_tag() {\n        assert_eq!(MessageProtocol::IntentNegotiation.tag(), \"INTENT\");\n        assert_eq!(MessageProtocol::TaskAssignment.tag(), \"TASK\");\n        assert_eq!(MessageProtocol::StatusReport.tag(), \"STATUS\");\n        assert_eq!(MessageProtocol::DataExchange.tag(), \"DATA\");\n        assert_eq!(MessageProtocol::HumanHandoff.tag(), \"HUMAN\");\n    }\n\n    #[test]\n    fn test_protocol_serde_roundtrip() {\n        let protocols = vec![\n            MessageProtocol::IntentNegotiation,\n            MessageProtocol::TaskAssignment,\n            MessageProtocol::StatusReport,\n            MessageProtocol::DataExchange,\n            MessageProtocol::HumanHandoff,\n        ];\n        for proto in protocols {\n            let json = serde_json::to_string(\u0026proto).unwrap();\n            let decoded: MessageProtocol = serde_json::from_str(\u0026json).unwrap();\n            assert_eq!(proto, decoded);\n        }\n    }\n\n    // ── Priority ──\n\n    #[test]\n    fn test_priority_levels() {\n        assert!(Priority::LOW.level() \u003c Priority::NORMAL.level());\n        assert!(Priority::NORMAL.level() \u003c Priority::HIGH.level());\n        assert!(Priority::HIGH.level() \u003c Priority::URGENT.level());\n        assert!(Priority::URGENT.level() \u003c Priority::CRITICAL.level());\n    }\n\n    #[test]\n    fn test_priority_labels() {\n        assert_eq!(Priority::LOW.label(), \"LOW\");\n        assert_eq!(Priority(0).label(), \"LOW\");\n        assert_eq!(Priority::NORMAL.label(), \"NORMAL\");\n        assert_eq!(Priority(125).label(), \"HIGH\");\n        assert_eq!(Priority(175).label(), \"URGENT\");\n        assert_eq!(Priority(255).label(), \"CRITICAL\");\n    }\n\n    // ── AgentMessage creation ──\n\n    #[test]\n    fn test_create_message() {\n        let agent = make_test_agent(\"Alice\");\n        let msg = AgentMessage::new(\n            \u0026agent,\n            MessageProtocol::TaskAssignment,\n            serde_json::json!({\"task\": \"review\"}),\n        );\n\n        assert!(msg.id.as_str().contains('_'));\n        assert_eq!(msg.from_agent.display_name, \"Alice\");\n        assert!(msg.to_agent.is_empty()); // broadcast by default\n        assert_eq!(msg.protocol, MessageProtocol::TaskAssignment);\n        assert_eq!(msg.payload[\"task\"], \"review\");\n        assert_eq!(msg.priority, Priority::NORMAL);\n        assert!(!msg.requires_human);\n        assert!(msg.reply_to.is_none());\n        assert!(msg.timestamp \u003e 0);\n    }\n\n    #[test]\n    fn test_builder_pattern() {\n        let agent = make_test_agent(\"Alice\");\n        let msg = AgentMessage::new(\u0026agent, MessageProtocol::DataExchange, serde_json::json!({}))\n            .to(\"did:walkie:bob\")\n            .priority(Priority::HIGH)\n            .requires_human();\n\n        assert_eq!(msg.to_agent, \"did:walkie:bob\");\n        assert_eq!(msg.priority, Priority::HIGH);\n        assert!(msg.requires_human);\n    }\n\n    #[test]\n    fn test_make_reply() {\n        let alice = make_test_agent(\"Alice\");\n        let bob = make_test_agent(\"Bob\");\n\n        let original = AgentMessage::new(\u0026alice, MessageProtocol::TaskAssignment, serde_json::json!({\"task\":\"X\"}))\n            .to(\u0026bob.agent_id);\n\n        let reply = original.make_reply(serde_json::json!({\"result\":\"ok\"}));\n\n        assert_eq!(reply.reply_to.as_ref().unwrap(), \u0026original.id);\n        assert_eq!(reply.to_agent, alice.agent_id);\n    }\n\n    // ── Convenience builders ──\n\n    #[test]\n    fn test_intent_builder() {\n        let agent = make_test_agent(\"A\");\n        let msg = AgentMessage::intent(\u0026agent, \"code-review\", serde_json::json!({\"language\":\"rust\"}));\n        assert_eq!(msg.protocol, MessageProtocol::IntentNegotiation);\n        assert_eq!(msg.payload[\"action\"], \"code-review\");\n    }\n\n    #[test]\n    fn test_task_builder() {\n        let agent = make_test_agent(\"A\");\n        let msg = AgentMessage::task(\u0026agent, \"analyze\", serde_json::json!({\"file\":\"main.rs\"}));\n        assert_eq!(msg.protocol, MessageProtocol::TaskAssignment);\n        assert_eq!(msg.payload[\"task\"], \"analyze\");\n    }\n\n    #[test]\n    fn test_status_builder() {\n        let agent = make_test_agent(\"A\");\n        let msg = AgentMessage::status(\u0026agent, \"in_progress\", 75, \"almost done\");\n        assert_eq!(msg.protocol, MessageProtocol::StatusReport);\n        assert_eq!(msg.payload[\"status\"], \"in_progress\");\n        assert_eq!(msg.payload[\"percent\"], 75);\n    }\n\n    #[test]\n    fn test_data_builder() {\n        let agent = make_test_agent(\"A\");\n        let msg = AgentMessage::data(\u0026agent, \"json\", serde_json::json!({\"key\":\"val\"}));\n        assert_eq!(msg.protocol, MessageProtocol::DataExchange);\n        assert_eq!(msg.payload[\"format\"], \"json\");\n    }\n\n    #[test]\n    fn test_human_handoff_builder() {\n        let agent = make_test_agent(\"A\");\n        let msg = AgentMessage::human_handoff(\u0026agent, \"approval\", \"Budget exceeded\", serde_json::json!({\"amount\":9999}));\n        assert_eq!(msg.protocol, MessageProtocol::HumanHandoff);\n        assert!(msg.requires_human);\n        assert_eq!(msg.payload[\"reason\"], \"approval\");\n    }\n\n    #[test]\n    fn test_text_builder() {\n        let agent = make_test_agent(\"A\");\n        let msg = AgentMessage::text(\u0026agent, \"Hello, Agent B!\");\n        assert_eq!(msg.protocol, MessageProtocol::DataExchange);\n        assert_eq!(msg.payload[\"text\"], \"Hello, Agent B!\");\n    }\n\n    // ── Serialization ──\n\n    #[test]\n    fn test_full_serialization_roundtrip() {\n        let agent = make_test_agent(\"Rustacean\");\n        let original_id = MessageId::generate(\"did:walkie:xyz\");\n\n        let msg = AgentMessage::new(\u0026agent, MessageProtocol::TaskAssignment, serde_json::json!({\n            \"task\": \"review-pr\",\n            \"target\": \"#42\",\n            \"deadline_ms\": 3600000\n        }))\n            .to(\"did:walkie:receiver\")\n            .priority(Priority::URGENT)\n            .requires_human()\n            .reply_to(\u0026original_id);\n\n        // Serialize\n        let json_bytes = msg.to_json_bytes().unwrap();\n        let json_str = String::from_utf8(json_bytes.clone()).unwrap();\n\n        // Verify JSON structure\n        assert!(json_str.contains(\"task_assignment\"));\n        assert!(json_str.contains(\"did:walkie:receiver\"));\n        assert!(json_str.contains(\"review-pr\"));\n\n        // Deserialize\n        let decoded = AgentMessage::from_json_bytes(\u0026json_bytes).unwrap();\n        assert_eq!(decoded.id, msg.id);\n        assert_eq!(decoded.from_agent.agent_id, msg.from_agent.agent_id);\n        assert_eq!(decoded.to_agent, \"did:walkie:receiver\");\n        assert_eq!(decoded.protocol, MessageProtocol::TaskAssignment);\n        assert_eq!(decoded.payload[\"task\"], \"review-pr\");\n        assert_eq!(decoded.priority, Priority::URGENT);\n        assert!(decoded.requires_human);\n        assert_eq!(decoded.reply_to.as_ref().unwrap(), \u0026original_id);\n        // Identity is still valid after roundtrip\n        assert!(decoded.from_agent.verify().is_ok());\n    }\n\n    #[test]\n    fn test_broadcast_message_roundtrip() {\n        let agent = make_test_agent(\"Broadcaster\");\n        let msg = AgentMessage::text(\u0026agent, \"Hello everyone!\");\n\n        let bytes = msg.to_json_bytes().unwrap();\n        let decoded = AgentMessage::from_json_bytes(\u0026bytes).unwrap();\n        assert!(decoded.to_agent.is_empty());\n        assert_eq!(decoded.payload[\"text\"], \"Hello everyone!\");\n    }\n\n    #[test]\n    fn test_invalid_json_fails() {\n        let result = AgentMessage::from_json_bytes(b\"not json\");\n        assert!(result.is_err());\n    }\n\n    #[test]\n    fn test_invalid_protocol_json_fails() {\n        let result = AgentMessage::from_json_bytes(\n            br#\"{\"id\":\"x\",\"from_agent\":null,\"to_agent\":\"\",\"protocol\":\"InvalidType\",\"payload\":null,\"priority\":100,\"requires_human\":false,\"timestamp\":0}\"#\n        );\n        assert!(result.is_err());\n    }\n\n    // ── Payload helpers ──\n\n    #[test]\n    fn test_payload_accessors() {\n        let agent = make_test_agent(\"A\");\n        let msg = AgentMessage::new(\u0026agent, MessageProtocol::StatusReport, serde_json::json!({\n            \"status\": \"ok\",\n            \"percent\": 50,\n            \"note\": \"halfway\"\n        }));\n\n        assert_eq!(msg.payload_str(\"status\"), Some(\"ok\"));\n        assert_eq!(msg.payload_i64(\"percent\"), Some(50));\n        assert_eq!(msg.payload_str(\"note\"), Some(\"halfway\"));\n        assert_eq!(msg.payload_str(\"nonexistent\"), None);\n        assert!(msg.payload_object().is_some());\n    }\n\n    // ── Summary ──\n\n    #[test]\n    fn test_summary() {\n        let agent = make_test_agent(\"Alice\");\n        let direct = AgentMessage::task(\u0026agent, \"review\", serde_json::json!({}))\n            .to(\"did:walkie:bob\");\n        assert!(direct.summary().contains(\"Alice\"));\n        assert!(direct.summary().contains(\"did:walkie:bob\"));\n        assert!(direct.summary().contains(\"TASK\"));\n\n        let broadcast = AgentMessage::text(\u0026agent, \"hi\");\n        assert!(broadcast.summary().contains(\"broadcast\"));\n    }\n\n    // ── Priority serde ──\n\n    #[test]\n    fn test_priority_serde() {\n        let p = Priority::HIGH;\n        let json = serde_json::to_string(\u0026p).unwrap();\n        let decoded: Priority = serde_json::from_str(\u0026json).unwrap();\n        assert_eq!(decoded, Priority::HIGH);\n        assert_eq!(decoded.level(), 125);\n    }\n\n    #[test]\n    fn test_message_id_serde() {\n        let id = MessageId(\"abc_123_def\".to_string());\n        let json = serde_json::to_string(\u0026id).unwrap();\n        let decoded: MessageId = serde_json::from_str(\u0026json).unwrap();\n        assert_eq!(decoded.as_str(), \"abc_123_def\");\n    }\n}\n","traces":[{"line":23,"address":[],"length":0,"stats":{"Line":46}},{"line":25,"address":[],"length":0,"stats":{"Line":138}},{"line":26,"address":[],"length":0,"stats":{"Line":46}},{"line":31,"address":[],"length":0,"stats":{"
