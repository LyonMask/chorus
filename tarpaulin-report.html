<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <style>:root {
  --color: black;
  --bg: white;
  --head-bg: white;
  --link: #338;

  --blue: #ccf;
  --red: #fcc;
  --yellow: #ffc;
  --green: #cfc;
}

[data-theme='dark'] {
  --color: white;
  --bg: black;
  --head-bg: #333;
  --link: #aaf;

  --blue: #225;
  --red: #522;
  --yellow: #552;
  --green: #252;
}

html,
body {
  margin: 0;
  padding: 0;
  color: var(--color);
  background: var(--bg);
}

.app {
  margin: 10px;
  padding: 0;
}

.files-list {
  margin: 10px 0 0;
  width: 100%;
  border-collapse: collapse;
}
.files-list__head {
  border: 1px solid #999;
}
.files-list__head > tr > th {
  padding: 10px;
  border: 1px solid #999;
  text-align: left;
  font-weight: normal;
  background: var(--head-bg);
}
.files-list__body {
}
.files-list__file {
  cursor: pointer;
}
.files-list__file:hover {
  background: var(--blue);
}
.files-list__file > td {
  padding: 10px;
  border: 1px solid #999;
}
.files-list__file > td:first-child::before {
  content: '\01F4C4';
  margin-right: 1em;
}
.files-list__file_low {
  background: var(--red);
}
.files-list__file_medium {
  background: var(--yellow);
}
.files-list__file_high {
  background: var(--green);
}
.files-list__file_folder > td:first-child::before {
  content: '\01F4C1';
  margin-right: 1em;
}

.file-header {
  border: 1px solid #999;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background: var(--bg);
}

.file-header__back {
  margin: 10px;
  cursor: pointer;
  flex-shrink: 0;
  flex-grow: 0;
  text-decoration: underline;
  color: var(--link);
}

.file-header__name {
  margin: 10px;
  flex-shrink: 2;
  flex-grow: 2;
}

.file-header__stat {
  margin: 10px;
  flex-shrink: 0;
  flex-grow: 0;
}

.file-content {
  margin: 10px 0 0;
  border: 1px solid #999;
  padding: 10px;
  counter-reset: line;
  display: flex;
  flex-direction: column;
}

.code-line::before {
  content: counter(line);
  margin-right: 72px;
}
.code-line {
  margin: 0;
  height: 1em;
  counter-increment: line;

  position: absolute;
  padding: 0 0.3em 0.3em 0.3em;
  display: inherit;
  width: 100%;
}
.code-line_covered {
  background: var(--green);
}
.code-line_uncovered {
  background: var(--red);
}

.code-text-container {
  position: relative;
  height: 1em;
  padding: 0.3em 0;
}

.cover-indicator {
  display: flex;
  width: 100%;
  position: absolute;
  justify-content: end;
  height: 1em;
  align-items: center;
  padding: 0 0.3em 0.3em 0.3em;
}

.cover-indicator.check-cover::after {
  content: "\2713";
  font-weight: bold;
  background-color: var(--green);
  height: 1em;
}

.cover-indicator.no-cover::after {
  content: "\2716";
  font-weight: bold;
  background-color: var(--red);
  height: 1em;
}

.stat-line-hit {
  max-width: 48px;
  overflow: hidden;
  font-weight: bold;
  margin-right: 4px;
  background-color: var(--green);
  position: relative;
  top: 0.1em;
}

#theme-toggle-label {
  margin-left: 1ch;
}
</style>
</head>

rypto.create_session(\"bench-peer\", \u0026shared));\n            },\n        )\n    });\n}\n\nfn bench_encrypt_decrypt(c: \u0026mut Criterion) {\n    let mut group = c.benchmark_group(\"crypto/encrypt_decrypt\");\n\n    for size in [64usize, 256, 1024, 4096, 16384] {\n        group.throughput(Throughput::Bytes(size as u64));\n        group.bench_with_input(BenchmarkId::new(\"encrypt\", size), \u0026size, |b, \u0026size| {\n            let mut crypto = CryptoLayer::new();\n            make_session(\u0026mut crypto);\n            let plaintext = vec![0xAB; size];\n            b.iter(|| black_box(crypto.encrypt_for(\"bench-peer\", \u0026plaintext).unwrap()))\n        });\n\n        group.bench_with_input(BenchmarkId::new(\"decrypt\", size), \u0026size, |b, \u0026size| {\n            let mut crypto = CryptoLayer::new();\n            make_session(\u0026mut crypto);\n            let plaintext = vec![0xAB; size];\n            let ciphertext = crypto.encrypt_for(\"bench-peer\", \u0026plaintext).unwrap();\n            b.iter(|| black_box(crypto.decrypt_from(\"bench-peer\", \u0026ciphertext).unwrap()))\n        });\n    }\n    group.finish();\n}\n\nfn bench_throughput(c: \u0026mut Criterion) {\n    let mut group = c.benchmark_group(\"crypto/throughput\");\n    group.throughput(Throughput::Elements(1000));\n    group.bench_function(\"1000_msgs_256b_roundtrip\", |b| {\n        b.iter_with_setup(\n            || {\n                let mut crypto = CryptoLayer::new();\n                make_session(\u0026mut crypto);\n                let plaintext = vec![0x42; 256];\n                (crypto, plaintext)\n            },\n            |(mut crypto, plaintext)| {\n                for _ in 0..1000 {\n                    let ct = crypto.encrypt_for(\"bench-peer\", \u0026plaintext).unwrap();\n                    black_box(crypto.decrypt_from(\"bench-peer\", \u0026ct).unwrap());\n                }\n            },\n        )\n    });\n    group.finish();\n}\n\ncriterion_group!(\n    benches,\n    bench_keypair_generation,\n    bench_diffie_hellman,\n    bench_session_creation,\n    bench_encrypt_decrypt,\n    bench_throughput,\n);\ncriterion_main!(benches);\n","traces":[],"covered":0,"coverable":0},{"path":["/","Users","nextstop","projects","walkie-talkie","core","benches","multi_node_sim.rs"],"content":"//! Multi-Node Simulation Benchmarks\n//!\n//! Simulates multi-tenant workloads using synchronous registry/ratelimiter APIs.\n//! Measures registration, discovery, rate limiting, and cross-tenant isolation.\n//!\n//! Run: cargo bench --bench multi_node_sim\n\nuse criterion::{\n    black_box, criterion_group, criterion_main, BenchmarkId, Criterion, Throughput,\n};\nuse walkie_talkie_core::identity::IdentityBuilder;\nuse walkie_talkie_core::ratelimit::RateLimiter;\nuse walkie_talkie_core::registry::AgentRegistry;\n\n// ── Helpers ──────────────────────────────────────────────────────\n\nfn make_agent(name: \u0026str, caps: \u0026[\u0026str]) -\u003e walkie_talkie_core::identity::AgentIdentity {\n    // build_with_key is cfg(test) only; use regular build() for benchmarks\n    IdentityBuilder::new(name)\n        .capabilities(caps)\n        .build()\n        .expect(\"agent build failed\")\n        .0\n}\n\n// ── Registry benchmarks ──────────────────────────────────────────\n\nfn bench_registry_register(c: \u0026mut Criterion) {\n    let mut group = c.benchmark_group(\"registry/register\");\n\n    for n_agents in [10u64, 100, 1000] {\n        group.throughput(Throughput::Elements(n_agents));\n        group.bench_with_input(\n            BenchmarkId::new(\"batch_register\", n_agents),\n            \u0026n_agents,\n            |b, \u0026n| {\n                b.iter_with_setup(\n                    || {\n                        let reg = AgentRegistry::new();\n                        reg.create_tenant(\"bench-tenant\", \"Benchmark\").unwrap();\n                        reg\n                    },\n                    |reg| {\n                        for i in 0..n {\n                            let agent = make_agent(\u0026format!(\"Agent-{i}\"), \u0026[\"test\"]);\n                            let _ = black_box(reg.register_agent(\"bench-tenant\", agent));\n                        }\n                    },\n                )\n            },\n        );\n    }\n    group.finish();\n}\n\nfn bench_registry_discovery(c: \u0026mut Criterion) {\n    let mut group = c.benchmark_group(\"registry/discovery\");\n\n    for n_agents in [10u64, 100, 1000] {\n        group.throughput(Throughput::Elements(n_agents));\n        group.bench_with_input(\n            BenchmarkId::new(\"find_agent\", n_agents),\n            \u0026n_agents,\n            |b, \u0026n| {\n                let reg = AgentRegistry::new();\n                reg.create_tenant(\"bench-tenant\", \"Benchmark\").unwrap();\n                for i in 0..n {\n                    let agent = make_agent(\u0026format!(\"Agent-{i}\"), \u0026[\"common-cap\"]);\n                    reg.register_agent(\"bench-tenant\", agent).unwrap();\n                }\n\n                b.iter(|| {\n                    for i in 0..n {\n                        let _ = black_box(reg.find_agent(\"bench-tenant\", \u0026format!(\"did:walkie:{i}\")));\n                    }\n                })\n            },\n        );\n    }\n    group.finish();\n}\n\nfn bench_registry_list(c: \u0026mut Criterion) {\n    let mut group = c.benchmark_group(\"registry/list\");\n\n    for n_agents in [10u64, 100, 500] {\n        group.throughput(Throughput::Elements(n_agents));\n        group.bench_with_input(\n            BenchmarkId::new(\"list_agents\", n_agents),\n            \u0026n_agents,\n            |b, \u0026n| {\n                let reg = AgentRegistry::new();\n                reg.create_tenant(\"bench-tenant\", \"Benchmark\").unwrap();\n                for i in 0..n {\n                    let agent = make_agent(\u0026format!(\"Agent-{i}\"), \u0026[\"cap\"]);\n                    reg.register_agent(\"bench-tenant\", agent).unwrap();\n                }\n\n                b.iter(|| black_box(reg.list_agents(\"bench-tenant\").unwrap()));\n            },\n        );\n    }\n    group.finish();\n}\n\n// ── Rate Limiter benchmarks ──────────────────────────────────────\n\nfn bench_rate_limiter_throughput(c: \u0026mut Criterion) {\n    let mut group = c.benchmark_group(\"ratelimiter/throughput\");\n\n    for n_requests in [100u64, 1000, 10_000] {\n        group.throughput(Throughput::Elements(n_requests));\n        group.bench_with_input(\n            BenchmarkId::new(\"try_acquire\", n_requests),\n            \u0026n_requests,\n            |b, \u0026n| {\n                b.iter(|| {\n                    let limiter = RateLimiter::new(100, 10);\n                    let mut allowed = 0u64;\n                    for i in 0..n {\n                        if limiter.try_acquire(\"tenant-a\", \u0026format!(\"agent-{i}\"), 1) {\n                            allowed += 1;\n                        }\n                    }\n                    black_box(allowed);\n                })\n            },\n        );\n    }\n    group.finish();\n}\n\nfn bench_rate_limiter_contention(c: \u0026mut Criterion) {\n    let mut group = c.benchmark_group(\"ratelimiter/contention\");\n\n    for burst in [50u32, 200, 1000] {\n        group.bench_with_input(\n            BenchmarkId::new(\"single_key_exhaust\", burst),\n            \u0026burst,\n            |b, \u0026burst| {\n                b.iter(|| {\n                    let limiter = RateLimiter::new(burst, burst);\n                    let mut allowed = 0u64;\n                    // Send 2x burst requests — first burst allowed, rest rejected\n                    for _ in 0..(burst as u64 * 2) {\n                        if limiter.try_acquire(\"tenant-1\", \"agent-1\", 1) {\n                            allowed += 1;\n                        }\n                    }\n                    black_box(allowed);\n                })\n            },\n        );\n    }\n    group.finish();\n}\n\n// ── Multi-tenant isolation benchmark ─────────────────────────────\n\nfn bench_multi_tenant_register(c: \u0026mut Criterion) {\n    let mut group = c.benchmark_group(\"registry/multi_tenant\");\n\n    for n_tenants in [5u64, 10, 20] {\n        let agents_per = 50u64;\n        let total = n_tenants * agents_per;\n        group.throughput(Throughput::Elements(total));\n        group.bench_with_input(\n            BenchmarkId::new(\"cross_tenant_register\", n_tenants),\n            \u0026n_tenants,\n            |b, \u0026n_t| {\n                b.iter_with_setup(\n                    || {\n                        let reg = AgentRegistry::new();\n                        for i in 0..n_t {\n                            reg.create_tenant(\u0026format!(\"tenant-{i}\"), \u0026format!(\"Tenant {i}\"))\n                                .unwrap();\n                        }\n                        reg\n                    },\n                    |reg| {\n                        for ti in 0..n_t {\n                            for j in 0..agents_per {\n                                let agent =\n                                    make_agent(\u0026format!(\"Agent-{ti}-{j}\"), \u0026[\"common\"]);\n                                let _ = black_box(\n                                    reg.register_agent(\u0026format!(\"tenant-{ti}\"), agent),\n                                );\n                            }\n                        }\n                    },\n                )\n            },\n        );\n    }\n    group.finish();\n}\n\nfn bench_multi_tenant_rate_limit(c: \u0026mut Criterion) {\n    let mut group = c.benchmark_group(\"ratelimiter/multi_tenant\");\n\n    for n_tenants in [10u64, 50, 100] {\n        group.throughput(Throughput::Elements(n_tenants));\n        group.bench_with_input(\n            BenchmarkId::new(\"tenant_isolation\", n_tenants),\n            \u0026n_tenants,\n            |b, \u0026n_t| {\n                b.iter(|| {\n                    let limiter = RateLimiter::new(100, 10);\n                    let mut total_allowed = 0u64;\n                    // Each tenant gets its own bucket\n                    for i in 0..n_t {\n                        for j in 0..10u64 {\n                            if limiter\n                                .try_acquire(\n                                    \u0026format!(\"tenant-{i}\"),\n                                    \u0026format!(\"agent-{j}\"),\n                                    1,\n                                )\n                            {\n                                total_allowed += 1;\n                            }\n                        }\n                    }\n                    black_box(total_allowed);\n                })\n            },\n        );\n    }\n    group.finish();\n}\n\ncriterion_group!(\n    benches,\n    bench_registry_register,\n    bench_registry_discovery,\n    bench_registry_list,\n    bench_rate_limiter_throughput,\n    bench_rate_limiter_contention,\n    bench_multi_tenant_register,\n    bench_multi_tenant_rate_limit,\n);\ncriterion_main!(benches);\n","traces":[],"covered":0,"coverable":0},{"path":["/","Users","nextstop","projects","walkie-talkie","core","benches","protocol_bench.rs"],"content":"//! Protocol Layer Benchmarks\n//!\n//! Measures message construction, serialization, parsing, and throughput.\n//!\n//! Run: cargo bench --bench protocol_bench\n\nuse criterion::{black_box, criterion_group, criterion_main, Criterion, Throughput};\nuse walkie_talkie_core::identity::IdentityBuilder;\nuse walkie_talkie_core::protocol::{AgentMessage, MessageId};\n\nfn make_identity(name: \u0026str) -\u003e walkie_talkie_core::identity::AgentIdentity {\n    IdentityBuilder::new(name).build().expect(\"identity build failed\").0\n}\n\nfn bench_message_construction(c: \u0026mut Criterion) {\n    let alice = make_identity(\"Alice 🤖\");\n\n    let mut group = c.benchmark_group(\"protocol/construction\");\n\n    group.bench_function(\"text_message\", |b| {\n        b.iter(|| {\n            black_box(AgentMessage::text(\u0026alice, \"Hello, this is a test message payload!\"))\n        })\n    });\n\n    group.bench_function(\"intent_message\", |b| {\n        b.iter(|| {\n            black_box(AgentMessage::intent(\u0026alice, \"code-review\", serde_json::json!(\"Review PR #42\")))\n        })\n    });\n\n    group.bench_function(\"task_message\", |b| {\n        b.iter(|| {\n            black_box(AgentMessage::task(\n                \u0026alice,\n                \"run-benchmark\",\n                serde_json::json!({\"target\": \"crypto\", \"iterations\": 1000}),\n            ))\n        })\n    });\n\n    group.finish();\n}\n\nfn bench_message_serialization(c: \u0026mut Criterion) {\n    let alice = make_identity(\"Alice 🤖\");\n    let msg = AgentMessage::task(\n        \u0026alice,\n        \"benchmark\",\n        serde_json::json!({\"key\": \"value\", \"nested\": {\"data\": [1, 2, 3]}}),\n    );\n    let serialized = msg.to_json_bytes().unwrap();\n\n    let mut group = c.benchmark_group(\"protocol/serialization\");\n    group.throughput(Throughput::Bytes(serialized.len() as u64));\n\n    group.bench_function(\"serialize_to_json\", |b| {\n        b.iter(|| black_box(msg.to_json_bytes().unwrap()))\n    });\n\n    group.bench_function(\"deserialize_from_json\", |b| {\n        b.iter(|| black_box(AgentMessage::from_json_bytes(\u0026serialized).unwrap()))\n    });\n\n    group.bench_function(\"full_roundtrip\", |b| {\n        b.iter(|| {\n            let bytes = msg.to_json_bytes().unwrap();\n            black_box(AgentMessage::from_json_bytes(\u0026bytes).unwrap())\n        })\n    });\n\n    group.finish();\n}\n\nfn bench_message_id_generation(c: \u0026mut Criterion) {\n    let mut group = c.benchmark_group(\"protocol/message_id\");\n    group.throughput(Throughput::Elements(1));\n\n    group.bench_function(\"generate\", |b| {\n        b.iter(|| black_box(MessageId::generate(\"agent-001\")))\n    });\n\n    group.finish();\n}\n\nfn bench_reply_chain(c: \u0026mut Criterion) {\n    let alice = make_identity(\"Alice 🤖\");\n\n    let mut group = c.benchmark_group(\"protocol/reply_chain\");\n    group.bench_function(\"reply_depth_10\", |b| {\n        b.iter_with_setup(\n            || AgentMessage::text(\u0026alice, \"Original message\"),\n            |mut msg| {\n                for i in 0..10 {\n                    msg = msg.make_reply(serde_json::json!({\"reply\": i}));\n                    black_box(\u0026msg);\n                }\n            },\n        )\n    });\n    group.finish();\n}\n\nfn bench_high_throughput_messages(c: \u0026mut Criterion) {\n    let alice = make_identity(\"Alice 🤖\");\n    let mut group = c.benchmark_group(\"protocol/high_throughput\");\n    group.throughput(Throughput::Elements(10_000));\n    group.sample_size(50);\n\n    group.bench_function(\"10k_messages_roundtrip\", |b| {\n        let template = AgentMessage::text(\u0026alice, \"Benchmark payload data\");\n        b.iter(|| {\n            for _ in 0..10_000 {\n                let bytes = black_box(template.to_json_bytes().unwrap());\n                black_box(AgentMessage::from_json_bytes(\u0026bytes).unwrap());\n            }\n        })\n    });\n\n    group.finish();\n}\n\ncriterion_group!(\n    benches,\n    bench_message_construction,\n    bench_message_serialization,\n    bench_message_id_generation,\n    bench_reply_chain,\n    bench_high_throughput_messages,\n);\ncriterion_main!(benches);\n","traces":[],"covered":0,"coverable":0},{"path":["/","Users","nextstop","projects","walkie-talkie","core","examples","agent_chat.rs"],"content":"#![allow(dead_code)]\n//! 🤖 agent_chat.rs — Layer 0-2 Integration POC\n//!\n//! 3 AI Agents collaborate to complete a code review task:\n//!   Agent Steve (Coordinator) → assigns task to Agent Rustacean\n//!   Agent Rustacean (Worker)   → does the work, returns result\n//!   Agent Bridge (Reviewer)    → reviews the result, reports to human\n//!\n//! Usage:\n//!   Terminal 1: cargo run --example agent_chat -- Steve\n//!   Terminal 2: cargo run --example agent_chat -- Rustacean \u003caddr1\u003e\n//!   Terminal 3: cargo run --example agent_chat -- Bridge \u003caddr1\u003e \u003caddr2\u003e\n//!\n//! Or for quick demo (single process, 3 agents):\n//!   cargo run --example agent_chat -- demo\n\nuse std::collections::HashMap;\nuse std::error::Error;\nuse std::sync::Arc;\nuse std::time::Duration;\nuse tokio::sync::Mutex;\nuse tokio::io::AsyncBufReadExt;\n\nuse walkie_talkie_core::identity::{AgentIdentity, IdentityBuilder};\nuse walkie_talkie_core::p2p::{P2PConfig, P2PEvent, P2PNetwork};\nuse walkie_talkie_core::protocol::{AgentMessage, MessageProtocol};\n\n// ─── Agent Role ─────────────────────────────────────────────────\n\nstruct Agent {\n    identity: AgentIdentity,\n    network: P2PNetwork,\n    known_agents: Arc\u003cMutex\u003cHashMap\u003cString, AgentIdentity\u003e\u003e\u003e,\n    role: String,\n}\n\nimpl Agent {\n    fn short_id(\u0026self) -\u003e String {\n        self.identity.short_id()\n    }\n\n    fn display_name(\u0026self) -\u003e \u0026str {\n        \u0026self.identity.display_name\n    }\n\n    async fn broadcast_msg(\u0026self, msg: \u0026AgentMessage) -\u003e anyhow::Result\u003c()\u003e {\n        self.network.broadcast(msg.to_json_bytes()?).await?;\n        Ok(())\n    }\n\n    async fn send_to(\u0026self, peer_id: \u0026libp2p::PeerId, msg: \u0026AgentMessage) -\u003e anyhow::Result\u003c()\u003e {\n        self.network.send_encrypted(*peer_id, msg.to_json_bytes()?).await\n    }\n}\n\n// ─── Create Agent ───────────────────────────────────────────────\n\nasync fn create_agent(name: \u0026str, capabilities: \u0026[\u0026str], role: \u0026str) -\u003e Result\u003c(Agent, tokio::sync::mpsc::UnboundedReceiver\u003cP2PEvent\u003e), Box\u003cdyn Error\u003e\u003e {\n    let (identity, _signing_key) = IdentityBuilder::new(name)\n        .capabilities(capabilities)\n        .version(\"walkie-talkie-core/0.2.0\")\n        .build()?;\n\n    let config = P2PConfig {\n        agent_identity: Some(identity.clone()),\n        auto_key_exchange: true,\n        ..Default::default()\n    };\n\n    let (network, event_rx) = P2PNetwork::new(config)?;\n\n    Ok((Agent {\n        identity,\n        network,\n        known_agents: Arc::new(Mutex::new(HashMap::new())),\n        role: role.to_string(),\n    }, event_rx))\n}\n\n// ─── Human-Readable Formatter ───────────────────────────────────\n\nfn format_message(msg: \u0026AgentMessage) -\u003e String {\n    let from = \u0026msg.from_agent.display_name;\n    let short_from = \u0026msg.from_agent.short_id();\n    let to = if msg.to_agent.is_empty() { \"ALL\" } else { \u0026msg.to_agent };\n\n    match msg.protocol {\n        MessageProtocol::Heartbeat =\u003e {\n            let status = msg.payload_str(\"status\").unwrap_or(\"?\");\n            let load = msg.payload_str(\"load\").unwrap_or(\"?\");\n            format!(\"  💚 [{}] heartbeat: {} (load {})\", short_from, status, load)\n        }\n        MessageProtocol::TaskAssignment =\u003e {\n            let task = msg.payload_str(\"task\").unwrap_or(\"?\");\n            format!(\"  📋 [{}] → [{}] TASK: {}\", from, to, task)\n        }\n        MessageProtocol::StatusReport =\u003e {\n            let status = msg.payload_str(\"status\").unwrap_or(\"?\");\n            let pct = msg.payload_i64(\"percent\").unwrap_or(0);\n            let note = msg.payload_str(\"note\").unwrap_or(\"\");\n            if note.is_empty() {\n                format!(\"  📊 [{}] STATUS: {} ({}%)\", from, status, pct)\n            } else {\n                format!(\"  📊 [{}] STATUS: {} ({}%) — {}\", from, status, pct, note)\n            }\n        }\n        MessageProtocol::DataExchange =\u003e {\n            let text = msg.payload_str(\"text\");\n            if let Some(t) = text {\n                format!(\"  💬 [{}]: \\\"{}\\\"\", from, t)\n            } else {\n                format!(\"  📦 [{}] → [{}] DATA exchange\", from, to)\n            }\n        }\n        MessageProtocol::IntentNegotiation =\u003e {\n            let action = msg.payload_str(\"action\").unwrap_or(\"?\");\n            format!(\"  🤝 [{}] INTENT: {}\", from, action)\n        }\n        MessageProtocol::HumanHandoff =\u003e {\n            let reason = msg.payload_str(\"reason\").unwrap_or(\"?\");\n            let summary = msg.payload_str(\"summary\").unwrap_or(\"\");\n            format!(\"  🚨 [{}] HUMAN NEEDED: {} — {}\", from, reason, summary)\n        }\n    }\n}\n\n// ─── Visual Separator ───────────────────────────────────────────\n\nfn separator() {\n    println!(\"{}\", \"─\".repeat(60));\n}\n\nfn header(title: \u0026str) {\n    separator();\n    println!(\"  {}\", title);\n    separator();\n}\n\n// ─── Main ───────────────────────────────────────────────────────\n\n#[tokio::main]\nasync fn main() -\u003e Result\u003c(), Box\u003cdyn Error\u003e\u003e {\n    let args: Vec\u003cString\u003e = std::env::args().collect();\n\n    // Parse mode\n    match args.get(1).map(|s| s.as_str()) {\n        Some(\"demo\") =\u003e run_demo().await,\n        Some(name) =\u003e run_interactive(name, \u0026args[2..]).await,\n        None =\u003e {\n            println!(\"Usage:\");\n            println!(\"  cargo run --example agent_chat -- demo         # Auto 3-agent demo\");\n            println!(\"  cargo run --example agent_chat -- \u003cname\u003e       # Interactive mode\");\n            println!(\"  cargo run --example agent_chat -- \u003cname\u003e \u003caddr\u003e # Connect to peer\");\n            println!();\n            println!(\"Demo roles:\");\n            println!(\"  Steve (Coordinator) — assigns tasks, orchestrates\");\n            println!(\"  Rustacean (Worker)   — does code review work\");\n            println!(\"  Bridge (Reviewer)    — reviews results, reports to human\");\n            Ok(())\n        }\n    }\n}\n\n// ─── Demo Mode (3 agents in 1 process) ─────────────────────────\n\nasync fn run_demo() -\u003e Result\u003c(), Box\u003cdyn Error\u003e\u003e {\n    // Minimal logging for demo\n    tracing_subscriber::fmt()\n        .with_env_filter(\"warn\")\n        .init();\n\n    header(\"🤖 Walkie Talkie — 3-Agent Collaboration Demo\");\n    println!(\"  Layer 0: P2P + E2EE (libp2p + X25519 + ChaCha20)\");\n    println!(\"  Layer 1: Agent Identity (Ed25519 DID)\");\n    println!(\"  Layer 2: Structured Messaging (6 message types)\");\n    println!();\n\n    // Create 3 agents\n    println!(\"[SETUP] Creating 3 agents...\");\n\n    let (steve, mut steve_rx) = create_agent(\"Steve\", \u0026[\"coordinate\", \"strategy\"], \"Coordinator\").await?;\n    let (rustacean, _rustacean_rx) = create_agent(\"Rustacean\", \u0026[\"code-review\", \"crypto\", \"p2p\"], \"Worker\").await?;\n    let (bridge, _bridge_rx) = create_agent(\"Bridge\", \u0026[\"product\", \"review\", \"human-handoff\"], \"Reviewer\").await?;\n\n    println!();\n    println!(\"  🍎 Steve (Coordinator)     did:{}\", steve.short_id());\n    println!(\"  🦀 Rustacean (Worker)      did:{}\", rustacean.short_id());\n    println!(\"  🌉 Bridge (Reviewer)       did:{}\", bridge.short_id());\n    println!();\n\n    // Start listening\n    println!(\"[SETUP] Starting P2P networks...\");\n    steve.network.listen(\"/ip4/127.0.0.1/tcp/0\").await?;\n    rustacean.network.listen(\"/ip4/127.0.0.1/tcp/0\").await?;\n    bridge.network.listen(\"/ip4/127.0.0.1/tcp/0\").await?;\n\n    // Wait for Listening events to get actual addresses\n    let mut steve_listen_addr = None;\n    let deadline = tokio::time::Instant::now() + Duration::from_secs(3);\n    while tokio::time::Instant::now() \u003c deadline {\n        if let Some(event) = steve_rx.try_recv().ok() {\n            if let P2PEvent::Listening { address } = event {\n                // Use /ip4/127.0.0.1/ address for local testing\n                let addr_str = address.to_string();\n                if addr_str.contains(\"127.0.0.1\") || addr_str.contains(\"0.0.0.0\") {\n                    // Replace wildcard with localhost for dialing\n                    let local_addr = addr_str.replace(\"0.0.0.0\", \"127.0.0.1\");\n                    steve_listen_addr = Some(local_addr);\n                    break;\n                }\n            }\n        }\n        tokio::time::sleep(Duration::from_millis(100)).await;\n    }\n\n    let steve_addr = steve_listen_addr.unwrap_or_else(|| {\n        // Fallback: construct from local_peer_id\n        format!(\"/ip4/127.0.0.1/tcp/0/p2p/{}\", steve.network.local_peer_id())\n    });\n    println!(\"  Steve listening on: {}\", steve_addr);\n    println!();\n\n    // Connect all agents to Steve (hub topology)\n    println!(\"[SETUP] Connecting agents (star topology)...\");\n\n    // Connect Rustacean and Bridge to Steve\n    rustacean.network.dial(\u0026steve_addr).await?;\n    bridge.network.dial(\u0026steve_addr).await?;\n\n    // Wait for connections\n    tokio::time::sleep(Duration::from_secs(2)).await;\n    println!(\"[SETUP] Network established ✓\");\n    println!();\n\n    // ═══════════════════════════════════════════════════════════\n    // SCENARIO: Steve orchestrates a code review via Rustacean,\n    //           Bridge reviews the result and reports to human.\n    // ═══════════════════════════════════════════════════════════\n\n    header(\"📋 SCENARIO: Code Review Task\");\n\n    // Track messages across all agents\n    let all_messages = Arc::new(Mutex::new(Vec::new()));\n    let task_id = Arc::new(Mutex::new(None::\u003cString\u003e));\n    let result_received = Arc::new(Mutex::new(false));\n\n    // Clone for task closure\n    let all_msgs1 = all_messages.clone();\n    let _task_id1 = task_id.clone();\n    let _result_received1 = result_received.clone();\n\n    // --- Steve sends heartbeat ---\n    println!();\n    println!(\"[STEP 1] 🍎 Steve broadcasts heartbeat\");\n    let hb = AgentMessage::heartbeat(\u0026steve.identity, \"online\", 0.0);\n    steve.broadcast_msg(\u0026hb).await?;\n    tokio::time::sleep(Duration::from_millis(300)).await;\n\n    // --- Steve assigns task to Rustacean ---\n    println!(\"[STEP 2] 🍎 Steve assigns code-review task to Rustacean\");\n    let task_msg = AgentMessage::task(\n        \u0026steve.identity,\n        \"code-review\",\n        serde_json::json!({\n            \"target\": \"src/crypto/mod.rs\",\n            \"focus\": [\"security\", \"performance\"],\n            \"deadline_ms\": 10000\n        }),\n    )\n    .to(\u0026rustacean.identity.agent_id)\n    .priority(walkie_talkie_core::protocol::Priority::HIGH);\n\n    let tid = task_msg.id.clone();\n    *task_id.lock().await = Some(tid.as_str().to_string());\n    steve.broadcast_msg(\u0026task_msg).await?;\n    all_msgs1.lock().await.push(task_msg.summary());\n    tokio::time::sleep(Duration::from_millis(300)).await;\n\n    // --- Rustacean receives task, sends status ---\n    println!(\"[STEP 3] 🦀 Rustacean acknowledges, starts working\");\n    let status1 = AgentMessage::status(\n        \u0026rustacean.identity,\n        \"in_progress\",\n        0,\n        \"Received task, starting analysis of crypto module\",\n    )\n    .to(\u0026steve.identity.agent_id)\n    .reply_to(\u0026tid);\n    rustacean.broadcast_msg(\u0026status1).await?;\n    all_msgs1.lock().await.push(status1.summary());\n    tokio::time::sleep(Duration::from_millis(500)).await;\n\n    // --- Rustacean sends progress ---\n    println!(\"[STEP 4] 🦀 Rustacean reports 50% progress\");\n    let status2 = AgentMessage::status(\n        \u0026rustacean.identity,\n        \"in_progress\",\n        50,\n        \"Checking encryption layer... nonce reuse concern found\",\n    )\n    .to(\u0026steve.identity.agent_id)\n    .reply_to(\u0026tid);\n    rustacean.broadcast_msg(\u0026status2).await?;\n    all_msgs1.lock().await.push(status2.summary());\n    tokio::time::sleep(Duration::from_millis(500)).await;\n\n    // --- Rustacean completes, sends result ---\n    println!(\"[STEP 5] 🦀 Rustacean completes, sends result\");\n    let result = AgentMessage::data(\n        \u0026rustacean.identity,\n        \"code-review-result\",\n        serde_json::json!({\n            \"file\": \"src/crypto/mod.rs\",\n            \"issues\": [\n                {\n                    \"line\": 49,\n                    \"severity\": \"info\",\n                    \"message\": \"Consider using HKDF for key derivation instead of raw DH output\"\n                },\n                {\n                    \"line\": 51,\n                    \"severity\": \"warning\",\n                    \"message\": \"Counter wraps at u64::MAX — add overflow check for long sessions\"\n                }\n            ],\n            \"verdict\": \"pass\",\n            \"summary\": \"2 findings: 1 info, 1 warning. Code is production-ready with minor improvements.\"\n        }),\n    )\n    .to(\u0026steve.identity.agent_id)\n    .reply_to(\u0026tid);\n    rustacean.broadcast_msg(\u0026result).await?;\n    all_msgs1.lock().await.push(result.summary());\n    tokio::time::sleep(Duration::from_millis(300)).await;\n\n    // --- Rustacean final status ---\n    let status_done = AgentMessage::status(\n        \u0026rustacean.identity,\n        \"completed\",\n        100,\n        \"Code review complete\",\n    )\n    .to(\u0026steve.identity.agent_id)\n    .reply_to(\u0026tid);\n    rustacean.broadcast_msg(\u0026status_done).await?;\n    all_msgs1.lock().await.push(status_done.summary());\n    tokio::time::sleep(Duration::from_millis(300)).await;\n\n    // --- Steve forwards result to Bridge for review ---\n    println!(\"[STEP 6] 🍎 Steve forwards result to Bridge for human review\");\n    let review_task = AgentMessage::task(\n        \u0026steve.identity,\n        \"human-review\",\n        serde_json::json!({\n            \"original_task\": \"code-review\",\n            \"worker\": rustacean.display_name(),\n            \"verdict\": \"pass\",\n            \"findings_count\": 2\n        }),\n    )\n    .to(\u0026bridge.identity.agent_id)\n    .reply_to(\u0026tid);\n    steve.broadcast_msg(\u0026review_task).await?;\n    all_msgs1.lock().await.push(review_task.summary());\n    tokio::time::sleep(Duration::from_millis(300)).await;\n\n    // --- Bridge reviews and reports to human ---\n    println!(\"[STEP 7] 🌉 Bridge reviews and escalates to human\");\n    let handoff = AgentMessage::human_handoff(\n        \u0026bridge.identity,\n        \"review_complete\",\n        \"Code review passed. 2 minor findings for human review.\",\n        serde_json::json!({\n            \"code_reviewer\": rustacean.display_name(),\n            \"verdict\": \"pass\",\n            \"action_required\": \"approve or request changes\"\n        }),\n    )\n    .reply_to(\u0026tid);\n    bridge.broadcast_msg(\u0026handoff).await?;\n    all_msgs1.lock().await.push(handoff.summary());\n    tokio::time::sleep(Duration::from_millis(300)).await;\n\n    // --- Bridge final summary ---\n    println!(\"[STEP 8] 🌉 Bridge sends final summary\");\n    let summary = AgentMessage::text(\n        \u0026bridge.identity,\n        \"📋 Task Complete: Code review of crypto/mod.rs\\n  ✅ Reviewer: Rustacean\\n  ✅ Verdict: PASS\\n  ⚠️  2 findings (1 info, 1 warning)\\n  👤 Awaiting human approval\",\n    );\n    bridge.broadcast_msg(\u0026summary).await?;\n    all_msgs1.lock().await.push(summary.summary());\n    tokio::time::sleep(Duration::from_millis(300)).await;\n\n    // ═══════════════════════════════════════════════════════════\n    // RESULTS\n    // ═══════════════════════════════════════════════════════════\n\n    header(\"📊 HUMAN VIEW — Agent Collaboration Timeline\");\n\n    let msgs = all_msgs1.lock().await;\n    for (i, msg) in msgs.iter().enumerate() {\n        println!(\"{:\u003e2}. {}\", i + 1, msg);\n    }\n\n    println!();\n    header(\"✅ DEMO COMPLETE\");\n\n    println!(\"  3 Agents × 6 Message Types × 8 Steps\");\n    println!(\"  Layer 0: P2P mesh via libp2p Gossipsub\");\n    println!(\"  Layer 1: Ed25519 DID identity verified\");\n    println!(\"  Layer 2: Task → Status → Result → Handoff\");\n    println!();\n    println!(\"  💡 This is what the human sees in Layer 3:\");\n    println!(\"     A timeline of agent interactions, with ability to intervene.\");\n    println!();\n\n    // Cleanup\n    steve.network.shutdown()?;\n    rustacean.network.shutdown()?;\n    bridge.network.shutdown()?;\n\n    Ok(())\n}\n\n// ─── Interactive Mode ───────────────────────────────────────────\n\nasync fn run_interactive(name: \u0026str, peers: \u0026[String]) -\u003e Result\u003c(), Box\u003cdyn Error\u003e\u003e {\n    tracing_subscriber::fmt()\n        .with_env_filter(\n            tracing_subscriber::EnvFilter::try_from_default_env()\n                .unwrap_or_else(|_| \"info\".into()),\n        )\n        .init();\n\n    let role = match name {\n        \"Steve\" =\u003e (\"Coordinator\", vec![\"coordinate\", \"strategy\"]),\n        \"Rustacean\" =\u003e (\"Worker\", vec![\"code-review\", \"crypto\", \"p2p\"]),\n        \"Bridge\" =\u003e (\"Reviewer\", vec![\"product\", \"review\", \"human-handoff\"]),\n        _ =\u003e (\"Custom\", vec![\"general\"]),\n    };\n\n    let (agent, mut rx) = create_agent(name, \u0026role.1, role.0).await?;\n\n    println!(\"=== 🤖 Agent Chat — {} ({}) ===\", name, role.0);\n    println!(\"  DID: {}\", agent.identity.agent_id);\n    println!(\"  Capabilities: {:?}\", agent.identity.capabilities);\n    println!();\n\n    // Listen\n    agent.network.listen(\"/ip4/0.0.0.0/tcp/0\").await?;\n\n    // Connect to peers\n    for peer_addr in peers {\n        println!(\"  Connecting to {}...\", peer_addr);\n        agent.network.dial(peer_addr).await?;\n    }\n\n    tokio::time::sleep(Duration::from_secs(2)).await;\n\n    // Print human-readable view\n    header(\u0026format!(\"🤖 {} is now online\", name));\n    println!(\"  Type 'help' for commands\");\n    println!();\n\n    // Event loop\n    let stdin = tokio::io::stdin();\n    let reader = tokio::io::BufReader::new(stdin);\n    let mut lines = reader.lines();\n\n    loop {\n        tokio::select! {\n            // Handle P2P events\n            event = rx.recv() =\u003e {\n                if let Some(event) = event {\n                    match event {\n                        P2PEvent::Listening { address } =\u003e {\n                            println!(\"  📡 Listening on: {}\", address);\n                        }\n                        P2PEvent::PeerConnected { peer_id } =\u003e {\n                            println!(\"  🔗 Peer connected: {}\", peer_id);\n                        }\n                        P2PEvent::PeerDisconnected { peer_id } =\u003e {\n                            println!(\"  ❌ Peer disconnected: {}\", peer_id);\n                        }\n                        P2PEvent::RawMessage { from: _, data } =\u003e {\n                            if let Ok(msg) = AgentMessage::from_json_bytes(\u0026data) {\n                                println!(\"{}\", format_message(\u0026msg));\n                            }\n                        }\n                        _ =\u003e {}\n                    }\n                }\n            }\n\n            // Handle stdin\n            line = lines.next_line() =\u003e {\n                match line {\n                    Ok(Some(input)) if !input.trim().is_empty() =\u003e {\n                        let input = input.trim();\n                        let parts: Vec\u003c\u0026str\u003e = input.splitn(2, ' ').collect();\n                        match parts[0] {\n                            \"help\" =\u003e {\n                                println!(\"Commands:\");\n                                println!(\"  task \u003cagent\u003e \u003cname\u003e [json]  — Assign task\");\n                                println!(\"  status \u003cstatus\u003e [pct] [note] — Send status\");\n                                println!(\"  text \u003cmessage\u003e              — Send text\");\n                                println!(\"  data \u003cschema\u003e \u003cjson\u003e        — Send data\");\n                                println!(\"  handoff \u003creason\u003e \u003csummary\u003e  — Escalate to human\");\n                                println!(\"  hb [load]                   — Send heartbeat\");\n                                println!(\"  agents                      — List connected peers\");\n                                println!(\"  quit                        — Exit\");\n                            }\n                            \"task\" =\u003e {\n                                if parts.len() \u003c 3 {\n                                    println!(\"Usage: task \u003cagent\u003e \u003cname\u003e [json]\");\n                                    continue;\n                                }\n                                let msg = AgentMessage::task(\n                                    \u0026agent.identity, parts[1], serde_json::json!({})\n                                );\n                                if parts.len() \u003e 3 {\n                                    // rebuild with extra json\n                                }\n                                agent.broadcast_msg(\u0026msg).await?;\n                                println!(\"  📋 Task sent: {}\", parts[1]);\n                            }\n                            \"status\" =\u003e {\n                                let status = parts.get(1).unwrap_or(\u0026\"ok\");\n                                let pct: u8 = parts.get(2).unwrap_or(\u0026\"100\").parse().unwrap_or(100);\n                                let note = parts.get(3).unwrap_or(\u0026\"\");\n                                let msg = AgentMessage::status(\u0026agent.identity, status, pct, note);\n                                agent.broadcast_msg(\u0026msg).await?;\n                                println!(\"  📊 Status sent: {} ({}%)\", status, pct);\n                            }\n                            \"text\" =\u003e {\n                                let text = parts.get(1).unwrap_or(\u0026\"\");\n                                let msg = AgentMessage::text(\u0026agent.identity, text);\n                                agent.broadcast_msg(\u0026msg).await?;\n                                println!(\"  💬 Text sent\");\n                            }\n                            \"hb\" =\u003e {\n                                let load: f32 = parts.get(1).unwrap_or(\u0026\"0.0\").parse().unwrap_or(0.0);\n                                let msg = AgentMessage::heartbeat(\u0026agent.identity, \"online\", load);\n                                agent.broadcast_msg(\u0026msg).await?;\n                                println!(\"  💚 Heartbeat sent (load {})\", load);\n                            }\n                            \"agents\" =\u003e {\n                                let peers = agent.network.list_peers().await?;\n                                println!(\"  Connected peers: {}\", peers.len());\n                                for p in \u0026peers {\n                                    println!(\"    - {}\", p);\n                                }\n                            }\n                            \"quit\" =\u003e {\n                                println!(\"  Shutting down...\");\n                                agent.network.shutdown()?;\n                                break;\n                            }\n                            _ =\u003e {\n                                println!(\"  Unknown command. Type 'help'.\");\n                            }\n                        }\n                    }\n                    _ =\u003e break,\n                }\n            }\n        }\n    }\n\n    Ok(())\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","Users","nextstop","projects","walkie-talkie","core","examples","agent_task.rs"],"content":"//! Agent Task POC — Layer 2 Structured Messaging\n//!\n//! Demonstrates AI Agent structured interaction:\n//!   1. Create cryptographic identity (Ed25519 DID)\n//!   2. Connect via P2P network\n//!   3. Exchange structured messages (Task, Intent, Status, Data)\n//!   4. Auto-reply pattern (accept tasks, respond to intents)\n//!\n//! Usage:\n//!   Terminal 1:  cargo run --example agent_task\n//!   Terminal 2:  cargo run --example agent_task -- \u003cmultiaddr\u003e\n\nuse std::collections::HashMap;\nuse std::sync::Arc;\nuse tokio::io::{AsyncBufReadExt, BufReader};\nuse tokio::sync::Mutex;\n\nuse walkie_talkie_core::identity::{AgentIdentity, IdentityBuilder, IdentityEnvelope};\nuse walkie_talkie_core::protocol::{AgentMessage, MessageProtocol};\nuse walkie_talkie_core::p2p::{P2PEvent, P2PNetwork};\n\n#[tokio::main]\nasync fn main() -\u003e anyhow::Result\u003c()\u003e {\n    tracing_subscriber::fmt()\n        .with_env_filter(\n            tracing_subscriber::EnvFilter::try_from_default_env()\n                .unwrap_or_else(|_| \"info\".into()),\n        )\n        .init();\n\n    // ── Create agent identity ──────────────────────────────────\n    let (my_identity, _signing_key) = IdentityBuilder::new(\"Steve\")\n        .capabilities(\u0026[\"code-review\", \"architecture\"])\n        .build()?;\n\n    println!(\"╔══════════════════════════════════════════╗\");\n    println!(\"║   Agent Task POC — Walkie Talkie v4     ║\");\n    println!(\"╚══════════════════════════════════════════╝\");\n    println!();\n    println!(\"  Agent ID:     {}\", my_identity.short_id());\n    println!(\"  Display:      {}\", my_identity.display_name);\n    println!(\"  Capabilities: {:?}\", my_identity.capabilities);\n    println!(\"  DID:          {}\", my_identity.agent_id);\n    println!();\n\n    // ── Create P2P network ────────────────────────────────────\n    let (network, mut event_rx) = P2PNetwork::new_default()?;\n    network.listen(\"/ip4/0.0.0.0/tcp/0\").await?;\n\n    // Dial a peer if address provided\n    if let Some(addr) = std::env::args().nth(1) {\n        println!(\"  Dialing {}...\", addr);\n        network.dial(\u0026addr).await?;\n    }\n\n    // Track discovered agents: peer_id_string -\u003e AgentIdentity\n    let known_agents: Arc\u003cMutex\u003cHashMap\u003cString, AgentIdentity\u003e\u003e\u003e =\n        Arc::new(Mutex::new(HashMap::new()));\n\n    // ── Spawn stdin handler ───────────────────────────────────\n    let net_in = network.clone();\n    let net_shutdown = network.clone();\n    let agents_in = known_agents.clone();\n    let my_id = my_identity.clone();\n\n    tokio::spawn(async move {\n        let stdin = BufReader::new(tokio::io::stdin());\n        let mut lines = stdin.lines();\n\n        println!(\"  Type 'help' for commands.\\n\");\n\n        while let Ok(Some(line)) = lines.next_line().await {\n            let line = line.trim().to_string();\n            if line.is_empty() { continue; }\n            let parts: Vec\u003c\u0026str\u003e = line.split_whitespace().collect();\n\n            match parts.get(0).map(|s| *s) {\n                Some(\"task\") =\u003e {\n                    // task \u003cname\u003e [json_params]\n                    if parts.len() \u003c 2 {\n                        println!(\"  Usage: task \u003cname\u003e [json_params]\");\n                        continue;\n                    }\n                    let task_name = parts[1];\n                    let params: serde_json::Value = if parts.len() \u003e 2 {\n                        serde_json::from_str(\u0026parts[2..].join(\" \")).unwrap_or(serde_json::json!({}))\n                    } else {\n                        serde_json::json!({})\n                    };\n                    let msg = AgentMessage::task(\u0026my_id, task_name, params);\n                    println!(\"  [TASK→] {} — {}\", my_id.display_name, task_name);\n                    if let Ok(bytes) = msg.to_json_bytes() {\n                        let _ = net_in.broadcast(bytes).await;\n                    }\n                }\n\n                Some(\"status\") =\u003e {\n                    // status \u003cstatus_text\u003e [percent] [note]\n                    if parts.len() \u003c 2 {\n                        println!(\"  Usage: status \u003cstatus_text\u003e [percent] [note]\");\n                        continue;\n                    }\n                    let status = parts[1];\n                    let pct: u8 = parts.get(2).and_then(|s| s.parse().ok()).unwrap_or(0);\n                    let note = if parts.len() \u003e 3 { parts[3..].join(\" \") } else { String::new() };\n                    let msg = AgentMessage::status(\u0026my_id, status, pct, \u0026note);\n                    println!(\"  [STATUS→] {} — {}%\", my_id.display_name, pct);\n                    if let Ok(bytes) = msg.to_json_bytes() {\n                        let _ = net_in.broadcast(bytes).await;\n                    }\n                }\n\n                Some(\"intent\") =\u003e {\n                    // intent \u003caction\u003e \u003cjson_params\u003e\n                    if parts.len() \u003c 2 {\n                        println!(\"  Usage: intent \u003caction\u003e [json_params]\");\n                        continue;\n                    }\n                    let action = parts[1];\n                    let params: serde_json::Value = if parts.len() \u003e 2 {\n                        serde_json::from_str(\u0026parts[2..].join(\" \")).unwrap_or(serde_json::json!({}))\n                    } else {\n                        serde_json::json!({})\n                    };\n                    let msg = AgentMessage::intent(\u0026my_id, action, params);\n                    println!(\"  [INTENT→] Can you {}?\", action);\n                    if let Ok(bytes) = msg.to_json_bytes() {\n                        let _ = net_in.broadcast(bytes).await;\n                    }\n                }\n\n                Some(\"data\") =\u003e {\n                    // data \u003cformat\u003e [json_data]\n                    if parts.len() \u003c 2 {\n                        println!(\"  Usage: data \u003cformat\u003e [json_data]\");\n                        continue;\n                    }\n                    let format = parts[1];\n                    let data_val: serde_json::Value = if parts.len() \u003e 2 {\n                        serde_json::from_str(\u0026parts[2..].join(\" \")).unwrap_or(serde_json::json!({}))\n                    } else {\n                        serde_json::json!({})\n                    };\n                    let msg = AgentMessage::data(\u0026my_id, format, data_val);\n                    if let Ok(bytes) = msg.to_json_bytes() {\n                        let _ = net_in.broadcast(bytes).await;\n                    }\n                }\n\n                Some(\"ping\") =\u003e {\n                    let msg = AgentMessage::heartbeat(\u0026my_id, \"online\", 0.0);\n                    if let Ok(bytes) = msg.to_json_bytes() {\n                        let _ = net_in.broadcast(bytes).await;\n                    }\n                    println!(\"  [PING→] Heartbeat sent.\");\n                }\n\n                Some(\"list\") =\u003e {\n                    let agents = agents_in.lock().await;\n                    if agents.is_empty() {\n                        println!(\"  No agents discovered yet.\");\n                    } else {\n                        println!(\"  Discovered Agents:\");\n                        for (_, identity) in agents.iter() {\n                            println!(\"    {} — {} [{:?}]\",\n                                identity.short_id(),\n                                identity.display_name,\n                                identity.capabilities,\n                            );\n                        }\n                    }\n                }\n\n                Some(\"help\") =\u003e {\n                    println!(\"  ╔══════════════════════════════════════╗\");\n                    println!(\"  ║  Agent Task POC Commands             ║\");\n                    println!(\"  ╠══════════════════════════════════════╣\");\n                    println!(\"  ║  task \u003cname\u003e [json]    ║ Assign task  ║\");\n                    println!(\"  ║  status \u003cs\u003e [pct] [n] ║ Report status║\");\n                    println!(\"  ║  intent \u003cact\u003e [json]  ║ Negotiate    ║\");\n                    println!(\"  ║  data \u003cfmt\u003e [json]    ║ Exchange     ║\");\n                    println!(\"  ║  ping                   ║ Heartbeat   ║\");\n                    println!(\"  ║  list                   ║ Show agents ║\");\n                    println!(\"  ║  quit                   ║ Exit        ║\");\n                    println!(\"  ╚══════════════════════════════════════╝\");\n                }\n\n                Some(\"quit\") | Some(\"exit\") =\u003e {\n                    println!(\"  Shutting down...\");\n                    let _ = net_shutdown.shutdown();\n                    break;\n                }\n\n                _ =\u003e {\n                    // Default: plain text message\n                    let msg = AgentMessage::text(\u0026my_id, \u0026line);\n                    if let Ok(bytes) = msg.to_json_bytes() {\n                        let _ = net_in.broadcast(bytes).await;\n                    }\n                }\n            }\n        }\n    });\n\n    // ── Main event loop ───────────────────────────────────────\n    while let Some(event) = event_rx.recv().await {\n        match event {\n            P2PEvent::Listening { address } =\u003e {\n                println!(\"  \u003e\u003e Listening on: {}\", address);\n            }\n\n            P2PEvent::PeerConnected { peer_id } =\u003e {\n                println!(\"  \u003e\u003e Peer connected: {}\", peer_id);\n                // Broadcast our identity to the new peer\n                let envelope = IdentityEnvelope::new(my_identity.clone(), \u0026peer_id.to_string());\n                if let Ok(bytes) = serde_json::to_vec(\u0026envelope) {\n                    let _ = network.broadcast(bytes).await;\n                }\n            }\n\n            P2PEvent::PeerDisconnected { peer_id } =\u003e {\n                println!(\"  \u003e\u003e Peer disconnected: {}\", peer_id);\n                known_agents.lock().await.remove(\u0026peer_id.to_string());\n            }\n\n            P2PEvent::AgentIdentified { peer_id, identity } =\u003e {\n                println!(\"  [IDENTITY✓] {} — {} [{:?}]\",\n                    identity.short_id(),\n                    identity.display_name,\n                    identity.capabilities,\n                );\n                known_agents.lock().await.insert(peer_id.to_string(), identity);\n            }\n\n            P2PEvent::IdentityVerificationFailed { peer_id, reason } =\u003e {\n                println!(\"  [IDENTITY✗] {}: {}\", peer_id, reason);\n            }\n\n            P2PEvent::StructuredMessage { from, message } =\u003e {\n                handle_structured_message(\u0026from, \u0026message, \u0026my_identity, \u0026network).await;\n            }\n\n            P2PEvent::RawMessage { from, data } =\u003e {\n                // Try to parse as identity envelope or agent message\n                let from_str = from.to_string();\n\n                if let Ok(envelope) = serde_json::from_slice::\u003cIdentityEnvelope\u003e(\u0026data) {\n                    match envelope.verify() {\n                        Ok(()) =\u003e {\n                            let id = \u0026envelope.identity;\n                            println!(\"  [IDENTITY✓] {} — {} [{:?}]\",\n                                id.short_id(), id.display_name, id.capabilities);\n                            known_agents.lock().await.insert(from_str, id.clone());\n                        }\n                        Err(e) =\u003e println!(\"  [IDENTITY✗] Verification failed: {}\", e),\n                    }\n                } else if let Ok(msg) = AgentMessage::from_json_bytes(\u0026data) {\n                    handle_structured_message(\u0026from, \u0026msg, \u0026my_identity, \u0026network).await;\n                }\n            }\n\n            P2PEvent::EncryptedMessage { from, plaintext } =\u003e {\n                if let Ok(msg) = AgentMessage::from_json_bytes(\u0026plaintext) {\n                    handle_structured_message(\u0026from, \u0026msg, \u0026my_identity, \u0026network).await;\n                }\n            }\n\n            P2PEvent::SessionEstablished { peer_id } =\u003e {\n                println!(\"  [🔒] E2EE session with {}\", peer_id);\n            }\n\n            P2PEvent::SessionFailed { peer_id, reason } =\u003e {\n                println!(\"  [🔒✗] Session with {} failed: {}\", peer_id, reason);\n            }\n\n            P2PEvent::PeerDiscovered { peer_id, .. } =\u003e {\n                println!(\"  [mDNS] Discovered {}\", peer_id);\n            }\n\n            // Ignore events we don't need to display\n            _ =\u003e {}\n        }\n    }\n\n    println!(\"\\n  Terminated. Agents known: {}\", known_agents.lock().await.len());\n    Ok(())\n}\n\n/// Handle incoming structured AgentMessage with auto-reply logic.\nasync fn handle_structured_message(\n    _from: \u0026libp2p::PeerId,\n    msg: \u0026AgentMessage,\n    my_identity: \u0026AgentIdentity,\n    network: \u0026P2PNetwork,\n) {\n    match msg.protocol {\n        MessageProtocol::Heartbeat =\u003e {\n            if let Some(status) = msg.payload_str(\"status\") {\n                let load = msg.payload_object()\n                    .and_then(|o| o.get(\"load\").and_then(|v| v.as_f64()))\n                    .unwrap_or(0.0);\n                println!(\"  [PING←] {} — {} (load: {:.0}%)\",\n                    msg.from_agent.display_name, status, load * 100.0);\n            }\n        }\n\n        MessageProtocol::TaskAssignment =\u003e {\n            let task = msg.payload_str(\"task\").unwrap_or(\"?\");\n            println!(\"  [TASK←] {} → me: {} — {:?}\", msg.from_agent.display_name, task, msg.payload);\n            // Auto-reply: accept\n            let reply = msg.make_reply(serde_json::json!({\n                \"status\": \"accepted\",\n                \"eta_ms\": 5000,\n            }));\n            if let Ok(bytes) = reply.to_json_bytes() {\n                let _ = network.broadcast(bytes).await;\n            }\n            println!(\"  [TASK→] Auto-accepted: {}\", task);\n        }\n\n        MessageProtocol::StatusReport =\u003e {\n            let _status = msg.payload_str(\"status\").unwrap_or(\"?\");\n            let pct = msg.payload_i64(\"percent\").unwrap_or(0);\n            let note = msg.payload_str(\"note\").unwrap_or(\"\");\n            println!(\"  [STATUS←] {} — {}% — {}\", msg.from_agent.display_name, pct, note);\n        }\n\n        MessageProtocol::IntentNegotiation =\u003e {\n            let action = msg.payload_str(\"action\").unwrap_or(\"?\");\n            println!(\"  [INTENT←] {} asks: {} — {:?}\", msg.from_agent.display_name, action, msg.payload);\n            // Auto-reply if we have the capability mentioned in params\n            let can_do = msg.payload_object()\n                .and_then(|o| o.get(\"capability\"))\n                .and_then(|v| v.as_str())\n                .map(|cap| my_identity.has_capability(cap))\n                .unwrap_or(true);\n            let reply = msg.make_reply(serde_json::json!({\n                \"can_do\": can_do,\n                \"eta_ms\": if can_do { 3000 } else { 0 },\n            }));\n            if let Ok(bytes) = reply.to_json_bytes() {\n                let _ = network.broadcast(bytes).await;\n            }\n            println!(\"  [INTENT→] Replied: {}\", if can_do { \"yes\" } else { \"no\" });\n        }\n\n        MessageProtocol::DataExchange =\u003e {\n            if let Some(text) = msg.payload_str(\"text\") {\n                println!(\"  [TEXT←] {}: {}\", msg.from_agent.display_name, text);\n            } else {\n                println!(\"  [DATA←] {} sent data: {:?}\", msg.from_agent.display_name, msg.payload);\n            }\n        }\n\n        MessageProtocol::HumanHandoff =\u003e {\n            let reason = msg.payload_str(\"reason\").unwrap_or(\"?\");\n            let summary = msg.payload_str(\"summary\").unwrap_or(\"\");\n            println!(\"  [🚨HUMAN←] {} escalated: {} — {}\",\n                msg.from_agent.display_name, reason, summary);\n        }\n    }\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","Users","nextstop","projects","walkie-talkie","core","examples","encrypted_chat.rs"],"content":"//! Encrypted P2P Chat — Walkie Talkie Core (Phase D)\n//!\n//! Two nodes with **automatic E2EE**: key exchange happens on connect,\n//! all messages are transparently encrypted/decrypted by P2PNetwork.\n//!\n//! ```bash\n//! # Terminal 1 — Node A\n//! cargo run --example encrypted_chat\n//!\n//! # Terminal 2 — Node B (paste Node A's address)\n//! cargo run --example encrypted_chat -- /ip4/127.0.0.1/tcp/\u003cPORT\u003e\n//! ```\n\nuse std::error::Error;\nuse std::sync::atomic::{AtomicBool, Ordering};\nuse std::sync::Arc;\nuse std::time::{SystemTime, UNIX_EPOCH};\nuse tokio::io::{AsyncBufReadExt, BufReader};\nuse tokio::sync::Notify;\n\nuse walkie_talkie_core::p2p::{P2PConfig, P2PEvent, P2PNetwork};\n\nfn now_ms() -\u003e u64 {\n    SystemTime::now()\n        .duration_since(UNIX_EPOCH)\n        .unwrap_or_default()\n        .as_millis() as u64\n}\n\nfn short(id: \u0026str) -\u003e String {\n    id.chars().take(8).collect()\n}\n\nfn hms() -\u003e String {\n    let s = now_ms() / 1000;\n    format!(\"{:02}:{:02}:{:02}\", (s / 3600) % 24, (s / 60) % 60, s % 60)\n}\n\n#[tokio::main]\nasync fn main() -\u003e Result\u003c(), Box\u003cdyn Error\u003e\u003e {\n    tracing_subscriber::fmt()\n        .with_env_filter(\n            tracing_subscriber::EnvFilter::try_from_default_env()\n                .unwrap_or_else(|_| \"info\".into()),\n        )\n        .with_target(false)\n        .with_thread_ids(false)\n        .init();\n\n    let remote_addr = std::env::args().nth(1);\n\n    let (network, mut events) = P2PNetwork::new(P2PConfig {\n        bootstrap_peers: remote_addr\n            .as_ref()\n            .map(|a| vec![a.clone()])\n            .unwrap_or_default(),\n        auto_key_exchange: true,\n        ..Default::default()\n    })?;\n\n    let peer_id = network.local_peer_id().to_string();\n    let my_short = short(\u0026peer_id);\n\n    println!();\n    println!(\"╔═══════════════════════════════════════════════════╗\");\n    println!(\"║   🔐 Walkie Talkie — Encrypted P2P Chat         ║\");\n    println!(\"╠═══════════════════════════════════════════════════╣\");\n    println!(\"║  Peer   : {my_short}...                            ║\");\n    println!(\"║  Crypto : X25519 + ChaCha20-Poly1305             ║\");\n    println!(\"║  E2EE   : Automatic on connect                   ║\");\n    println!(\"╚═══════════════════════════════════════════════════╝\");\n    println!();\n    println!(\"Commands: /peers  /sessions  /quit\");\n    println!(\"Type anything else to send encrypted message.\");\n    println!();\n\n    // Signal: at least one encrypted session exists\n    let session_ready = Arc::new(Notify::new());\n    let has_session = Arc::new(AtomicBool::new(false));\n\n    // ── Stdin handler ──\n    let net_in = network.clone();\n    let ready = session_ready.clone();\n    let has_sess = has_session.clone();\n\n    tokio::spawn(async move {\n        // Wait for at least one session before accepting input\n        ready.notified().await;\n        println!(\"🔐 Session ready. You can now type messages.\");\n        println!();\n\n        let stdin = BufReader::new(tokio::io::stdin());\n        let mut lines = stdin.lines();\n\n        while let Ok(Some(line)) = lines.next_line().await {\n            let text = line.trim().to_string();\n            if text.is_empty() { continue; }\n\n            match text.as_str() {\n                \"/quit\" | \"/q\" =\u003e { let _ = net_in.shutdown(); break; }\n                \"/peers\" =\u003e {\n                    match net_in.list_peers().await {\n                        Ok(peers) =\u003e {\n                            println!(\"Connected peers ({}):\", peers.len());\n                            for p in \u0026peers {\n                                let ok = net_in.has_session(p).await.unwrap_or(false);\n                                let icon = if ok { \"🔒\" } else { \"🔓\" };\n                                println!(\"  {icon} {}\", short(\u0026p.to_string()));\n                            }\n                        }\n                        Err(e) =\u003e eprintln!(\"Error: {e}\"),\n                    }\n                }\n                \"/sessions\" =\u003e {\n                    match net_in.list_peers().await {\n                        Ok(peers) =\u003e {\n                            let mut n = 0;\n                            for p in \u0026peers {\n                                if net_in.has_session(p).await.unwrap_or(false) {\n                                    println!(\"  🔒 {} — active\", short(\u0026p.to_string()));\n                                    n += 1;\n                                }\n                            }\n                            if n == 0 { println!(\"No encrypted sessions.\"); }\n                        }\n                        Err(e) =\u003e eprintln!(\"Error: {e}\"),\n                    }\n                }\n                _ =\u003e {\n                    match net_in.list_peers().await {\n                        Ok(peers) =\u003e {\n                            let mut sent = 0;\n                            for p in \u0026peers {\n                                if net_in.has_session(p).await.unwrap_or(false) {\n                                    let payload = format!(\"{}|{}\", now_ms(), text);\n                                    match net_in.send_encrypted(*p, payload.into_bytes()).await {\n                                        Ok(_) =\u003e { sent += 1; }\n                                        Err(e) =\u003e eprintln!(\"Encrypt error: {e}\"),\n                                    }\n                                }\n                            }\n                            if sent \u003e 0 {\n                                let ts = hms();\n                                println!(\"\u003e\u003e [{ts}] {my_short}: {text}  (encrypted, {sent} peer(s))\");\n                            } else if !has_sess.load(Ordering::Relaxed) {\n                                println!(\"⚠ No encrypted session yet. Waiting...\");\n                            }\n                        }\n                        Err(e) =\u003e eprintln!(\"Error: {e}\"),\n                    }\n                }\n            }\n        }\n    });\n\n    // ── Event loop ──\n    while let Some(event) = events.recv().await {\n        match event {\n            P2PEvent::Listening { address } =\u003e {\n                println!(\"🎧 Listening on: {address}\");\n                if remote_addr.is_none() {\n                    println!(\"   Share: cargo run --example encrypted_chat -- {address}\");\n                    println!();\n                }\n            }\n            P2PEvent::PeerConnected { peer_id } =\u003e {\n                println!(\"+ Connected: {}...\", short(\u0026peer_id.to_string()));\n                println!(\"  ⏳ Key exchange in progress...\");\n            }\n            P2PEvent::PeerDisconnected { peer_id } =\u003e {\n                println!(\"- Disconnected: {}...\", short(\u0026peer_id.to_string()));\n            }\n            P2PEvent::PeerDiscovered { peer_id, .. } =\u003e {\n                println!(\"📡 Discovered: {}...\", short(\u0026peer_id.to_string()));\n            }\n            P2PEvent::SessionEstablished { peer_id } =\u003e {\n                println!(\"🔒 Secure session: {}...\", short(\u0026peer_id.to_string()));\n                if !has_session.load(Ordering::Relaxed) {\n                    has_session.store(true, Ordering::Relaxed);\n                    session_ready.notify_one();\n                }\n            }\n            P2PEvent::SessionFailed { peer_id, reason } =\u003e {\n                println!(\"❌ Session failed with {}...: {reason}\", short(\u0026peer_id.to_string()));\n            }\n            P2PEvent::Identify { peer_id, info } =\u003e {\n                println!(\"ℹ️  {} is: {}\", short(\u0026peer_id.to_string()), info.agent_version);\n            }\n            P2PEvent::EncryptedMessage { from, plaintext } =\u003e {\n                let raw = String::from_utf8_lossy(\u0026plaintext);\n                let display = if let Some(pos) = raw.find('|') {\n                    \u0026raw[pos + 1..]\n                } else {\n                    \u0026raw\n                };\n                let ts = hms();\n                let peer_short = short(\u0026from.to_string());\n                println!(\"[{ts}] 🔒 {peer_short}: {}\", display.trim());\n            }\n            P2PEvent::RawMessage { from, data } =\u003e {\n                let text = String::from_utf8_lossy(\u0026data);\n                println!(\"📡 [raw] {}: {}\", short(\u0026from.to_string()), text);\n            }\n            P2PEvent::AgentIdentified { peer_id, identity } =\u003e {\n                let _ts = hms();\n                let caps = identity.capabilities.join(\", \");\n                println!(\"[{}] 🪪 {} is {} [{}]\", hms(), short(\u0026peer_id.to_string()), identity.display_name, caps);\n            }\n            P2PEvent::IdentityVerificationFailed { peer_id: _, reason } =\u003e {\n                println!(\"❌ Identity fail: {reason}\");\n            }\n            P2PEvent::StructuredMessage { from, message } =\u003e {\n                println!(\"📋 {} [{}]: {}\", short(\u0026from.to_string()), message.protocol.tag(), message.summary());\n            }\n            P2PEvent::PingFailure { peer_id, error } =\u003e {\n                println!(\"🏓 Ping FAIL {}: {}\", short(\u0026peer_id.to_string()), error);\n            }\n            _ =\u003e {}\n        }\n    }\n\n    println!(\"\\nGoodbye.\");\n    Ok(())\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","Users","nextstop","projects","walkie-talkie","core","examples","headless_demo.rs"],"content":"//! 🖨️ headless_demo.rs — TUI Demo (ASCII Capture)\n//!\n//! Uses TuiApp's real API to simulate a 3-Agent collaboration scenario.\n//! No TTY required. Outputs structured ASCII representation.\n//!\n//! Run: cargo run --example headless_demo\n\nuse walkie_talkie_core::tui::{TuiApp, ActivityItem, ActivityAction, Key};\n\nfn main() {\n    let mut app = TuiApp::new();\n\n    // ── Step 1-3: Agents come online ──\n    app.add_agent(\"steve\", \"Steve Jobs 🍎\", \"did:walkie:maMVNJDswURGw\");\n    if let Some(a) = app.agents.get_mut(\"steve\") {\n        a.capabilities = vec![\"coordinate\".into(), \"strategy\".into(), \"approve\".into()];\n    }\n    app.add_agent(\"rustacean\", \"Rustacean 🦀\", \"did:walkie:fLYf2Xc0I3qyO\");\n    if let Some(a) = app.agents.get_mut(\"rustacean\") {\n        a.capabilities = vec![\"code-review\".into(), \"crypto\".into(), \"p2p\".into()];\n    }\n    app.add_agent(\"bridge\", \"Bridge 🌉\", \"did:walkie:fmYIb9jntMvbj\");\n    if let Some(a) = app.agents.get_mut(\"bridge\") {\n        a.capabilities = vec![\"product\".into(), \"review\".into(), \"human-handoff\".into()];\n    }\n\n    app.push_activity(ActivityItem::new(\"System\", ActivityAction::SystemInfo,\n        \"📡 Walkie Talkie v4 started — 3 agents registered\"));\n    app.push_activity(ActivityItem::new(\"Steve Jobs 🍎\", ActivityAction::AgentOnline,\n        \"Steve Jobs 🍎 is online\"));\n    app.push_activity(ActivityItem::new(\"Rustacean 🦀\", ActivityAction::AgentOnline,\n        \"Rustacean 🦀 is online\"));\n    app.push_activity(ActivityItem::new(\"Bridge 🌉\", ActivityAction::AgentOnline,\n        \"Bridge 🌉 is online\"));\n\n    // ── Step 4: Steve assigns security audit ──\n    app.push_activity(ActivityItem::new(\"Steve Jobs 🍎\", ActivityAction::TaskAssigned,\n        \"Steve assigned \\\"security-audit\\\" to Rustacean\"));\n    app.tasks_assigned += 1;\n\n    // ── Steps 5-8: Rustacean works ──\n    app.push_activity(ActivityItem::new(\"Rustacean 🦀\", ActivityAction::TaskAccepted,\n        \"Rustacean accepted \\\"security-audit\\\" — starting analysis\"));\n    app.push_activity(ActivityItem::new(\"Rustacean 🦀\", ActivityAction::TaskProgress,\n        \"Rustacean [in_progress]: 25% — Scanning crypto module...\"));\n    if let Some(a) = app.agents.get_mut(\"rustacean\") { a.load = 0.65; }\n    app.push_activity(ActivityItem::new(\"Rustacean 🦀\", ActivityAction::TaskProgress,\n        \"Rustacean [in_progress]: 50% — ⚠️ Nonce reuse vulnerability found\"));\n    app.push_activity(ActivityItem::new(\"Rustacean 🦀\", ActivityAction::TaskProgress,\n        \"Rustacean [in_progress]: 75% — Reviewing key exchange protocol\"));\n\n    // ── Step 9: Rustacean completes ──\n    app.push_activity(ActivityItem::new(\"Rustacean 🦀\", ActivityAction::TaskCompleted,\n        \"Rustacean [completed]: 100% — Audit done: 3 findings (1 HIGH, 2 INFO)\"));\n    app.tasks_completed += 1;\n    if let Some(a) = app.agents.get_mut(\"rustacean\") { a.load = 0.0; }\n\n    // ── Step 10: Bridge escalates to human ──\n    app.push_activity(ActivityItem::new(\"Bridge 🌉\", ActivityAction::HumanEscalation,\n        \"🚨 Bridge needs human: Security audit passed but 1 HIGH finding requires approval\"));\n    app.add_alert(\n        \"Bridge 🌉\",\n        \"security_review_requires_approval\",\n        \"Rustacean's audit found 1 HIGH risk: nonce reuse in crypto/mod.rs:49. Patch recommended before deploy.\",\n        \"Findings: 3 total\\n  HIGH: Nonce reuse (crypto/mod.rs:49)\\n  INFO: Consider HKDF for key derivation\\n  INFO: Counter overflow at u64::MAX\\nRecommendation: PATCH before deploy\",\n    );\n\n    // ── Render: Dashboard View ──\n    let w = 80;\n    let line = \"─\".repeat(w - 2);\n    let space = \" \".repeat(w - 2);\n\n    println!();\n    println!(\"╔{}╗\", line);\n    println!(\"║  📡 Walkie Talkie v4 — AI Agent IM Platform                             ║\");\n    println!(\"║  Phase 3: Human Interface Demo                                           ║\");\n    println!(\"╚{}╝\", line);\n    println!();\n\n    // Status bar\n    println!(\"┌{}┐\", line);\n    println!(\"│ 🏠 Walkie Talkie  │  源星公司  │  {}  │  {}  │\",\n        format!(\"{} agents ({} online)\", app.agents.len(), app.online_agent_count()),\n        if app.pending_approvals \u003e 0 { format!(\"🔔 {} pending\", app.pending_approvals) } else { \"🔔 0\".into() }\n    );\n    println!(\"├{}┤\", line);\n    println!(\"│{}│\", space);\n\n    // Agent panel + Activity feed\n    println!(\"│  ┌─ AGENTS ({}) ────────────────┐  ┌─ ACTIVITY FEED ({}) ─────────────┐│\",\n        app.agents.len(), app.activities.len());\n    println!(\"│  │                              │  │                                    ││\");\n\n    // Render agents\n    let agents: Vec\u003c_\u003e = app.agents.values().collect();\n    let agent_lines: Vec\u003cString\u003e = agents.iter().map(|a| {\n        let status = if a.online { \"🟢\" } else { \"⚫\" };\n        let load = format!(\"{:.0}%\", a.load * 100.0);\n        format!(\"  {} {:\u003c16} Load: {:\u003e4}\", status, a.display_name, load)\n    }).collect();\n\n    // Render activities (last 6)\n    let visible_activities: Vec\u003c_\u003e = app.activities.iter().rev().take(6).collect();\n    let act_lines: Vec\u003cString\u003e = visible_activities.iter().map(|item| {\n        let icon = item.action.icon();\n        // Truncate detail to fit\n        let detail = if item.detail.chars().count() \u003e 38 {\n            format!(\"{}...\", item.detail.chars().take(35).collect::\u003cString\u003e())\n        } else {\n            item.detail.clone()\n        };\n        format!(\"  {} {:\u003c40}\", icon, detail)\n    }).collect();\n\n    let max_lines = std::cmp::max(agent_lines.len(), act_lines.len()).min(8);\n    for i in 0..max_lines {\n        let left = agent_lines.get(i).map(|s| s.as_str()).unwrap_or(\"                                 \");\n        let right = act_lines.get(i).map(|s| s.as_str()).unwrap_or(\"                                       \");\n        println!(\"│  │{}│  │{}││\", format!(\"{:\u003c30}\", left), format!(\"{:\u003c40}\", right));\n    }\n\n    println!(\"│  │                              │  │                                    ││\");\n    println!(\"│  └──────────────────────────────┘  └────────────────────────────────────┘│\");\n    println!(\"│{}│\", space);\n\n    // Status line\n    println!(\"│  {}│\", format!(\"  {}\", app.status_line()));\n    println!(\"├{}┤\", line);\n    println!(\"│ [A] Alerts {} [D] Dashboard  [Y] Approve  [N] Reject  [Q] Quit       │\",\n        if app.pending_approvals \u003e 0 { format!(\"({} pending)\", app.pending_approvals) } else { \"(none)    \".into() });\n    println!(\"└{}┘\", line);\n    println!();\n\n    // ── Render: Alert Detail View ──\n    if !app.alerts.is_empty() {\n        let alert = \u0026app.alerts[0];\n        println!(\"┌{}┐\", line);\n        println!(\"│ 🔔 ALERT: {} — {}                                  │\",\n            alert.id, alert.status_str());\n        println!(\"├{}┤\", line);\n        println!(\"│{}│\", space);\n        println!(\"│  ╔{}╗│\", \"═\".repeat(68));\n        println!(\"│  ║                                                                      ║│\");\n        println!(\"│  ║   ⚠️  HUMAN HANDOFF — requires your decision                         ║│\");\n        println!(\"│  ║                                                                      ║│\");\n        println!(\"│  ║   From:    {:\u003c58}║│\", alert.from_agent);\n        println!(\"│  ║   Reason:  {:\u003c58}║│\", alert.reason);\n        println!(\"│  ║                                                                      ║│\");\n\n        // Summary (word wrap manually)\n        println!(\"│  ║   Summary:                                                            ║│\");\n        for chunk in alert.summary.as_bytes().chunks(58) {\n            let s = String::from_utf8_lossy(chunk);\n            println!(\"│  ║   {:\u003c66}║│\", s);\n        }\n        println!(\"│  ║                                                                      ║│\");\n        println!(\"│  ║   ┌───────────────────────────────────────────────────┐               ║│\");\n        println!(\"│  ║   │  [Y] ✅ APPROVE    [N] ❌ REJECT    [X] ⏭️ DISMISS │               ║│\");\n        println!(\"│  ║   └───────────────────────────────────────────────────┘               ║│\");\n        println!(\"│  ╚{}╝│\", \"═\".repeat(68));\n        println!(\"│{}│\", space);\n        println!(\"├{}┤\", line);\n        println!(\"│ [Y] Approve  [N] Reject  [X] Dismiss  [D] Back  [Q] Quit               │\");\n        println!(\"└{}┘\", line);\n        println!();\n\n        // ── Simulate Human Approval ──\n        println!(\"  ▶  User presses [Y] (Approve)\");\n        app.handle_key(Key::Approve);\n        println!();\n\n        // ── Render: Post-Approval Dashboard ──\n        println!(\"┌{}┐\", line);\n        println!(\"│ 🏠 Walkie Talkie  │  源星公司  │  {} agents  │  🔔 {} pending               │\",\n            app.agents.len(), app.pending_approvals);\n        println!(\"├{}┤\", line);\n\n        // Show last few activities including the approval\n        let recent: Vec\u003c_\u003e = app.activities.iter().rev().take(4).collect();\n        for item in recent {\n            let icon = item.action.icon();\n            let detail = if item.detail.chars().count() \u003e 60 { format!(\"{}...\", item.detail.chars().take(57).collect::\u003cString\u003e()) } else { item.detail.clone() };\n            println!(\"│  {} {:\u003c72}│\", icon, detail);\n        }\n\n        println!(\"├{}┤\",
