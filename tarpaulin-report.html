line);\n        println!(\"│  {}│\", format!(\"  {}\", app.status_line()));\n        println!(\"└{}┘\", line);\n        println!();\n    }\n\n    // ── Statistics ──\n    println!(\"┌{}┐\", line);\n    println!(\"│  DEMO STATISTICS                                                          │\");\n    println!(\"├{}┤\", line);\n    println!(\"│                                                                           │\");\n    println!(\"│   Agents:     {} registered ({} online)                                       │\",\n        app.agents.len(), app.online_agent_count());\n    println!(\"│   Events:     {} total                                                      │\", app.event_count);\n    println!(\"│   Tasks:      {} assigned, {} completed                                        │\",\n        app.tasks_assigned, app.tasks_completed);\n    println!(\"│   Alerts:     {} total, {} pending                                             │\",\n        app.alerts.len(), app.pending_approvals);\n    println!(\"│                                                                           │\");\n    println!(\"│   💡 Core library: 8,279 lines Rust, 113 tests passing                    │\");\n    println!(\"│   💡 TUI module:   tui/mod.rs (1,006 lines, 30+ tests)                    │\");\n    println!(\"│   💡 Run live TUI:  cargo run --example walkie_tui --features tui          │\");\n    println!(\"│                                                                           │\");\n    println!(\"│   Scenario: 3-Agent security audit → human approval → deploy              │\");\n    println!(\"│                                                                           │\");\n    println!(\"└{}┘\", line);\n    println!();\n}\n\n/// Helper to get alert status string\ntrait AlertStatusStr {\n    fn status_str(\u0026self) -\u003e \u0026'static str;\n}\n\nimpl AlertStatusStr for walkie_talkie_core::tui::Alert {\n    fn status_str(\u0026self) -\u003e \u0026'static str {\n        match self.status {\n            walkie_talkie_core::tui::AlertStatus::Pending =\u003e \"PENDING\",\n            walkie_talkie_core::tui::AlertStatus::Approved =\u003e \"APPROVED\",\n            walkie_talkie_core::tui::AlertStatus::Rejected =\u003e \"REJECTED\",\n            walkie_talkie_core::tui::AlertStatus::Dismissed =\u003e \"DISMISSED\",\n        }\n    }\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","Users","nextstop","projects","walkie-talkie","core","examples","p2p_basic.rs"],"content":"//! P2P Two-Node Demo — Walkie Talkie Core\n//!\n//! Two nodes chatting on the local network via Gossipsub + mDNS.\n//!\n//! # Usage\n//!\n//! ```bash\n//! # Terminal 1 — Node A\n//! cargo run --example p2p-basic\n//!\n//! # Terminal 2 — Node B (paste Node A's listen address)\n//! cargo run --example p2p-basic -- /ip4/127.0.0.1/tcp/\u003cPORT\u003e\n//! ```\n//!\n//! mDNS will also auto-discover peers on the same LAN.\n//! Type messages and press Enter to broadcast. `Ctrl+C` to quit.\n\nuse std::error::Error;\n\nuse tokio::io::{AsyncBufReadExt, BufReader};\n\nuse walkie_talkie_core::p2p::{P2PConfig, P2PEvent, P2PNetwork};\n\n#[tokio::main]\nasync fn main() -\u003e Result\u003c(), Box\u003cdyn Error\u003e\u003e {\n    // ── Logging ──\n    tracing_subscriber::fmt()\n        .with_env_filter(\n            tracing_subscriber::EnvFilter::try_from_default_env()\n                .unwrap_or_else(|_| \"info,libp2p_gossipsub=debug,libp2p_mdns=debug\".into()),\n        )\n        .with_target(false)\n        .with_thread_ids(false)\n        .init();\n\n    // ── Config ──\n    let remote_addr = std::env::args().nth(1);\n\n    let config = P2PConfig {\n        listen_on: vec![\"/ip4/0.0.0.0/tcp/0\".to_string()],\n        bootstrap_peers: remote_addr\n            .as_ref()\n            .map(|a| vec![a.clone()])\n            .unwrap_or_default(),\n        enable_mdns: true,\n        agent_version: Some(\"walkie-talkie-demo/0.2.0\".to_string()),\n        ping_interval_secs: 10,\n        ping_timeout_secs: 15,\n        ..Default::default()\n    };\n\n    // ── Create network ──\n    let (network, mut events) = P2PNetwork::new(config)?;\n    let peer_id = *network.local_peer_id();\n\n    println!(\"╔══════════════════════════════════════════════╗\");\n    println!(\"║     📡 Walkie Talkie — P2P Network Demo     ║\");\n    println!(\"╠══════════════════════════════════════════════╣\");\n    println!(\"║  Peer ID: {peer_id:\u003c36}║\");\n    println!(\"╚══════════════════════════════════════════════╝\");\n    println!();\n\n    // ── Spawn stdin reader ──\n    let net = network.clone();\n    let my_id = peer_id;\n    tokio::spawn(async move {\n        let stdin = BufReader::new(tokio::io::stdin());\n        let mut lines = stdin.lines();\n        while let Ok(Some(line)) = lines.next_line().await {\n            let text = line.trim();\n            if text.is_empty() {\n                continue;\n            }\n            match text {\n                \"/quit\" | \"/q\" =\u003e break,\n                \"/peers\" =\u003e match net.list_peers().await {\n                    Ok(peers) =\u003e {\n                        println!(\"Connected peers ({}):\", peers.len());\n                        for p in \u0026peers {\n                            println!(\"  - {p}\");\n                        }\n                    }\n                    Err(e) =\u003e eprintln!(\"Error listing peers: {e}\"),\n                },\n                \"/addrs\" =\u003e match net.external_addresses().await {\n                    Ok(addrs) =\u003e {\n                        println!(\"External addresses:\");\n                        for a in \u0026addrs {\n                            println!(\"  - {a}\");\n                        }\n                    }\n                    Err(e) =\u003e eprintln!(\"Error: {e}\"),\n                },\n                _ =\u003e {\n                    // Format: \"[Me] message\"\n                    let msg = format!(\"[{my_id}] {text}\");\n                    if let Err(e) = net.broadcast(msg.into_bytes()).await {\n                        eprintln!(\"Broadcast error: {e}\");\n                    }\n                }\n            }\n        }\n    });\n\n    println!(\"Commands: type message to broadcast | /peers | /addrs | /quit\");\n    println!();\n\n    // ── Event loop ──\n    while let Some(event) = events.recv().await {\n        match event {\n            P2PEvent::Listening { address } =\u003e {\n                println!(\"🎧 Listening on: {address}\");\n                if remote_addr.is_none() {\n                    println!(\"   Share this address to connect another node:\");\n                    println!(\"   cargo run --example p2p-basic -- {address}\");\n                    println!();\n                }\n            }\n            P2PEvent::PeerConnected { peer_id } =\u003e {\n                println!(\"✓ Connected: {peer_id}\");\n            }\n            P2PEvent::PeerDisconnected { peer_id } =\u003e {\n                println!(\"✗ Disconnected: {peer_id}\");\n            }\n            P2PEvent::PeerDiscovered { peer_id, addresses } =\u003e {\n                println!(\"📡 mDNS discovered: {peer_id} at {addresses:?}\");\n            }\n            P2PEvent::PeerExpired { peer_id } =\u003e {\n                println!(\"📡 mDNS expired: {peer_id}\");\n            }\n            P2PEvent::RawMessage { from: _, data } =\u003e {\n                let text = String::from_utf8_lossy(\u0026data);\n                println!(\"📨 {text}\");\n            }\n            P2PEvent::Identify { peer_id, info } =\u003e {\n                println!(\n                    \"🔐 Identified {peer_id}: agent={}, protocols={:?}\",\n                    info.agent_version, info.protocols\n                );\n            }\n            P2PEvent::PingSuccess { peer_id, rtt } =\u003e {\n                println!(\"🏓 Ping {peer_id}: {rtt:.2?}\");\n            }\n            P2PEvent::EncryptedMessage { from, plaintext } =\u003e {\n                let text = String::from_utf8_lossy(\u0026plaintext);\n                println!(\"🔒 [{}] {}\", from, text);\n            }\n            P2PEvent::SessionEstablished { peer_id } =\u003e {\n                println!(\"🔒 Session with {peer_id}\");\n            }\n            P2PEvent::SessionFailed { peer_id, reason } =\u003e {\n                println!(\"❌ Session fail {peer_id}: {reason}\");\n            }\n            P2PEvent::AgentIdentified { peer_id: _, identity } =\u003e {\n                println!(\"🪪 Agent: {} ({})\", identity.display_name, identity.short_id());\n            }\n            P2PEvent::IdentityVerificationFailed { peer_id, reason } =\u003e {\n                println!(\"❌ Identity fail {peer_id}: {reason}\");\n            }\n            P2PEvent::StructuredMessage { from, message } =\u003e {\n                println!(\"📋 {} [{}]: {}\", \u0026from.to_string()[..8.min(from.to_string().len())], message.protocol.tag(), message.summary());\n            }\n            P2PEvent::PingFailure { peer_id, error } =\u003e {\n                println!(\"🏓 Ping FAIL {peer_id}: {error}\");\n            }\n        }\n    }\n\n    println!(\"\\nEvent channel closed. Goodbye.\");\n    Ok(())\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","Users","nextstop","projects","walkie-talkie","core","examples","sdk_openclaw_agent.rs"],"content":"#![allow(dead_code)]\n//! SDK Integration Example — OpenClaw Agent connecting to Walkie Talkie Platform\n//!\n//! Demonstrates how an AI agent (e.g., an OpenClaw session) registers with\n//! the gateway and sends/receives messages via the HTTP API.\n//!\n//! Run: cargo run --example sdk_openclaw_agent\n\n\n/// Minimal HTTP client for the Walkie Talkie Gateway API.\n/// In production, use reqwest or your HTTP client of choice.\nstruct WalkieSdk {\n    base_url: String,\n    tenant_id: String,\n    agent_id: String,\n    // In production: store signing key for message auth\n}\n\nimpl WalkieSdk {\n    fn new(base_url: \u0026str, tenant_id: \u0026str, agent_id: \u0026str) -\u003e Self {\n        Self {\n            base_url: base_url.trim_end_matches('/').to_string(),\n            tenant_id: tenant_id.to_string(),\n            agent_id: agent_id.to_string(),\n        }\n    }\n\n    /// Build API URL for a given path.\n    fn url(\u0026self, path: \u0026str) -\u003e String {\n        format!(\"{}{}\", self.base_url, path)\n    }\n\n    /// Check gateway health.\n    fn health_url(\u0026self) -\u003e String {\n        self.url(\"/health\")\n    }\n\n    /// Register this agent with the tenant.\n    fn register_url(\u0026self) -\u003e String {\n        self.url(\u0026format!(\"/tenants/{}/agents\", self.tenant_id))\n    }\n\n    /// Send a message.\n    fn send_message_url(\u0026self) -\u003e String {\n        self.url(\"/messages\")\n    }\n\n    /// Query messages for this tenant.\n    fn query_messages_url(\u0026self) -\u003e String {\n        self.url(\u0026format!(\"/messages/{}\", self.tenant_id))\n    }\n}\n\nfn main() {\n    println!(\"=== Walkie Talkie SDK — OpenClaw Agent Integration Demo ===\\n\");\n\n    // ── 1. Configuration ──\n    let gateway_url = \"http://localhost:3000\"; // Walkie Talkie Gateway\n    let tenant_id = \"openclaw-team\";\n    let agent_name = \"steve-jobs\"; // OpenClaw agent session name\n\n    println!(\"📡 Connecting to Gateway: {}\", gateway_url);\n    println!(\"🏢 Tenant: {}\", tenant_id);\n    println!(\"🤖 Agent:  {}\\n\", agent_name);\n\n    // ── 2. Create SDK instance ──\n    let sdk = WalkieSdk::new(gateway_url, tenant_id, agent_name);\n\n    // ── 3. Show API endpoints ──\n    println!(\"── API Endpoints ──\");\n    println!(\"  Health:      {}\", sdk.health_url());\n    println!(\"  Register:    {}\", sdk.register_url());\n    println!(\"  Send:        {}\", sdk.send_message_url());\n    println!(\"  Query:       {}\", sdk.query_messages_url());\n    println!();\n\n    // ── 4. Simulated registration ──\n    println!(\"── Registration Payload ──\");\n    let register_body = serde_json::json!({\n        \"agent_id\": format!(\"did:walkie:{}\", agent_name),\n        \"display_name\": \"Steve Jobs\",\n        \"capabilities\": [\"strategic_planning\", \"product_vision\", \"task_assignment\"],\n        \"status\": \"online\",\n    });\n    println!(\"  POST {}\", sdk.register_url());\n    println!(\"  Body: {}\", serde_json::to_string_pretty(\u0026register_body).unwrap());\n    println!();\n\n    // ── 5. Simulated task assignment ──\n    println!(\"── Send Task Assignment ──\");\n    let task_body = serde_json::json!({\n        \"from_agent\": format!(\"did:walkie:{}\", agent_name),\n        \"to_agent\": \"did:walkie:rustacean\",\n        \"tenant_id\": tenant_id,\n        \"protocol\": \"task_assignment\",\n        \"payload\": {\n            \"task_id\": \"task-001\",\n            \"title\": \"Implement NAT traversal\",\n            \"description\": \"Add STUN/TURN support for P2P connections behind NAT\",\n            \"priority\": \"high\",\n            \"deadline\": \"2026-03-29T12:00:00Z\",\n        }\n    });\n    println!(\"  POST {}\", sdk.send_message_url());\n    println!(\"  Body: {}\", serde_json::to_string_pretty(\u0026task_body).unwrap());\n    println!();\n\n    // ── 6. Simulated human handoff ──\n    println!(\"── Send Human Handoff ──\");\n    let handoff_body = serde_json::json!({\n        \"from_agent\": format!(\"did:walkie:{}\", agent_name),\n        \"to_agent\": \"did:walkie:system\",\n        \"tenant_id\": tenant_id,\n        \"protocol\": \"human_handoff\",\n        \"payload\": {\n            \"reason\": \"budget_approval_required\",\n            \"summary\": \"Phase 3 needs $5000 for cloud hosting\",\n            \"context\": {\"phase\": 3, \"amount_usd\": 5000, \"provider\": \"AWS\"},\n            \"urgency\": \"medium\",\n        }\n    });\n    println!(\"  POST {}\", sdk.send_message_url());\n    println!(\"  Body: {}\", serde_json::to_string_pretty(\u0026handoff_body).unwrap());\n    println!();\n\n    // ── 7. Integration pattern for OpenClaw ──\n    println!(\"── OpenClaw Integration Pattern ──\");\n    println!(\"\nIn an OpenClaw session, integrate like this:\n\n```rust\n// In your OpenClaw agent's startup\nlet sdk = WalkieSdk::new(\n    \u0026std::env::var(\\\"WALKIE_GATEWAY_URL\\\").unwrap_or(\\\"http://localhost:3000\\\".into()),\n    \u0026std::env::var(\\\"WALKIE_TENANT_ID\\\").unwrap_or(\\\"default\\\".into()),\n    \u0026session.agent_id,\n);\n\n// On task assignment from TUI/human:\n// 1. POST /messages with protocol=task_assignment\n// 2. Agent processes task\n// 3. POST /messages with protocol=status_report\n\n// On human handoff:\n// 1. POST /messages with protocol=human_handoff\n// 2. TUI shows alert\n// 3. Human approves/rejects via TUI\n// 4. Agent receives response via GET /messages/{tenant_id}\n```\n\nEnvironment variables:\n  WALKIE_GATEWAY_URL  — Gateway HTTP endpoint\n  WALKIE_TENANT_ID    — Tenant to register under\n  WALKIE_AGENT_ID     — Agent DID (auto-generated from signing key)\n    \");\n\n    println!(\"=== Demo Complete ===\");\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","Users","nextstop","projects","walkie-talkie","core","examples","tui_demo.rs"],"content":"//! 🖥️ tui_demo.rs — Layer 3 Terminal UI Demo\n//!\n//! Minimal viable TUI: Agent panel + Activity Feed + Alert interaction.\n//!\n//! Usage:\n//!   cargo run --example tui_demo --features tui\n//!\n//! Keys:\n//!   [A] Alerts  [D] Dashboard  [Y] Approve  [N] Reject  [X] Dismiss  [Q] Quit\n\nuse std::io;\nuse std::time::Duration;\n\nuse crossterm::{\n    event::{self, Event, KeyCode, KeyEvent},\n    terminal::{disable_raw_mode, enable_raw_mode, EnterAlternateScreen, LeaveAlternateScreen},\n    execute,\n};\nuse ratatui::{\n    backend::CrosstermBackend,\n    layout::{Constraint, Direction, Layout},\n    style::{Color, Modifier, Style},\n    text::{Line, Span},\n    widgets::{Block, Borders, List, ListItem, ListState, Paragraph, Wrap},\n    Frame, Terminal,\n};\n\nuse walkie_talkie_core::identity::IdentityBuilder;\nuse walkie_talkie_core::p2p::{P2PConfig, P2PEvent, P2PNetwork};\nuse walkie_talkie_core::tui::{Key, TuiApp};\nuse walkie_talkie_core::protocol::AgentMessage;\n\n// ─── Key Mapping ────────────────────────────────────────────────\n\nfn map_key(key: KeyEvent) -\u003e Key {\n    match key.code {\n        KeyCode::Char('q') =\u003e Key::Quit,\n        KeyCode::Char('d') | KeyCode::Esc =\u003e Key::GoToDashboard,\n        KeyCode::Char('a') =\u003e Key::GoToAlerts,\n        KeyCode::Char('y') =\u003e Key::Approve,\n        KeyCode::Char('n') =\u003e Key::Reject,\n        KeyCode::Char('x') =\u003e Key::Dismiss,\n        KeyCode::Down =\u003e Key::Next,\n        KeyCode::Up =\u003e Key::Prev,\n        _ =\u003e Key::Unknown,\n    }\n}\n\n// ─── Rendering ──────────────────────────────────────────────────\n\nfn draw(f: \u0026mut Frame, app: \u0026TuiApp) {\n    let size = f.area();\n    let chunks = Layout::default()\n        .direction(Direction::Vertical)\n        .constraints([\n            Constraint::Length(3), // status bar\n            Constraint::Min(5),   // main\n            Constraint::Length(1), // help\n        ])\n        .split(size);\n\n    draw_status(f, app, chunks[0]);\n\n    match app.mode {\n        walkie_talkie_core::tui::AppMode::Dashboard =\u003e draw_dashboard(f, app, chunks[1]),\n        walkie_talkie_core::tui::AppMode::AlertDetail =\u003e draw_alerts(f, app, chunks[1]),\n    }\n\n    draw_help(f, app, chunks[2]);\n}\n\nfn draw_status(f: \u0026mut Frame, app: \u0026TuiApp, area: ratatui::layout::Rect) {\n    let pending = if app.pending_approvals \u003e 0 {\n        Span::styled(format!(\" 🔔 {} \", app.pending_approvals),\n            Style::default().fg(Color::Red).add_modifier(Modifier::BOLD))\n    } else {\n        Span::styled(\" 🔔 0 \", Style::default().fg(Color::DarkGray))\n    };\n\n    let bar = Paragraph::new(Line::from(vec![\n        Span::styled(\" 🏠 Walkie Talkie \", Style::default().fg(Color::Cyan).add_modifier(Modifier::BOLD)),\n        Span::raw(app.status_line()),\n        pending,\n    ])).style(Style::default().bg(Color::DarkGray).fg(Color::White));\n    f.render_widget(bar, area);\n}\n\nfn draw_dashboard(f: \u0026mut Frame, app: \u0026TuiApp, area: ratatui::layout::Rect) {\n    let chunks = Layout::default()\n        .direction(Direction::Horizontal)\n        .constraints([Constraint::Length(28), Constraint::Min(20)])\n        .split(area);\n\n    // ── Agent Panel ──\n    let agent_items: Vec\u003cListItem\u003e = app.agents.values().map(|a| {\n        let icon = if a.online { \"🟢\" } else { \"⚫\" };\n        ListItem::new(vec![\n            Line::from(vec![\n                Span::styled(format!(\" {} \", icon), Style::default().fg(if a.online { Color::Green } else { Color::DarkGray })),\n                Span::styled(\u0026a.display_name, Style::default().fg(Color::White).add_modifier(Modifier::BOLD)),\n                Span::styled(format!(\" {:.0}%\", a.load * 100.0), Style::default().fg(Color::Yellow)),\n            ]),\n            Line::from(Span::styled(\n                format!(\"    {} · {}\", a.capabilities.join(\", \"), a.short_did()),\n                Style::default().fg(Color::DarkGray),\n            )),\n        ])\n    }).collect();\n\n    let agent_list = List::new(if agent_items.is_empty() {\n        vec![ListItem::new(\"  No agents connected\")]\n    } else {\n        agent_items\n    }).block(Block::default().title(format!(\" Agents ({}) \", app.agents.len())).borders(Borders::ALL));\n\n    f.render_widget(agent_list, chunks[0]);\n\n    // ── Activity Feed ──\n    let feed_items: Vec\u003cListItem\u003e = app.activities.iter().rev().take(50).map(|item| {\n        let color = match item.action {\n            walkie_talkie_core::tui::ActivityAction::HumanEscalation =\u003e Color::Red,\n            walkie_talkie_core::tui::ActivityAction::TaskAssigned =\u003e Color::Yellow,\n            walkie_talkie_core::tui::ActivityAction::TaskCompleted =\u003e Color::Green,\n            walkie_talkie_core::tui::ActivityAction::TaskFailed =\u003e Color::Red,\n            _ =\u003e Color::Gray,\n        };\n        ListItem::new(vec![\n            Line::from(vec![\n                Span::styled(format!(\" {} \", item.action.icon()), Style::default().fg(color)),\n                Span::styled(\u0026item.actor, Style::default().fg(Color::Cyan).add_modifier(Modifier::BOLD)),\n            ]),\n            Line::from(Span::styled(\n                format!(\"   {}\", \u0026item.detail),\n                if item.requires_human { Style::default().fg(Color::Red).add_modifier(Modifier::BOLD) } else { Style::default().fg(Color::Gray) },\n            )),\n        ])\n    }).collect();\n\n    let feed_list = List::new(if feed_items.is_empty() {\n        vec![ListItem::new(\"  Waiting for activity...\")]\n    } else {\n        feed_items\n    }).block(Block::default().title(format!(\" Activity Feed ({}) \", app.activities.len())).borders(Borders::ALL));\n\n    f.render_widget(feed_list, chunks[1]);\n}\n\nfn draw_alerts(f: \u0026mut Frame, app: \u0026TuiApp, area: ratatui::layout::Rect) {\n    let chunks = Layout::default()\n        .direction(Direction::Horizontal)\n        .constraints([Constraint::Length(28), Constraint::Min(30)])\n        .split(area);\n\n    // ── Alert List ──\n    let alert_items: Vec\u003cListItem\u003e = app.alerts.iter().enumerate().map(|(i, a)| {\n        let (icon, style) = match a.status {\n            walkie_talkie_core::tui::AlertStatus::Pending =\u003e\n                (\"🚨\", Style::default().fg(Color::Red).add_modifier(Modifier::BOLD)),\n            walkie_talkie_core::tui::AlertStatus::Approved =\u003e\n                (\"✅\", Style::default().fg(Color::Green)),\n            walkie_talkie_core::tui::AlertStatus::Rejected =\u003e\n                (\"❌\", Style::default().fg(Color::Red)),\n            walkie_talkie_core::tui::AlertStatus::Dismissed =\u003e\n                (\"⬜\", Style::default().fg(Color::DarkGray)),\n        };\n        let selected = i == app.selected_alert;\n        let border_style = if selected { style.add_modifier(Modifier::BOLD) } else { style };\n        ListItem::new(vec![\n            Line::from(vec![\n                Span::styled(format!(\" {} \", icon), border_style),\n                Span::styled(\u0026a.from_agent, Style::default().fg(Color::Cyan)),\n            ]),\n            Line::from(Span::styled(format!(\"   {}\", \u0026a.summary), Style::default().fg(Color::Gray))),\n        ])\n    }).collect();\n\n    let mut state = ListState::default();\n    state.select(Some(app.selected_alert));\n\n    let alert_list = List::new(alert_items)\n        .block(Block::default().title(format!(\" Alerts ({} pending) \", app.pending_approvals)).borders(Borders::ALL))\n        .highlight_style(Style::default().bg(Color::DarkGray));\n\n    f.render_stateful_widget(alert_list, chunks[0], \u0026mut state);\n\n    // ── Alert Detail ──\n    if let Some(alert) = app.alerts.get(app.selected_alert) {\n        let is_pending = alert.is_pending();\n        let (status_str, status_color) = match alert.status {\n            walkie_talkie_core::tui::AlertStatus::Pending =\u003e (\"⏳ PENDING\", Color::Yellow),\n            walkie_talkie_core::tui::AlertStatus::Approved =\u003e (\"✅ APPROVED\", Color::Green),\n            walkie_talkie_core::tui::AlertStatus::Rejected =\u003e (\"❌ REJECTED\", Color::Red),\n            walkie_talkie_core::tui::AlertStatus::Dismissed =\u003e (\"⬜ DISMISSED\", Color::DarkGray),\n        };\n\n        let detail_chunks = Layout::default()\n            .direction(Direction::Vertical)\n            .constraints([Constraint::Min(3), Constraint::Length(3)])\n            .split(chunks[1]);\n\n        let detail = Paragraph::new(vec![\n            Line::from(vec![\n                Span::styled(\"  From: \", Style::default().fg(Color::DarkGray)),\n                Span::styled(\u0026alert.from_agent, Style::default().fg(Color::Cyan).add_modifier(Modifier::BOLD)),\n                Span::styled(format!(\"  │  {}\", status_str), Style::default().fg(status_color).add_modifier(Modifier::BOLD)),\n            ]),\n            Line::from(vec![\n                Span::styled(\"  Reason: \", Style::default().fg(Color::DarkGray)),\n                Span::styled(\u0026alert.reason, Style::default().fg(Color::Yellow)),\n            ]),\n            Line::from(vec![\n                Span::styled(\"  Summary: \", Style::default().fg(Color::DarkGray)),\n                Span::styled(\u0026alert.summary, Style::default().fg(Color::White)),\n            ]),\n            Line::from(\"\"),\n            Line::from(Span::styled(\"  Context:\", Style::default().fg(Color::DarkGray))),\n            Line::from(Span::styled(format!(\"  {}\", alert.context.replace('\\n', \"\\n  \")), Style::default().fg(Color::Gray))),\n        ]).block(Block::default().title(format!(\" Alert #{} \", alert.id)).borders(Borders::ALL))\n          .wrap(Wrap { trim: true });\n        f.render_widget(detail, detail_chunks[0]);\n\n        let action_color = if is_pending { Color::White } else { Color::DarkGray };\n        let actions = Paragraph::new(Line::from(vec![\n            Span::styled(\"  Actions: \", Style::default().fg(Color::DarkGray)),\n            Span::styled(\" [Y] Approve \", Style::default().fg(action_color)),\n            Span::styled(\" [N] Reject \", Style::default().fg(action_color)),\n            Span::styled(\" [X] Dismiss \", Style::default().fg(action_color)),\n        ])).block(Block::default().title(\" Human Intervention \").borders(Borders::ALL))\n          .style(Style::default().bg(if is_pending { Color::DarkGray } else { Color::Black }));\n        f.render_widget(actions, detail_chunks[1]);\n    }\n}\n\nfn draw_help(f: \u0026mut Frame, app: \u0026TuiApp, area: ratatui::layout::Rect) {\n    let text = match app.mode {\n        walkie_talkie_core::tui::AppMode::Dashboard =\u003e \" [A] Alerts  [Q] Quit \",\n        walkie_talkie_core::tui::AppMode::AlertDetail =\u003e \" [Y] Approve  [N] Reject  [X] Dismiss  [↑↓] Navigate  [D] Back  [Q] Quit \",\n    };\n    f.render_widget(Paragraph::new(text).style(Style::default().fg(Color::Gray)), area);\n}\n\n// ─── Main ──────────────────────────────────────────────────────\n\n#[tokio::main]\nasync fn main() -\u003e Result\u003c(), Box\u003cdyn std::error::Error\u003e\u003e {\n    enable_raw_mode()?;\n    let mut stdout = io::stdout();\n    execute!(stdout, EnterAlternateScreen)?;\n    let backend = CrosstermBackend::new(stdout);\n    let mut terminal = Terminal::new(backend)?;\n\n    // Create identity + P2P\n    let (identity, _key) = IdentityBuilder::new(\"Human\")\n        .capabilities(\u0026[\"observe\", \"approve\", \"control\"])\n        .build()?;\n    let (network, mut p2p_rx) = P2PNetwork::new(P2PConfig {\n        agent_identity: Some(identity),\n        auto_key_exchange: true,\n        ..Default::default()\n    })?;\n    network.listen(\"/ip4/0.0.0.0/tcp/0\").await?;\n\n    let mut app = TuiApp::new();\n    app.load_demo_data(); // Load demo agents + activity for immediate visual\n\n    let result = loop {\n        terminal.draw(|f| draw(f, \u0026app))?;\n        if app.should_quit { break Ok(()); }\n\n        tokio::select! {\n            event = p2p_rx.recv() =\u003e {\n                if let Some(event) = event {\n                    match event {\n                        P2PEvent::PeerConnected { peer_id } =\u003e {\n                            app.add_agent(\u0026peer_id.to_string(),\n                                \u0026format!(\"Agent-{}\", \u0026peer_id.to_string()[..8]),\n                                \u0026format!(\"did:walkie:{}\", \u0026peer_id.to_string()[..12]));\n                            app.push_activity(walkie_talkie_core::tui::ActivityItem::new(\n                                \"System\", walkie_talkie_core::tui::ActivityAction::Connected,\n                                \u0026format!(\"Peer {} connected\", \u0026peer_id.to_string()[..16])));\n                        }\n                        P2PEvent::PeerDisconnected { peer_id } =\u003e {\n                            app.set_agent_offline(\u0026peer_id.to_string());\n                        }\n                        P2PEvent::StructuredMessage { message, .. } =\u003e {\n                            app.process_agent_message(\u0026message);\n                        }\n                        P2PEvent::EncryptedMessage { plaintext, .. } =\u003e {\n                            if let Ok(msg) = AgentMessage::from_json_bytes(\u0026plaintext) {\n                                app.process_agent_message(\u0026msg);\n                            }\n                        }\n                        P2PEvent::RawMessage { data, .. } =\u003e {\n                            if let Ok(msg) = AgentMessage::from_json_bytes(\u0026data) {\n                                app.process_agent_message(\u0026msg);\n                            }\n                        }\n                        P2PEvent::AgentIdentified { peer_id, identity } =\u003e {\n                            app.update_agent_from_identity(\u0026peer_id.to_string(), \u0026identity);\n                        }\n                        P2PEvent::Listening { address } =\u003e {\n                            app.push_activity(walkie_talkie_core::tui::ActivityItem::new(\n                                \"System\", walkie_talkie_core::tui::ActivityAction::SystemInfo,\n                                \u0026format!(\"📡 Listening on {}\", address)));\n                        }\n                        _ =\u003e {}\n                    }\n                }\n            }\n            _ = tokio::time::sleep(Duration::from_millis(100)) =\u003e {\n                if event::poll(Duration::from_millis(0))? {\n                    if let Ok(Event::Key(key)) = event::read() {\n                        app.handle_key(map_key(key));\n                    }\n                }\n            }\n        }\n    };\n\n    disable_raw_mode()?;\n    execute!(io::stdout(), LeaveAlternateScreen)?;\n    network.shutdown()?;\n    result\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","Users","nextstop","projects","walkie-talkie","core","examples","walkie_tui.rs"],"content":"#![allow(dead_code)]\n//! 🖥️ walkie_tui.rs — Layer 3 Human Interface (Terminal UI)\n//!\n//! Minimal viable TUI for observing and controlling AI Agent collaboration.\n//!\n//! Panels:\n//!   Left:  Agent status (online/offline, load, capabilities)\n//!   Right: Activity feed (real-time message stream)\n//!   Bottom: Alert panel (HumanHandoff with Approve/Reject)\n//!\n//! Usage:\n//!   cargo run --example walkie_tui --features tui\n\nuse std::collections::HashMap;\nuse std::io;\nuse std::time::{Duration, Instant};\n\nuse crossterm::{\n    event::{self, Event, KeyCode, KeyEvent},\n    terminal::{disable_raw_mode, enable_raw_mode, EnterAlternateScreen, LeaveAlternateScreen},\n    execute,\n};\nuse ratatui::{\n    backend::CrosstermBackend,\n    layout::{Alignment, Constraint, Direction, Layout, Rect},\n    style::{Color, Modifier, Style},\n    text::{Line, Span},\n    widgets::{\n        Block, Borders, List, ListItem, ListState, Paragraph, Wrap,\n    },\n    Frame, Terminal,\n};\n\nuse walkie_talkie_core::identity::IdentityBuilder;\nuse walkie_talkie_core::p2p::{P2PConfig, P2PEvent, P2PNetwork};\nuse walkie_talkie_core::protocol::{AgentMessage, MessageProtocol};\n\n// ─── Data Types ─────────────────────────────────────────────────\n\n#[derive(Debug, Clone)]\nstruct AgentInfo {\n    display_name: String,\n    did: String,\n    online: bool,\n    load: f32,\n    #[allow(dead_code)]\n    capabilities: Vec\u003cString\u003e,\n    last_seen: Instant,\n    #[allow(dead_code)] tasks_active: u32,\n}\n\n#[derive(Debug, Clone)]\nstruct ActivityItem {\n    timestamp: String,\n    actor: String,\n    action: String,\n    detail: String,\n    is_urgent: bool,\n    requires_human: bool,\n    raw_json: String,\n}\n\n#[derive(Debug, Clone)]\nstruct Alert {\n    id: usize,\n    from_agent: String,\n    reason: String,\n    summary: String,\n    context: String,\n    timestamp: String,\n    status: AlertStatus,\n    original_message: String,\n}\n\n#[derive(Debug, Clone, PartialEq)]\nenum AlertStatus {\n    Pending,\n    Approved,\n    Rejected,\n    Dismissed,\n}\n\n#[derive(Debug, Clone, PartialEq)]\nenum AppMode {\n    Dashboard,\n    AlertDetail,\n}\n\n// ─── App State ──────────────────────────────────────────────────\n\nstruct App {\n    agents: HashMap\u003cString, AgentInfo\u003e,\n    activities: Vec\u003cActivityItem\u003e,\n    alerts: Vec\u003cAlert\u003e,\n    alert_list_state: ListState,\n    mode: AppMode,\n    activity_scroll: u16,\n    should_quit: bool,\n    my_name: String,\n    pending_approvals: usize,\n    tasks_assigned: u32,\n    tasks_completed: u32,\n    event_count: u64,\n    // Demo mode: auto-generate activity if no P2P peers\n    demo_mode: bool,\n    demo_tick: u64,\n}\n\nimpl App {\n    fn new(name: \u0026str) -\u003e Self {\n        let mut alert_list_state = ListState::default();\n        alert_list_state.select(Some(0));\n\n        Self {\n            agents: HashMap::new(),\n            activities: Vec::new(),\n            alerts: Vec::new(),\n            alert_list_state,\n            mode: AppMode::Dashboard,\n            activity_scroll: 0,\n            should_quit: false,\n            my_name: name.to_string(),\n            pending_approvals: 0,\n            tasks_assigned: 0,\n            tasks_completed: 0,\n            event_count: 0,\n            demo_mode: true,\n            demo_tick: 0,\n        }\n    }\n\n    fn add_agent(\u0026mut self, peer_id: \u0026str, name: \u0026str, did: \u0026str, caps: Vec\u003cString\u003e) {\n        self.agents.entry(peer_id.to_string()).or_insert(AgentInfo {\n            display_name: name.to_string(),\n            did: did.to_string(),\n            online: true,\n            load: 0.0,\n            capabilities: caps,\n            last_seen: Instant::now(),\n            tasks_active: 0,\n        });\n    }\n\n    fn set_agent_offline(\u0026mut self, peer_id: \u0026str) {\n        let name = self.agents.get(peer_id).map(|a| a.display_name.clone());\n        if let Some(agent) = self.agents.get_mut(peer_id) {\n            agent.online = false;\n        }\n        if let Some(name) = name {\n            self.add_activity(ActivityItem {\n                timestamp: now_str(),\n                actor: name.clone(),\n                action: \"OFFLINE\".to_string(),\n                detail: format!(\"{} went offline\", name),\n                is_urgent: false,\n                requires_human: false,\n                raw_json: String::new(),\n            });\n        }\n    }\n\n    fn add_activity(\u0026mut self, item: ActivityItem) {\n        self.event_count += 1;\n        self.activities.push(item);\n        // Keep last 200 activities\n        if self.activities.len() \u003e 200 {\n            self.activities.remove(0);\n        }\n        // Auto-scroll to bottom\n        self.activity_scroll = self.activities.len().saturating_sub(1) as u16;\n    }\n\n    fn add_alert(\u0026mut self, from: \u0026str, reason: \u0026str, summary: \u0026str, context: \u0026str, raw: \u0026str) {\n        let id = self.alerts.len();\n        self.alerts.push(Alert {\n            id,\n            from_agent: from.to_string(),\n            reason: reason.to_string(),\n            summary: summary.to_string(),\n            context: context.to_string(),\n            timestamp: now_str(),\n            status: AlertStatus::Pending,\n            original_message: raw.to_string(),\n        });\n        self.pending_approvals += 1;\n        // Auto-switch to alert detail\n        if self.mode == AppMode::Dashboard {\n            self.mode = AppMode::AlertDetail;\n        }\n    }\n\n    fn handle_p2p_event(\u0026mut self, event: P2PEvent) {\n        match event {\n            P2PEvent::PeerConnected { peer_id } =\u003e {\n                self.add_agent(\n                    \u0026peer_id.to_string(),\n                    \u0026format!(\"Agent-{}\", \u0026peer_id.to_string()[..8]),\n                    \u0026format!(\"did:walkie:{}\", \u0026peer_id.to_string()[..12]),\n                    vec![],\n                );\n                self.add_activity(ActivityItem {\n                    timestamp: now_str(),\n                    actor: format!(\"Agent-{}\", \u0026peer_id.to_string()[..8]),\n                    action: \"CONNECTED\".to_string(),\n                    detail: format!(\"Peer {} connected\", \u0026peer_id.to_string()[..16]),\n                    is_urgent: false,\n                    requires_human: false,\n                    raw_json: String::new(),\n                });\n            }\n            P2PEvent::PeerDisconnected { peer_id } =\u003e {\n                self.set_agent_offline(\u0026peer_id.to_string());\n            }\n            P2PEvent::StructuredMessage { from: _, message } =\u003e {\n                self.process_agent_message(\u0026message);\n            }\n            P2PEvent::EncryptedMessage { from, plaintext } =\u003e {\n                if let Ok(msg) = AgentMessage::from_json_bytes(\u0026plaintext) {\n                    self.process_agent_message(\u0026msg);\n                } else {\n                    // Raw encrypted message, log it\n                    self.add_activity(ActivityItem {\n                        timestamp: now_str(),\n                        actor: format!(\"Peer-{}\", \u0026from.to_string()[..8]),\n                        action: \"ENCRYPTED_MSG\".to_string(),\n                        detail: format!(\"Encrypted message from {}\", \u0026from.to_string()[..16]),\n                        is_urgent: false,\n                        requires_human: false,\n                        raw_json: String::new(),\n                    });\n                }\n            }\n            P2PEvent::RawMessage { from, data } =\u003e {\n                if let Ok(msg) = AgentMessage::from_json_bytes(\u0026data) {\n                    self.process_agent_message(\u0026msg);\n                } else {\n                    self.add_activity(ActivityItem {\n                        timestamp: now_str(),\n                        actor: format!(\"Peer-{}\", \u0026from.to_string()[..8]),\n                        action: \"RAW_MSG\".to_string(),\n                        detail: format!(\"Raw message from {}\", \u0026from.to_string()[..16]),\n                        is_urgent: false,\n                        requires_human: false,\n                        raw_json: String::new(),\n                    });\n                }\n            }\n            P2PEvent::AgentIdentified { peer_id, identity } =\u003e {\n                // Update agent info with verified identity\n                let key = peer_id.to_string();\n                if let Some(agent) = self.agents.get_mut(\u0026key) {\n                    agent.display_name = identity.display_name.clone();\n                    agent.did = identity.agent_id.clone();\n                    agent.capabilities = identity.capabilities.clone();\n                } else {\n                    self.add_agent(\n                        \u0026key,\n                        \u0026identity.display_name,\n                        \u0026identity.agent_id,\n                        identity.capabilities,\n                    );\n                }\n                self.add_activity(ActivityItem {\n                    timestamp: now_str(),\n                    actor: identity.display_name.clone(),\n                    action: \"IDENTITY_VERIFIED\".to_string(),\n                    detail: format!(\"✅ {} identity verified\", identity.display_name),\n                    is_urgent: false,\n                    requires_human: false,\n                    raw_json: String::new(),\n                });\n            }\n            P2PEvent::SessionEstablished { peer_id } =\u003e {\n                self.add_activity(ActivityItem {\n                    timestamp: now_str(),\n                    actor: format!(\"Peer-{}\", \u0026peer_id.to_string()[..8]),\n                    action: \"E2EE_SESSION\".to_string(),\n                    detail: format!(\"🔒 Encrypted session with {}\", \u0026peer_id.to_string()[..16]),\n                    is_urgent: false,\n                    requires_human: false,\n                    raw_json: String::new(),\n                });\n            }\n            P2PEvent::Listening { address } =\u003e {\n                self.add_activity(ActivityItem {\n                    timestamp: now_str(),\n                    actor: self.my_name.clone(),\n                    action: \"LISTENING\".to_string(),\n                    detail: format!(\"📡 Listening on {}\", address),\n                    is_urgent: false,\n                    requires_human: false,\n                    raw_json: String::new(),\n                });\n            }\n            _ =\u003e {\n                // Ignore other events for TUI (ping, identify, etc.)\n            }\n        }\n    }\n\n    fn process_agent_message(\u0026mut self, msg: \u0026AgentMessage) {\n        let actor = msg.from_agent.display_name.clone();\n        let protocol = msg.protocol.clone();\n        let is_urgent = msg.requires_human || protocol == MessageProtocol::HumanHandoff;\n\n        let (action, detail) = match protocol {\n            MessageProtocol::Heartbeat =\u003e {\n                let status = msg.payload_str(\"status\").unwrap_or(\"?\");\n                let load = msg.payload_str(\"load\").unwrap_or(\"?\");\n                // Update agent load\n                let did = \u0026msg.from_agent.agent_id;\n                if let Some(agent) = self.agents.get_mut(did) {\n                    agent.load = load.parse().unwrap_or(0.0);\n                    agent.last_seen = Instant::now();\n                    agent.online = true;\n                }\n                (\"HEARTBEAT\".to_string(), format!(\"{} is {}\", actor, status))\n            }\n            MessageProtocol::TaskAssignment =\u003e {\n                self.tasks_assigned += 1;\n                let task = msg.payload_str(\"task\").unwrap_or(\"unknown task\");\n                let target = if msg.to_agent.is_empty() {\n                    \"ALL\".to_string()\n                } else {\n                    msg.to_agent.clone()\n                };\n                (\"TASK_ASSIGNED\".to_string(),\n                    format!(\"{} assigned \\\"{}\\\" to {}\", actor, task, target))\n            }\n            MessageProtocol::StatusReport =\u003e {\n                let status = msg.payload_str(\"status\").unwrap_or(\"?\");\n                let pct = msg.payload_i64(\"percent\").unwrap_or(0);\n                let note = msg.payload_str(\"note\").unwrap_or(\"\");\n                if status == \"completed\" {\n                    self.tasks_completed += 1;\n                }\n                let note_part = if note.is_empty() { String::new() } else { format!(\" — {}\", note) };\n                (\"STATUS\".to_string(),\n                    format!(\"{} [{}]: {}%{}\", actor, status, pct, note_part))\n            }\n            MessageProtocol::DataExchange =\u003e {\n                let text = msg.payload_str(\"text\");\n                if let Some(t) = text {\n                    (\"TEXT\".to_string(), format!(\"{}: \\\"{}\\\"\", actor, t))\n                } else {\n                    let schema = msg.payload_str(\"schema\").unwrap_or(\"data\");\n                    (\"DATA\".to_string(), format!(\"{} sent {} to {}\", actor, schema,\n                        if msg.to_agent.is_empty() { \"ALL\".to_string() } else { msg.to_agent.clone() }))\n                }\n            }\n            MessageProtocol::IntentNegotiation =\u003e {\n                let action_name = msg.payload_str(\"action\").unwrap_or(\"?\");\n                (\"INTENT\".to_string(), format!(\"{} asked: can you {}?\", actor, action_name))\n            }\n            MessageProtocol::HumanHandoff =\u003e {\n                let reason = msg.payload_str(\"reason\").unwrap_or(\"?\");\n                let summary = msg.payload_str(\"summary\").unwrap_or(\"\");\n                let context = msg.payload_object()\n                    .and_then(|o| o.get(\"context\").cloned())\n                    .map(|v| v.to_string())\n                    .unwrap_or_default();\n                // Create alert\n                self.add_alert(\n                    \u0026actor,\n                    reason,\n                    \u0026summary,\n                    \u0026context,\n                    \u0026msg.summary(),\n                );\n                (\"HUMAN_ESCALATION\".to_string(),\n                    format!(\"🚨 {} needs human: {}\", actor, summary))\n            }\n        };\n\n        self.add_activity(ActivityItem {\n            timestamp: now_str(),\n            actor,\n            action,\n            detail,\n            is_urgent,\n            requires_human: msg.requires_human,\n            raw_json: msg.summary(),\n        });\n    }\n\n    fn approve_alert(\u0026mut self) {\n        if let Some(idx) = self.alert_list_state.selected() {\n            let from = self.alerts.get(idx).map(|a| a.from_agent.clone());\n            if let Some(alert) = self.alerts.get_mut(idx) {\n                if alert.status == AlertStatus::Pending {\n                    alert.status = AlertStatus::Approved;\n                    self.pending_approvals = self.pending_approvals.saturating_sub(1);\n                    if let Some(from) = from {\n                        self.add_activity(ActivityItem {\n                            timestamp: now_str(),\n                            actor: self.my_name.clone(),\n                            action: \"APPROVED\".to_string(),\n                            detail: format!(\"✅ Approved alert from {}\", from),\n                            is_urgent: false,\n                            requires_human: false,\n                            raw_json: String::new(),\n                        });\n                    }\n                    // Move to next pending alert\n                    self.next_alert();\n                }\n            }\n        }\n    }\n\n    fn reject_alert(\u0026mut self) {\n        if let Some(idx) = self.alert_list_state.selected() {\n            let from = self.alerts.get(idx).map(|a| a.from_agent.clone());\n            if let Some(alert) = self.alerts.get_mut(idx) {\n                if alert.status == AlertStatus::Pending {\n                    alert.status = AlertStatus::Rejected;\n                    self.pending_approvals = self.pending_approvals.saturating_sub(1);\n                    if let Some(from) = from {\n                        self.add_activity(ActivityItem {\n                            timestamp: now_str(),\n                            actor: self.my_name.clone(),\n                            action: \"REJECTED\".to_string(),\n                            detail: format!(\"❌ Rejected alert from {}\", from),\n                            is_urgent: false,\n                            requires_human: false,\n                            raw_json: String::new(),\n                        });\n                    }\n                    self.next_alert();\n                }\n            }\n        }\n    }\n\n    fn dismiss_alert(\u0026mut self) {\n        if let Some(idx) = self.alert_list_state.selected() {\n            if let Some(alert) = self.alerts.get_mut(idx) {\n                if alert.status == AlertStatus::Pending {\n                    alert.status = AlertStatus::Dismissed;\n                    self.pending_approvals = self.pending_approvals.saturating_sub(1);\n                    self.next_alert();\n                }\n            }\n        }\n    }\n\n    fn next_alert(\u0026mut self) {\n        let current = self.alert_list_state.selected().unwrap_or(0);\n        for i in (current + 1)..self.alerts.len() {\n            if self.alerts[i].status == AlertStatus::Pending {\n                self.alert_list_state.select(Some(i));\n                return;\n            }\n        }\n        // No more pending, back to dashboard\n        if self.pending_approvals == 0 {\n            self.mode = AppMode::Dashboard;\n        }\n    }\n\n    fn prev_alert(\u0026mut self) {\n        let current = self.alert_list_state.selected().unwrap_or(0);\n        if current \u003e 0 {\n            for i in (0..current).rev() {\n                if self.alerts[i].status == AlertStatus::Pending {\n                    self.alert_list_state.select(Some(i));\n                    return;\n                }\n            }\n        }\n    }\n\n    fn handle_key(\u0026mut self, key: KeyEvent) {\n        match key.code {\n            KeyCode::Char('q') =\u003e {\n                self.should_quit = true;\n            }\n            KeyCode::Char('a') =\u003e {\n                if self.pending_approvals \u003e 0 {\n                    self.mode = AppMode::AlertDetail;\n                }\n            }\n            KeyCode::Char('d') | KeyCode::Esc =\u003e {\n                self.mode = AppMode::Dashboard;\n            }\n            KeyCode::Char('y') if self.mode == AppMode::AlertDetail =\u003e {\n                self.approve_alert();\n            }\n            KeyCode::Char('n') if self.mode == AppMode::AlertDetail =\u003e {\n                self.reject_alert();\n            }\n            KeyCode::Char('x') if self.mode == AppMode::AlertDetail =\u003e {\n                self.dismiss_alert();\n            }\n            KeyCode::Down if self.mode == AppMode::AlertDetail =\u003e {\n                self.next_alert();\n            }\n            KeyCode::Up if self.mode == AppMode::AlertDetail =\u003e {\n                self.prev_alert();\n            }\n            _ =\u003e {}\n        }\n    }\n\n    // ─── Demo Data Generation ───────────────────────────────────\n\n    fn generate_demo_tick(\u0026mut self) {\n        self.demo_tick += 1;\n\n        // Simulate 3 agents connecting\n        if self.demo_tick == 1 {\n            self.demo_mode = true;\n            self.add_agent(\"steve\", \"Steve\", \"did:walkie:maMVNJDswURGw\",\n                vec![\"coordinate\".into(), \"strategy\".into()]);\n            self.add_agent(\"rustacean\", \"Rustacean\", \"did:walkie:fLYf2Xc0I3qyO\",\n                vec![\"code-review\".into(), \"crypto\".into(), \"p2p\".into()]);\n            self.add_agent(\"bridge\", \"Bridge\", \"did:walkie:fmYIb9jntMvbj\",\n                vec![\"product\".into(), \"review\".into(), \"human-handoff\".into()]);\n            self.add_activity(ActivityItem {\n                timestamp: now_str(), actor: \"System\".into(),\n                action: \"INFO\".into(),\n                detail: \"🤖 Demo mode: 3 agents loaded. Press 'a' to view alerts.\".into(),\n                is_urgent: false, requires_human: false, raw_json: String::new(),\n            });\n        }\n\n        // Steve assigns task at tick 2\n        if self.demo_tick == 2 {\n            self.add_activity(ActivityItem {\n                timestamp: now_str(), actor: \"Steve\".into(),\n                action: \"TASK_ASSIGNED\".into(),\n                detail: \"Steve assigned \\\"code-review\\\" to Rustacean\".into(),\n                is_urgent: false, requires_human: false, raw_json: String::new(),\n            });\n            self.tasks_assigned += 1;\n        }\n\n        // Rustacean progress at tick 3\n        if self.demo_tick == 3 {\n            if let Some(a) = self.agents.get_mut(\"rustacean\") { a.load = 0.5; }\n            self.add_activity(ActivityItem {\n                timestamp: now_str(), actor: \"Rustacean\".into(),\n                action: \"STATUS\".into(),\n                detail: \"Rustacean [in_progress]: 50% — Checking encryption layer...\".into(),\n                is_urgent: false, requires_human: false, raw_json: String::new(),\n            });\n        }\n\n        // Rustacean completes at tick 4\n        if self.demo_tick == 4 {\n            self.tasks_completed += 1;\n            if let Some(a) = self.agents.get_mut(\"rustacean\") { a.load = 0.0; }\n            self.add_activity(ActivityItem {\n                timestamp: now_str(), actor: \"Rustacean\".into(),\n                action: \"STATUS\".into(),\n                detail: \"Rustacean [completed]: 100% — Code review done, 2 findings\".into(),\n                is_urgent: false, requires_human: false, raw_json: String::new(),\n            });\n        }\n\n        // Bridge escalates at tick 5\n        if self.demo_tick == 5 {\n            self.add_alert(\n                \"Bridge\",\n                \"review_complete\",\n                \"Code review passed. 2 findings need human review.\",\n                \"Reviewer: Rustacean\\nVerdict: PASS\\nFindings: 2 (1 info, 1 warning)\",\n                \"\",\n            );\n        }\n\n        // Steve forwards at tick 6\n        if self.demo_tick == 6 {\n            self.tasks_assigned += 1;\n            self.add_activity(ActivityItem {\n                timestamp: now_str(), actor: \"Steve\".into(),\n                action: \"TASK_ASSIGNED\".into(),\n                detail: \"Steve assigned \\\"human-review\\\" to Bridge\".into(),\n                is_urgent: false, requires_human: false, raw_json: String::new(),\n            });\n        }\n    }\n}\n\n// ─── UI Rendering ──────────────────────────────────────────────\n\nfn draw(f: \u0026mut Frame, app: \u0026App) {\n    let size = f.area();\n\n    // Outer layout: status bar (top) + main content (bottom)\n    let chunks = Layout::default()\n        .direction(Direction::Vertical)\n        .constraints([\n            Constraint::Length(3),  // Status bar\n            Constraint::Min(5),    // Main content\n            Constraint::Length(1), //  app.agents.len());\n\n    let mut items: Vec\u003cListItem\u003e = app.agents.values().map(|agent| {\n        let status_icon = if agent.online { \"🟢\" } else { \"⚫\" };\n        let load_bar = format!(\"{:.0}%\", agent.load * 100.0);\n\n        let line = Line::from(vec![\n            Span::styled(format!(\" {} \", status_icon),\n                Style::default().fg(if agent.online { Color::Green } else { Color::DarkGray })),\n            Span::styled(\u0026agent.display_name,\n                Style::default().fg(Color::White).add_modifier(Modifier::BOLD)),\n            Span::styled(format!(\" {}\", load_bar),\n                Style::default().fg(Color::Yellow)),\n        ]);\n\n        let detail = Line::from(Span::styled(\n            format!(\"    {} · {}\", agent.capabilities.join(\", \"), agent.did),\n            Style::default().fg(Color::DarkGray),\n        ));\n\n        ListItem::new(vec![line, detail])\n    }).collect();\n\n    if items.is_empty() {\n        items.push(ListItem::new(Line::from(\n            Span::styled(\"  No agents connected\", Style::default().fg(Color::DarkGray)),\n        )));\n    }\n\n    let list = List::new(items)\n        .block(Block::default()\n            .title(title)\n            .borders(Borders::ALL)\n            .style(Style::default().bg(Color::Black)));\n\n    f.render_widget(list, area);\n}\n\nfn draw_activity_feed(f: \u0026mut Frame, app: \u0026App, area: Rect) {\n    let title = format!(\" Activity Feed ({}) \", app.activities.len());\n\n    let items: Vec\u003cListItem\u003e = app.activities.iter().rev().map(|item| {\n        let (icon_color, icon) = match item.action.as_str() {\n            \"HUMAN_ESCALATION\" =\u003e (Color::Red, \"🚨\"),\n            \"TASK_ASSIGNED\" =\u003e (Color::Yellow, \"📋\"),\n            \"STATUS\" =\u003e (Color::Blue, \"📊\"),\n            \"TEXT\" =\u003e (Color::White, \"💬\"),\n            \"DATA\" =\u003e (Color::Green, \"📦\"),\n            \"HEARTBEAT\" =\u003e (Color::DarkGray, \"💚\"),\n            \"APPROVED\" =\u003e (Color::Green, \"✅\"),\n            \"REJECTED\" =\u003e (Color::Red, \"❌\"),\n            \"IDENTITY_VERIFIED\" =\u003e (Color::Cyan, \"🪪\"),\n            \"E2EE_SESSION\" =\u003e (Color::Magenta, \"🔒\"),\n            \"CONNECTED\" =\u003e (Color::Green, \"🔗\"),\n            \"OFFLINE\" =\u003e (Color::DarkGray, \"❌\"),\n            \"INTENT\" =\u003e (Color::Blue, \"🤝\"),\n            _ =\u003e (Color::White, \"  \"),\n        };\n\n        let lines = vec![\n            Line::from(vec![\n                Span::styled(format!(\" {} \", icon), Style::default().fg(icon_color)),\n                Span::styled(\u0026item.timestamp, Style::default().fg(Color::DarkGray)),\n                Span::styled(format!(\" {} \", \u0026item.actor),\n                    Style::default().fg(Color::Cyan).add_modifier(Modifier::BOLD)),\n            ]),\n            Line::from(Span::styled(\n                format!(\"   {}\", \u0026item.detail),\n                if item.requires_human {\n                    Style::default().fg(Color::Red).add_modifier(Modifier::BOLD)\n                } else if item.is_urgent {\n                    Style::default().fg(Color::Yellow)\n                } else {\n                    Style::default().fg(Color::Gray)\n                },\n            )),\n        ];\n\n        ListItem::new(lines)\n    }).collect();\n\n    if items.is_empty() {\n        let placeholder = ListItem::new(vec![\n            Line::from(\"\"),\n            Line::from(Span::styled(\n                \"  Waiting for agent activity...\",\n                Style::default().fg(Color::DarkGray),\n            )),\n        ]);\n        f.render_widget(\n            List::new(vec![placeholder])\n                .block(Block::default().title(title.clone()).borders(Borders::ALL)),\n            area,\n        );\n        return;\n    }\n\n    let list = List::new(items)\n        .block(Block::default()\n            .title(title)\n            .borders(Borders::ALL)\n            .style(Style::default().bg(Color::Black)));\n\n    f.render_widget(list, area);\n}\n\nfn draw_alert_detail(f: \u0026mut Frame, app: \u0026App, area: Rect) {\n    let chunks = Layout::default()\n        .direction(Direction::Horizontal)\n        .constraints([\n            Constraint::Length(28), // Alert list\n            Constraint::Min(30),   // Alert detail\n        ])\n        .split(area);\n\n    draw_alert_list(f, app, chunks[0]);\n    draw_alert_view(f, app, chunks[1]);\n}\n\nfn draw_alert_list(f: \u0026mut Frame, app: \u0026App, area: Rect) {\n    let pending = app.alerts.iter().filter(|a| a.status == AlertStatus::Pending).count();\n    let title = format!(\" Alerts ({} pending) \", pending);\n\n    let items: Vec\u003cListItem\u003e = app.alerts.iter().map(|alert| {\n        let (icon, style) = match alert.status {\n            AlertStatus::Pending =\u003e (\"🚨\", Style::default().fg(Color::Red).add_modifier(Modifier::BOLD)),\n            AlertStatus::Approved =\u003e (\"✅\", Style::default().fg(Color::Green)),\n            AlertStatus::Rejected =\u003e (\"❌\", Style::default().fg(Color::Red)),\n            AlertStatus::Dismissed =\u003e (\"⬜\", Style::default().fg(Color::DarkGray)),\n        };\n\n        let lines = vec![\n            Line::from(vec![\n                Span::styled(format!(\" {} \", icon), style),\n                Span::styled(\u0026alert.from_agent,\n                    Style::default().fg(Color::Cyan)),\n            ]),\n            Line::from(Span::styled(\n                format!(\"   {}\", \u0026alert.summary),\n                Style::default().fg(Color::Gray),\n            )),\n        ];\n\n        ListItem::new(lines)\n    }).collect();\n\n    let list = List::new(items)\n        .block(Block::default().title(title).borders(Borders::ALL))\n        .highlight_style(Style::default().bg(Color::DarkGray).add_modifier(Modifier::BOLD));\n\n    f.render_stateful_widget(list, area, \u0026mut app.alert_list_state.clone());\n}\n\nfn draw_alert_view(f: \u0026mut Frame, app: \u0026App, area: Rect) {\n    let selected = app.alert_list_state.selected().unwrap_or(0);\n\n    if selected \u003e= app.alerts.len() {\n        let placeholder = Paragraph::new(\"  No alert selected\")\n            .style(Style::default().fg(Color::DarkGray))\n            .block(Block::default().title(\" Alert Detail \").borders(Borders::ALL));\n        f.render_widget(placeholder, area);\n        return;\n    }\n\n    let alert = \u0026app.alerts[selected];\n    let is_pending = alert.status == AlertStatus::Pending;\n\n    let status_str = match alert.status {\n        AlertStatus::Pending =\u003e \"⏳ PENDING\",\n        AlertStatus::Approved =\u003e \"✅ APPROVED\",\n        AlertStatus::Rejected =\u003e \"❌ REJECTED\",\n        AlertStatus::Dismissed =\u003e \"⬜ DISMISSED\",\n    };\n\n    let status_color = match alert.status {\n        AlertStatus::Pending =\u003e Color::Yellow,\n        AlertStatus::Approved =\u003e Color::Green,\n        AlertStatus::Rejected =\u003e Color::Red,\n        AlertStatus::Dismissed =\u003e Color::DarkGray,\n    };\n\n    // Split area: detail (top) + actions (bottom)\n    let chunks = Layout::default()\n        .direction(Direction::Vertical)\n        .constraints([\n            Constraint::Min(5),\n            Constraint::Length(3),\n        ])\n        .split(area);\n\n    // Detail panel\n    let detail_text = vec![\n        Line::from(vec![\n            Span::styled(\"  From: \", Style::default().fg(Color::DarkGray)),\n            Span::styled(\u0026alert.from_agent,\n                Style::default().fg(Color::Cyan).add_modifier(Modifier::BOLD)),\n            Span::styled(format!(\"  │  {}\", status_str),\n                Style::default().fg(status_color).add_modifier(Modifier::BOLD)),\n        ]),\n        Line::from(vec![\n            Span::styled(\"  Reason: \", Style::default().fg(Color::DarkGray)),\n            Span::styled(\u0026alert.reason, Style::default().fg(Color::Yellow)),\n        ]),\n        Line::from(vec![\n            Span::styled(\"  Summary: \", Style::default().fg(Color::DarkGray)),\n            Span::styled(\u0026alert.summary, Style::default().fg(Color::White)),\n        ]),\n        Line::from(\"\"),\n        Line::from(Span::styled(\"  Context:\", Style::default().fg(Color::DarkGray))),\n        Line::from(Span::styled(\n            format!(\"  {}\", alert.context.replace('\\n', \"\\n  \")),\n            Style::default().fg(Color::Gray),\n        )),\n        Line::from(\"\"),\n        Line::from(vec![\n            Span::styled(\"  Time: \", Style::default().fg(Color::DarkGray)),\n            Span::styled(\u0026alert.timestamp, Style::default().fg(Color::DarkGray)),\n        ]),\n    ];\n\n    let detail = Paragraph::new(detail_text)\n        .block(Block::default()\n            .title(format!(\" Alert #{} \", alert.id))\n            .borders(Borders::ALL))\n        .wrap(Wrap { trim: true });\n\n    f.render_widget(detail, chunks[0]);\n\n    // Action panel\n    let action_style = if is_pending {\n        Style::default().fg(Color::White)\n    } else {\n        Style::default().fg(Color::DarkGray)\n    };\n\n    let actions = Paragraph::new(Line::from(vec![\n        Span::styled(\"  Actions: \", Style::default().fg(Color::DarkGray)),\n        Span::styled(\" [Y] Approve \", action_style),\n        Span::styled(\" [N] Reject \", action_style),\n        Span::styled(\" [X] Dismiss \", action_style),\n        Span::styled(\" [↑↓] Navigate \", Style::default().fg(Color::DarkGray)),\n    ]))\n    .block(Block::default().title(\" Human Intervention \").borders(Borders::ALL))\n    .style(Style::default().bg(if is_pending { Color::DarkGray } else { Color::Black }));\n\n    f.render_widget(actions, chunks[1]);\n}\n\nfn draw_help_bar(f: \u0026mut Frame, app: \u0026App, area: Rect) {\n    let help = match app.mode {\n        AppMode::Dashboard =\u003e \" [D] Dashboard  [A] Alerts  [Q] Quit \",\n        AppMode::AlertDetail =\u003e \" [Y] Approve  [N] Reject  [X] Dismiss  [↑↓] Navigate  [D] Back  [Q] Quit \",\n    };\n\n    let bar = Paragraph::new(Line::from(Span::styled(\n        help,\n        Style::default().fg(Color::Gray),\n    )))\n    .style(Style::default().bg(Color::Black))\n    .alignment(Alignment::Left);\n\n    f.render_widget(bar, area);\n}\n\n// ─── Utilities ──────────────────────────────────────────────────\n\nfn now_str() -\u003e String {\n    let now = std::time::SystemTime::now()\n        .duration_since(std::time::UNIX_EPOCH)\n        .unwrap_or_default()\n        .as_secs();\n    let secs = (now % 86400) as u32;\n    format!(\"{:02}:{:02}:{:02}\", secs / 3600, (secs % 3600) / 60, secs % 60)\n}\n\n// ─── Main ──────────────────────────────────────────────────────\n\n#[tokio::main]\nasync fn main() -\u003e Result\u003c(), Box\u003cdyn std::error::Error\u003e\u003e {\n    // Setup terminal\n    enable_raw_mode()?;\n    let mut stdout = io::stdout();\n    execute!(stdout, EnterAlternateScreen)?;\n    let backend = CrosstermBackend::new(stdout);\n    let mut terminal = Terminal::new(backend)?;\n\n    // Create our agent identity\n    let (my_identity, _signing_key) = IdentityBuilder::new(\"Human\")\n        .capabilities(\u0026[\"observe\", \"approve\", \"control\"])\n        .build()?;\n\n    // Setup P2P network\n    let config = P2PConfig {\n        agent_identity: Some(my_identity),\n        auto_key_exchange: true,\n        ..Default::default()\n    };\n\n    let (network, mut p2p_rx) = P2PNetwork::new(config)?;\n    network.listen(\"/ip4/0.0.0.0/tcp/0\").await?;\n\n    // App state\n    let mut app = App::new(\"Human\");\n\n    // Event loop\n    let mut demo_interval = tokio::time::interval(Duration::from_secs(2));\n    demo_interval.tick().await; // consume first tick\n\n    let result = loop {\n        // Render\n        terminal.draw(|f| draw(f, \u0026app))?;\n\n        if app.should_quit {\n            break Ok(());\n        }\n\n        tokio::select! {\n            // P2P events\n            event = p2p_rx.recv() =\u003e {\n                if let Some(event) = event {\n                    app.handle_p2p_event(event);\n                }\n            }\n\n            // Demo ticks (simulate agent activity)\n            _ = demo_interval.tick() =\u003e {\n                if app.demo_mode \u0026\u0026 app.demo_tick \u003c 8 {\n                    app.generate_demo_tick();\n                }\n            }\n\n            // Terminal events (poll with timeout)\n            _ = tokio::time::sleep(Duration::from_millis(100)) =\u003e {\n                if event::poll(Duration::from_millis(0))? {\n                    if let Ok(Event::Key(key)) = event::read() {\n                        app.handle_key(key);\n                    }\n                }\n            }\n        }\n    };\n\n    // Restore terminal\n    disable_raw_mode()?;\n    execute!(io::stdout(), LeaveAlternateScreen)?;\n    terminal.show_cursor()?;\n\n    // Shutdown P2P\n    network.shutdown()?;\n\n    result\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","Users","nextstop","projects","walkie-talkie","core","src","crypto","mod.rs"],"content":"pub use chacha20poly1305::aead::Aead;\n\nuse chacha20poly1305::aead::OsRng;\nuse chacha20poly1305::{ChaCha20Poly1305, KeyInit, Nonce};\nuse rand::RngCore;\nuse thiserror::Error;\nuse x25519_dalek::{PublicKey, SharedSecret, StaticSecret};\n\n/// Encrypted message format: nonce (12 bytes) || ciphertext+tag\npub const NONCE_SIZE: usize = 12;\n\n#[derive(Debug, Error)]\npub enum Error {\n    #[error(\"Key generation failed: {0}\")]\n    KeyGeneration(String),\n    #[error(\"Encryption failed: {0}\")]\n    Encryption(String),\n    #[error(\"Decryption failed: {0}\")]\n    Decryption(String),\n    #[error(\"Invalid ciphertext length\")]\n    InvalidCiphertext,\n    #[error(\"Peer not found: {0}\")]\n    PeerNotFound(String),\n}\n\npub type Result\u003cT\u003e = std::result::Result\u003cT, Error\u003e;\n\n/// A shared secret key for a peer session.\npub struct SessionKey {\n    cipher: ChaCha20Poly1305,\n    counter: u64,\n}\n\nimpl SessionKey {\n    /// Create from a raw 32-byte key (e.g. from X25519 DH).\n    pub fn from_raw_key(key: \u0026[u8; 32]) -\u003e Self {\n        Self {\n            cipher: ChaCha20Poly1305::new_from_slice(key).expect(\"32 bytes, always valid\"),\n            counter: 0,\n        }\n    }\n\n    pub fn new(shared_secret: \u0026SharedSecret) -\u003e Self {\n        let key = shared_secret.as_bytes();\n        Self::from_raw_key(key)\n    }\n\n    /// Encrypt plaintext -\u003e nonce(12) || ciphertext+tag\n    pub fn encrypt(\u0026mut self, plaintext: \u0026[u8]) -\u003e Result\u003cVec\u003cu8\u003e\u003e {\n        let mut nonce_bytes = [0u8; NONCE_SIZE];\n        nonce_bytes[4..].copy_from_slice(\u0026self.counter.to_le_bytes());\n        self.counter += 1;\n\n        let nonce = Nonce::from_slice(\u0026nonce_bytes);\n        let ciphertext = self\n            .cipher\n            .encrypt(nonce, plaintext)\n            .map_err(|e| Error::Encryption(e.to_string()))?;\n\n        let mut output = nonce_bytes.to_vec();\n        output.extend_from_slice(\u0026ciphertext);\n        Ok(output)\n    }\n\n    /// Decrypt nonce(12) || ciphertext+tag -\u003e plaintext\n    pub fn decrypt(\u0026mut self, data: \u0026[u8]) -\u003e Result\u003cVec\u003cu8\u003e\u003e {\n        if data.len() \u003c NONCE_SIZE + 16 {\n            return Err(Error::InvalidCiphertext);\n        }\n\n        let nonce = Nonce::from_slice(\u0026data[..NONCE_SIZE]);\n        let ciphertext = \u0026data[NONCE_SIZE..];\n\n        self.cipher\n            .decrypt(nonce, ciphertext)\n            .map_err(|_| Error::Decryption(\"Authentication failed\".into()))\n    }\n}\n\n/// CryptoLayer manages key exchange and encrypted sessions.\npub struct CryptoLayer {\n    sessions: std::collections::HashMap\u003cString, SessionKey\u003e,\n}\n\nimpl Default for CryptoLayer {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\nimpl CryptoLayer {\n    pub fn new() -\u003e Self {\n        Self {\n            sessions: std::collections::HashMap::new(),\n        }\n    }\n\n    /// Generate a new X25519 keypair.\n    pub fn generate_keypair(\u0026self) -\u003e Result\u003cKeyPair\u003e {\n        let mut private_bytes = [0u8; 32];\n        OsRng.fill_bytes(\u0026mut private_bytes);\n\n        let secret = StaticSecret::from(private_bytes);\n        let public = PublicKey::from(\u0026secret);\n\n        Ok(KeyPair {\n            public: public.as_bytes().to_vec(),\n            private: secret.to_bytes().to_vec(),\n        })\n    }\n\n    /// Perform X25519 DH: our_private * their_public = shared_secret\n    pub fn diffie_hellman(our_private: \u0026[u8], their_public: \u0026[u8]) -\u003e Result\u003cSharedSecret\u003e {\n        if our_private.len() != 32 || their_public.len() != 32 {\n            return Err(Error::KeyGeneration(\"Keys must be 32 bytes\".into()));\n        }\n\n        let mut priv_bytes = [0u8; 32];\n        priv_bytes.copy_from_slice(our_private);\n        let secret = StaticSecret::from(priv_bytes);\n\n        let mut pub_bytes = [0u8; 32];\n        pub_bytes.copy_from_slice(their_public);\n        let public = PublicKey::from(pub_bytes);\n\n        Ok(secret.diffie_hellman(\u0026public))\n    }\n\n    /// Create a session with a peer.\n    pub fn create_session(\u0026mut self, peer_id: \u0026str, shared_secret: \u0026SharedSecret) {\n        self.sessions\n            .insert(peer_id.to_string(), SessionKey::new(shared_secret));\n    }\n\n    /// Encrypt a message for a specific peer.\n    pub fn encrypt_for(\u0026mut self, peer_id: \u0026str, plaintext: \u0026[u8]) -\u003e Result\u003cVec\u003cu8\u003e\u003e {\n        let session = self\n            .sessions\n            .get_mut(peer_id)\n            .ok_or_else(|| Error::PeerNotFound(peer_id.to_string()))?;\n        session.encrypt(plaintext)\n    }\n\n    /// Decrypt a message from a specific peer.\n    pub fn decrypt_from(\u0026mut self, peer_id: \u0026str, data: \u0026[u8]) -\u003e Result\u003cVec\u003cu8\u003e\u003e {\n        let session = self\n            .sessions\n            .get_mut(peer_id)\n            .ok_or_else(|| Error::PeerNotFound(peer_id.to_string()))?;\n        session.decrypt(data)\n    }\n\n    /// Check if a session exists for a peer.\n    pub fn has_session(\u0026self, peer_id: \u0026str) -\u003e bool {\n        self.sessions.contains_key(peer_id)\n    }\n}\n\n/// A keypair for key exchange.\n#[derive(Debug, Clone)]\npub struct KeyPair {\n    pub public: Vec\u003cu8\u003e,\n    pub private: Vec\u003cu8\u003e,\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    fn make_test_session() -\u003e SessionKey {\n        // Do a real DH to get a SharedSecret\n        let alice_sec = StaticSecret::from([1u8; 32]);\n        let _alice_pub = PublicKey::from(\u0026alice_sec);\n        let bob_sec = StaticSecret::from([2u8; 32]);\n        let bob_pub = PublicKey::from(\u0026bob_sec);\n        let shared = alice_sec.diffie_hellman(\u0026bob_pub);\n        SessionKey::new(\u0026shared)\n    }\n\n    #[test]\n    fn test_encrypt_decrypt_roundtrip() {\n        let mut session = make_test_session();\n\n        let plaintext = b\"Hello, Walkie Talkie!\";\n        let encrypted = session.encrypt(plaintext).unwrap();\n        let decrypted = session.decrypt(\u0026encrypted).unwrap();\n        assert_eq!(plaintext.to_vec(), decrypted);\n    }\n\n    #[test]\n    fn test_nonce_uniqueness() {\n        let mut session = make_test_session();\n\n        let enc1 = session.encrypt(b\"message 1\").unwrap();\n        let enc2 = session.encrypt(b\"message 1\").unwrap();\n        assert_ne!(enc1, enc2);\n    }\n\n    #[test]\n    fn test_diffie_hellman() {\n        let crypto = CryptoLayer::new();\n        let alice = crypto.generate_keypair().unwrap();\n        let bob = crypto.generate_keypair().unwrap();\n\n        let shared_a = CryptoLayer::diffie_hellman(\u0026alice.private, \u0026bob.public).unwrap();\n        let shared_b = CryptoLayer::diffie_hellman(\u0026bob.private, \u0026alice.public).unwrap();\n        assert_eq!(shared_a.as_bytes(), shared_b.as_bytes());\n    }\n\n    #[test]\n    fn test_full_e2ee() {\n        let mut alice = CryptoLayer::new();\n        let mut bob = CryptoLayer::new();\n\n        let alice_keys = alice.generate_keypair().unwrap();\n        let bob_keys = bob.generate_keypair().unwrap();\n\n        let shared_a = CryptoLayer::diffie_hellman(\u0026alice_keys.private, \u0026bob_keys.public).unwrap();\n        let shared_b = CryptoLayer::diffie_hellman(\u0026bob_keys.private, \u0026alice_keys.public).unwrap();\n\n        alice.create_session(\"bob\", \u0026shared_a);\n        bob.create_session(\"alice\", \u0026shared_b);\n\n        // Alice -\u003e Bob\n        let msg = b\"Push-to-talk!\";\n        let enc = alice.encrypt_for(\"bob\", msg).unwrap();\n        let dec = bob.decrypt_from(\"alice\", \u0026enc).unwrap();\n        assert_eq!(msg.to_vec(), dec);\n\n        // Bob -\u003e Alice\n        let reply = b\"Roger that!\";\n        let enc2 = bob.encrypt_for(\"alice\", reply).unwrap();\n        let dec2 = alice.decrypt_from(\"bob\", \u0026enc2).unwrap();\n        assert_eq!(reply.to_vec(), dec2);\n    }\n\n    #[test]\n    fn test_tampered_ciphertext_fails() {\n        let mut session = make_test_session();\n\n        let mut encrypted = session.encrypt(b\"secret\").unwrap();\n        encrypted[15] ^= 0xff;\n        assert!(session.decrypt(\u0026encrypted).is_err());\n    }\n\n    #[test]\n    fn test_wrong_peer_fails() {\n        let mut alice = CryptoLayer::new();\n        let bob = CryptoLayer::new();\n\n        let alice_keys = alice.generate_keypair().unwrap();\n        let bob_keys = bob.generate_keypair().unwrap();\n\n        let shared = CryptoLayer::diffie_hellman(\u0026alice_keys.private, \u0026bob_keys.public).unwrap();\n        alice.create_session(\"bob\", \u0026shared);\n\n        // Try to decrypt from unknown peer\n        assert!(alice.decrypt_from(\"eve\", b\"garbage\").is_err());\n    }\n}\n","traces":[{"line":36,"address":[],"length":0,"stats":{"Line":6}},{"line":38,"address":[],"length":0,"stats":{"Line":18}},{"line":43,"address":[],"length":0,"stats":{"Line":6}},{"line":44,"address":[],"length":0,"stats":{"Line":18}},{"line":45,"address":[],"length":0,"stats":{"Line":12}},{"line":49,"address":[],"length":0,"stats":{"Line":6}},{"line":50,"address":[],"length":0,"stats":{"Line":12}},{"line":51,"address":[],"length":0,"stats":{"Line":18}},{"line":52,"address":[],"length":0,"stats":{"Line":6}},{"line":54,"address":[],"length":0,"stats":{"Line":18}},{"line":55,"address":[],"length":0,"stats":{"Line":12}},{"line":56,"address":[],"length":0,"stats":{"Line":6}},{"line":57,"address":[],"length":0,"stats":{"Line":18}},{"line":58,"address":[],"length":0,"stats":{"Line":6}},{"line":60,"address":[],"length":0,"stats":{"Line":18}},{"line":61,"address":[],"length":0,"stats":{"Line":18}},{"line":62,"address":[],"length":0,"stats":{"Line":6}},{"line":66,"address":[],"length":0,"stats":{"Line":4}},{"line":67,"address":[],"length":0,"stats":{"Line":8}},{"line":68,"address":[],"length":0,"stats":{"Line":0}},{"line":71,"address":[],"length":0,"stats":{"Line":12}},{"line":72,"address":[],"length":0,"stats":{"Line":8}},{"line":74,"address":[],"length":0,"stats":{"Line":4}},{"line":75,"address":[],"length":0,"stats":{"Line":12}},{"line":76,"address":[],"length":0,"stats":{"Line":6}},{"line":86,"address":[],"length":0,"stats":{"Line":0}},{"line":87,"address":[],"length":0,"stats":{"Line":0}},{"line":92,"address":[],"length":0,"stats":{"Line":5}},{"line":94,"address":[],"length":0,"stats":{"Line":5}},{"line":99,"address":[],"length":0,"stats":{"Line":6}},{"line":100,"address":[],"length":0,"stats":{"Line":12}},{"line":101,"address":[],"length":0,"stats":{"Line":18}},{"line":103,"address":[],"length":0,"stats":{"Line":18}},{"l
